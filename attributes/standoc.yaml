# yaml-language-server: $schema=../schemas/attribute-manifest.schema.yaml
# Metanorma document attributes — Metanorma (all flavors)
# Generated by scripts/extract-attributes.rb on 2026-07-22; reviewed against gem validators.
---
flavor: standoc
label: Metanorma (all flavors)
inherits_from:
gem: metanorma-standoc
source: author/ref/document-attributes.adoc
description: |-
  This is the list of document attributes supported by all flavors of Metanorma.

  [TIP]
  ====
  If you're using one of the link:/flavors/[officially supported flavors of Metanorma],
  please also see flavor-specific guidance for any additional supported or
  required document attributes.
  ====
sections:
- name: Bibliography
  subsection: Reference lookup
  prose: For bibliographic lookup, see link:/author/basics/reference-lookups[automatic reference lookup].
- name: Bibliography
  subsection: Publication date cutoff
  prose: |-
    By default, bibliographic references are resolved as of the document's own
    publication date, derived from its date attributes (such as `:copyright-year:`
    and `:revdate:`): an undated reference resolves to the latest edition published
    on or before that date, and a reference's status (for example, withdrawn or
    replaced) is shown as of that date rather than as of today.
- name: Bibliography
  subsection: Caching
  prose: |-
    For bibliographic caches, see
    link:/author/basics/reference-lookups/#lookup-result-caching[lookup result caching].
- name: Bibliography
  subsection: Reference sort order
  prose: |-
    Within a bibliography or normative references section, references are sorted by
    publisher and then by identifier. Each flavour defines a default publisher
    ranking (for example, ISO before IEC in ISO documents); this can be overridden
    per document, or by a Metanorma taste, with the following attributes.
- name: Languages and localization
  prose: See also the link:/author/topics/languages[Languages] topic.
- name: Document information
  prose: |-
    In the following, `{_i}` indicates that multiple values are permitted for the document attribute, in separate
    attributer–value pairs. For example, for `:publisher:`, the first publisher is given as
    `:publisher:`; more publishers are added with the suffix `_2`, `_3`, etc., e.g. `:publisher_2:`,
    `:publisher_3:` [added in https://github.com/metanorma/metanorma-standoc/releases/tag/v2.7.0].
- name: Generic metadata
  prose: |-
    Metanorma allows generic metadata to be passed to the generated document in key/value form, for downstream
    use [added in https://github.com/metanorma/metanorma-standoc/releases/tag/v2.0.1].

    This metadata needs to be indicated as either semantic, or presentation-related.
    The name of the metadata value is included in the document attribute:

    In the following, `{_i}` indicates that multiple values are permitted for the
    document attribute, in separate attributer-value pairs.

    [example]
    ====
    For `:publisher:`, the first publisher is given as `:publisher:`; more
    publishers are added with the suffix `_2`, `_3`, etc., e.g. `:publisher_2:`,
    `:publisher_3:` [added in https://github.com/metanorma/metanorma-standoc/releases/tag/v2.7.0].
    ====
- name: Document relations
  subsection: General
  prose: |-
    These attributes take a document identifier in the Relaton format:

    * If the document can be found via Relaton auto-fetch (e.g. a published IEC standard), the actual bibliographic item will be used.
    * Otherwise, a dummy bibliographic item with an empty title and the nominated document identifier will be used.

    Multiple document identifiers can be delimited by `;`. If the document cannot be auto-fetched,
    a title for each document nominated can be introduced, delimited from the document identifier
    by `,`. For example, `NIST SP 800-1,Title 1;NIST SP 800-2,Title 2`.
- name: Document relations
  subsection: Part of
  prose: This document attribute applies to a document part in order to point to the parent document.
- name: Document relations
  subsection: Translated from
  prose: This document attribute applies to a translated document, pointing to the original (untranslated) document.
- name: Author information
  prose: |-
    In the following, `{_i}` indicates that multiple values are permitted for the
    document attribute, in separate attributer–value pairs.

    [example]
    ====
    For example, for `:publisher:`, the first publisher is given as `:publisher:`;
    more publishers are added with the suffix `_2`, `_3`, etc., e.g.
    `:publisher_2:`,
    `:publisher_3:` [added in https://github.com/metanorma/metanorma-standoc/releases/tag/v2.7.0].
    ====
- name: PDF protection and permissions
  prose: |-
    All the following attributes relate to protection of PDF files as described
    in https://www.iso.org/standard/51502.html[ISO 32000-1:2008].
    copying [added in https://github.com/metanorma/metanorma-standoc/releases/tag/v1.11.3].
attributes:
  document-class:
    category: Build and configuration
    type: string
    aliases:
    - flavor
    legacy:
    - mn-document-class
    - mn-flavor
    description: |-
      The flavor of Metanorma used to compile the document; e.g. `iso`, `nist`, `ogc`. Needs to be a supported version
      of the document.
  flavor:
    category: Build and configuration
    alias_of: document-class
  output-extensions:
    category: Build and configuration
    type: comma-list
    legacy:
    - mn-output-extensions
    description: |-
      The output formats to generate for the document, comma-delimited; e.g. `xml,presentation,html,doc,pdf`.
      The formats supported vary for each flavor, but all flavors support `xml` (Semantic XML), `presentation`
      (Presentation XML), and one of `html` or `pdf`.
  imagesdir:
    category: Build and configuration
    type: string
    description: |-
      (Optional) Directory in which images are located: all local image file locations
      are prefixed with this directory.
      Accepts a directory path.
  nodoc:
    category: Build and configuration
    type: string
    description: Instructs Metanorma to not generate Word and HTML output, means only XML output will be generated.
  novalid:
    category: Build and configuration
    type: string
    description: Suppress document validation.
  index-terms:
    category: Build and configuration
    type: string
    added_in:
      component: metanorma-standoc
      version: v1.11.3
    description: |-
      Terms (and symbols) are indexed automatically in postprocessing.
      See link:/author/topics/inline-markup/index-terms#auto-index-terms[automatic terms indexing].
  relaton-output-file:
    category: Build and configuration
    type: string
    legacy:
    - mn-relaton-output-file
    description: Output the bibliographic record describing the document as a Relaton XML file (with the suffix `.rxl`).
  no-isobib:
    category: Bibliography
    subsection: Reference lookup
    type: boolean
    description: |-
      If set, do not use the `relaton` or `iev` gem functionality to look up
      ISO and IEV references online, nor the cache of `relaton` and `iev` searches.
  bibliography-cutoff-date:
    category: Bibliography
    subsection: Publication date cutoff
    type: date
    added_in:
      component: metanorma-standoc
      version: v3.4.8
    description: |-
      Override the publication date used for the bibliographic cutoff, instead of
      deriving it from the document's own date attributes. Accepts a date
      (`YYYY`, `YYYY-MM`, or `YYYY-MM-DD`); the value `none` (or `false`) disables the
      cutoff entirely, so references resolve to their latest editions and current
      status.
  no-isobib-cache:
    category: Bibliography
    subsection: Caching
    type: boolean
    description: |-
      If set, use the `relaton` and `iev` gem functionality to look up
      ISO and IEV references online, but do not use the cache of `relaton` and `iev` searches.
  local-cache:
    category: Bibliography
    subsection: Caching
    type: string
    description: |-
      Use the local Relaton and iev search caches to override the global `relaton` and `iev` search
      caches. If a directory name is given for the attribute, that name overrides `relaton` as the
      cache name.
  local-cache-only:
    category: Bibliography
    subsection: Caching
    type: string
    description: |-
      Use the local Relaton and iev search caches to the exclusion of the global
      `relaton` and `iev` search caches.
      If a directory name is given for the attribute, that name overrides `relaton` as the cache name.
  flush-caches:
    category: Bibliography
    subsection: Caching
    type: boolean
    description: If set, delete and reinitialise the cache of https://www.relaton.org/[Relaton] searches.
  relaton-data-source:
    category: Bibliography
    subsection: Caching
    type: enum
    values:
    - name: bibtex
      description: |-
        The BibTeX format. Currently, only
        this is supported as a format, all other formats will raise an error.
    added_in:
      component: metanorma-standoc
      version: 2.2.9
    description: |-
      Allows specification of an external bibliographic file to be
      imported.
      The value of the field is the file name. If the format also needs to be
      specified, this is done as `file=PATH/TO/FILE,format=FORMAT`. Valid formats are
      follows.
  relaton-data-source-{id}:
    category: Bibliography
    subsection: Caching
    type: string
    added_in:
      component: metanorma-standoc
      version: 2.2.9
    example: |-
      :relaton-data-source-bib1: PATH/TO/FIRST/FILE
      :relaton-data-source-bib2: PATH/TO/SECOND/FILE
    description: |-
      Allows specification of multiple external bibliographic files to be
      imported.
      The different bibliographic sources are differentiated through the value of the `{id}` identifier.
  sort-biblio:
    category: Bibliography
    subsection: Reference sort order
    type: boolean
    description: |-
      If set to `false`, do not sort the bibliography; references are left in document
      order. Sorting is on by default.

      Sort bibliographies in the document according to criteria set by the flavor
      Default: `true`.
      .
    default: 'true'
    added_in:
      component: metanorma-standoc
      version: 3.3.0
  sort-biblio-{abbrev}:
    category: Bibliography
    subsection: Reference sort order
    type: string
    added_in:
      component: metanorma-standoc
      version: v3.4.9
    example: |-
      Sort OIML references ahead of ISO and IEC:

      :sort-biblio-OIML: 1: International Organization of Legal Metrology
      :sort-biblio-ISO: 2: International Organization for Standardization
      :sort-biblio-IEC: 3: International Electrotechnical Commission
    description: |-
      Override the publisher sort ranking for the bibliography, one attribute per
      publisher.
      The attribute-name suffix `{abbrev}` is the publisher's abbreviation; the value
      is the sort rank (lower sorts earlier) followed by the publisher's full name,
      separated by a colon (`{rank}: {name}`). A reference is matched to a publisher
      by its abbreviation (case-insensitive) or its name; matched publishers sort in
      the given rank order, followed by other standards, then other references.
      This is the mechanism a Metanorma taste uses to set a house bibliographic sort
      order: the taste configuration compiles to these document attributes. Because
      they are ordinary document attributes, an author can equally set them directly
      in a single document to override the sort order for that document alone.
  relaton-render-config:
    category: Bibliography
    subsection: Reference rendering
    type: string
    added_in:
      component: metanorma-standoc
      version: 3.2.4
    description: |-
      Override the default configuration of Relaton Render selectively, with attributes from the
      named configuration YAML file.
      See https://www.relaton.org/specs/relaton-render/[Relaton Render specification] for description of
      the configuration file format. We recommend you inspect the configuration compiled into the flavor gem
      (`lib/relaton/render/config.yml`) and include modifications of that in the override config file.
  keep-asciimath:
    category: Math and scientific formatting
    type: string
    legacy:
    - mn-keep-asciimath
    description: Do not translate Asciimath in the document to MathML.
  suppress-asciimath-dup:
    category: Math and scientific formatting
    type: string
    added_in:
      component: metanorma-standoc
      version: v1.10.5
    description: |-
      By default, MathML in the Metanorma XML has equivalent AsciiMath added
      to it in a comment. This AsciiMath can be used as an accessibility
      alternative to the MathML expression. The generation of this AsciiMath
      can be suppressed.
  stem:
    category: Math and scientific formatting
    type: string
    default: asciimath
    description: |-
      (Defaults to `asciimath`) The default language for `stem:[...]` and `[stem]`
      blocks expressions in the document. (AsciiMath, MathML, or LaTeX). For example,
      if you want the `stem` expressions in your document to be interpreted as LaTeX
      by default, use `:stem: latexmath`.

      Read more about
      link:/author/topics/blocks/math/[mathematical expressions].
  number-presentation:
    category: Math and scientific formatting
    type: string
    added_in:
      component: metanorma-standoc
      version: v2.8.12
    example: |-
      Using the `:number-presentation:` attribute

      :number-presentation: notation=e,exponent_sign=plus,precision=4

      number:341[]
    description: |-
      Sets the formatting options for the `number:[]` command in the
      document.
      Please refer to the dedicated section at
      link:/author/topics/inline-markup/semantic-elements#numbers[numbers] for usage.
  number-presentation-profile-{NAME}:
    category: Math and scientific formatting
    type: string
    added_in:
      component: metanorma-standoc
      version: v2.8.12
    example: |-
      Using the `:number-presentation-profile-{NAME}:` attribute

      :number-presentation-profile-3: notation=scientific,exponent_sign=nil,decimal=","
      ...

      number:342[profile=3]
    description: |-
      Sets the formatting options for the `number:[]` command in the document
      as profile `{NAME}`.
      Please refer to the dedicated section at
      link:/author/topics/inline-markup/semantic-elements#numbers[numbers] for usage.
  number-presentation-formula:
    category: Math and scientific formatting
    type: string
    added_in:
      component: metanorma-standoc
      version: 2.9.6
    description: |-
      Sets the formatting options for numbers contained in formulas.
      Please refer to the dedicated section at
      link:/author/topics/inline-markup/semantic-elements#formula-numbers[numbers in formulas].
  i18nyaml:
    category: Languages and localization
    type: string
    description: |-
      Name of YAML language template file.
      Use if you wish to output an standard in a language that's not supported out of the box.
      For more on how to customize localization, see link:/develop/topics/localization[Localization].
  language:
    category: Languages and localization
    type: string
    default: en
    description: Two-letter code (ISO 639-1) of the language the document is written in. Defaults to `en`.
  script:
    category: Languages and localization
    type: string
    default: Latn
    description: |-
      The script of the document (ISO 15924). Defaults to `Latn`. Must be supplied as
      `Hans` for Simplified Chinese.
  locale:
    category: Languages and localization
    type: string
    added_in:
      component: metanorma-standoc
      version: 2.2.4
    description: |-
      The locale of the document (currently expected to be a two-letter country code,
      ISO 3166-1 alpha-2).
  boilerplate-authority:
    category: Languages and localization
    type: string
    added_in:
      component: metanorma-standoc
      version: v1.3.15
    description: |-
      File containing predefined text of document, in Metanorma XML. The document
      predefined text needs to follow the structure described in
      link:/develop/topics/metadata-and-boilerplate#boilerplate[Predefined text];
      compare examples of Metanorma predefined text files such as
      https://github.com/metanorma/metanorma-itu/blob/main/lib/metanorma/itu/boilerplate.xml[that in ITU]
      .
  localize-number:
    category: Languages and localization
    type: string
    added_in:
      component: metanorma-standoc
      version: v2.2.4
    description: |-
      Template for how to present localized numbers. The localization template string is in the following form:
      `:localize-number: +++#,##0.### ###+++`
      TIP: See link:/author/topics/languages#number-localization[Number localization]
      for how numbers are localized in
      Metanorma.
  publisher{_i}:
    category: Document information
    type: comma-list
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v1.5.1
    version_history:
    - component: metanorma-standoc
      version: v1.7.0
    description: |-
      The standards agency publishing the standard.
      NOTE: Prior to 1.7.0, this field accepted comma-delimited values.
      NOTE: Prior to 2.7.0, this field accepted semicolon-delimited values.
      These are processed via CSV, recognising quote marks. This functionality is maintained in later versions,
      but other attributes of organisations are ignored (`publisher_logo`, `pub-address`, etc.)
  publisher_abbr{_i}:
    category: Document information
    type: string
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v3.0.7
    description: |-
      The abbreviation of the publisher; if not provided, and the standards organisation is the home
      organisation of the standard, the SDO's abbreviation will already be available to Metanorma, and will be
      supplied.
  publisher_logo{_i}:
    category: Document information
    type: string
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v2.7.0
    description: |-
      The path to the logo of the publisher, specified as an
      image file; the numbers in the attribute align to the `:publisher{_i}:`
      attributes.
  sponsor{_i}:
    category: Document information
    type: string
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v2.7.0
    description: |-
      An organization sponsoring the publication of this document.
      NOTE: If a person needs to be nominated as the responsible party for a
      sponsoring organization, that person should be treated as a personal contributor
      (`:surname{_i}:`, `:affiliation{_i}:`, etc.), with a `:role:` attribute of
      `enabler`.
  sponsor_logo{_i}:
    category: Document information
    type: string
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v2.7.0
    description: |-
      The path to the logo of the sponsoring organization,
      specified as an image file; the numbers in the attribute align to the
      `:sponsor{_i}:`
      attributes.
  copyright-holder:
    category: Document information
    type: comma-list
    added_in:
      component: metanorma-standoc
      version: v1.7.0
    version_history:
    - component: metanorma-standoc
      version: v1.5.1
    description: |-
      The copyright holder, if distinct from the publisher;
      can be multiple
      (semicolon-delimited: processed via CSV, recognising quote marks).. +
      NOTE: Prior to 1.7.0, this field accepted comma-delimited values.
  docnumber:
    category: Document information
    type: string
    description: |-
      The numeric component of the document identifier.
      The full identifier is formed by prefixing and suffixing this element with other strings
      derived from metadata.
  docidentifier:
    category: Document information
    type: string
    added_in:
      component: metanorma-standoc
      version: v2.3.9
    version_history:
    - component: metanorma-standoc
      version: v3.3.0
    description: |-
      The `:docidentifier:` attribute is an alternative to `docnumber` and other
      attributes (such as `doctype` and `docstage`).
      WARNING: `:docidentifier:` should be avoided unless absolutely necessary due to
      the limitations its usage brings. Metanorma maintains the `pubid-*` set of
      software libraries to generate document identifiers for different Metanorma
      flavours, and those libraries should be updated to deal with the novel use case.
      The value here is the "full document identifier" and overrides the composition
      of the automatically-constructed document
      identifier.
      If `:docidentifier:` is supplied, _`:docnumber:` and the other related
      attributes are ignored_ when composing the identifier for the document.
      The `:docidentifier:` attribute is used for document identifiers that do not
      follow normal SDO conventions, and for which the identifier cannot be
      constructed out of `:docnumber:` in the normal way.
      [NOTE]
      `:docidentifier:` is a preformatted value and is opaque to Metanorma.
      This means that Metanorma cannot make any inference about the internal structure
      of the identifier. For example, Metanorma cannot generate undated or
      language-specific variants of the identifier, or mark up the part number
      separately from the document number, as is required by ISO.

      However, the `:docidentifier:` content can be a
      Liquid template.

      Refer to link:/develop/topics/metadata-and-boilerplate/#default-metadata[Default metadata values]
      for the typical values that can be used in metadata-driven Liquid templates
      under Metanorma.
  docidentifier-additional:
    category: Document information
    type: comma-list
    added_in:
      component: metanorma-standoc
      version: v2.8.2
    description: |-
      This attribute provides additional primary identifiers for the document, to be used alongside
      the native identifier generated from `docnumber` or `docidentifier`.
      It is intended for copublished standards with multiple primary identifiers.
      The list of identifiers is comma-delimited, and is specified as TYPE:VALUE; e.g.
      `:docidentifier-additional: IDF:IDF 21, RFC:RFC 97`.
  edition:
    category: Document information
    type: string
    description: The document edition.
  version:
    category: Document information
    type: string
    added_in:
      component: metanorma-standoc
      version: v3.1.0
    description: |-
      The document version.
      The distinction between `:edition:` and `:version:` is specific to the SDO, but the overall trend is that
      `:edition:` corresponds to major versions, and are what corrigenda and amendments apply to, while `:version:`
      corresponds to minor versions and patches, including pre-publication versions (drafts). However,
      only `:version:` is used if the SDO uses semantic versioning throughout. Before `:version:` was added
      to Metanorma, `:draft:` fulfilled that function instead.
  revdate:
    category: Document information
    type: date
    description: The date the document was last updated.
  library-ics:
    category: Document information
    type: comma-list
    description: |-
      The ICS (International Categorization for Standards) number for the standard.
      There may be more than one ICS for a document; if so, they should be comma-delimited.
      (The ICS identifier is added to the document metadata,
      but may not be visible in the resulting document, depending on Metanorma flavor.)
  isbn:
    category: Document information
    type: string
    added_in:
      component: metanorma-standoc
      version: v1.6.2
    description: |-
      The ISBN-13 number of the document.
      This value is optional.
  isbn10:
    category: Document information
    type: string
    added_in:
      component: metanorma-standoc
      version: v1.6.2
    description: |-
      The ISBN-10 number of the document
      This value is optional.
  title:
    category: Document information
    type: string
    description: |-
      The title of the document. If not supplied, the built-in AsciiDoc title
      (first line of document header) is used instead.
  title-{langcode}:
    category: Document information
    type: string
    example: "`:title-en:`, `:title-fr`:"
    description: The title of the document in the language `langcode`. `langcode` is a ISO 639-1 code.
  title-{type}-{langcode}:
    category: Document information
    type: string
    added_in:
      component: metanorma-standoc
      version: v3.1.6
    example: |-
      `:title-main-en:`, `:title-intro-fr`:
      +
      NOTE: This was previously supported only in individual flavours that required
      title parts, such as ISO that supports `main`, `intro`, `part`, `complementary`,
      `addendum`. It is now supported generically in Metanorma.
    description: |-
      The title of the document in the language `langcode`, and of type `type`.

      The title of the document in the language `langcode`, and of type `type`. Note: this was previously supported only in individual flavours.
  doctype:
    category: Document information
    type: string
    description: The document type; e.g. `standard`, `guide`, `report`.
  doctype-abbrev:
    category: Document information
    type: string
    added_in:
      component: metanorma-standoc
      version: v3.3.0
    description: |-
      The document type abbreviation; e.g. `TN` for "technical note". Can be used in document metadata, e.g. cover page.
      .
  docsubtype:
    category: Document information
    type: string
    added_in:
      component: metanorma-standoc
      version: v1.9.1
    description: |-
      The document subtype; by default, used to provide an ad hoc, user defined document class,
      unless provided for explicitly in the flavour,
      as in OGC
  status:
    category: Document information
    type: string
    aliases:
    - docstage
    description: The status of the document; e.g. `draft`, `published`.
  docstage:
    category: Document information
    alias_of: status
  docstage-abbrev:
    category: Document information
    type: string
    added_in:
      component: metanorma-standoc
      version: v3.3.0
    description: |-
      The document stage abbreviation; e.g. `D` for "draft". Can be used in document metadata, e.g. cover page.
      .
  docstage-published:
    category: Document information
    type: boolean
    added_in:
      component: metanorma-standoc
      version: v3.3.0
    description: |-
      Whether the current document stage should be considered as published.
      Boolean. If not provided, and if there is no setting specific to the flavor, the
      default is that only the stage "published" is considered published.
  docstage-valid:
    category: Document information
    type: comma-list
    added_in:
      component: metanorma-standoc
      version: v3.4.9
    description: |-
      Comma-delimited list of the statuses recognised as valid for this document,
      superseding the flavour's own repertoire in status validation. Normally set by
      a Metanorma taste rather than by authors: a taste that defines its own stages
      advertises through this attribute the base stages it maps them to, so that the
      underlying flavour does not report them as unrecognised.
  docsubstage:
    category: Document information
    type: string
    description: The substage code for the document status, where applicable.
  iteration:
    category: Document information
    type: string
    description: |-
      The iteration of a stage, in case there have been multiple drafts
      (e.g. `2` on a `CD`: this is the second iteration through the `CD` stage).
  keywords:
    category: Document information
    type: comma-list
    description: Comma-delimited list of keywords associated with the document.
  classification:
    category: Document information
    type: comma-list
    added_in:
      component: metanorma-standoc
      version: v1.9.1
    description: |-
      Comma-delimited list of classification tokens, expressed as `type:value` pairs; if no prefix is given to a value,
      "default" is supplied as the type.
      There can only be one value per type in a token; if there are multiple classification values of the same type,
      repeat the type in a new token; e.g.  `:classification: Dewey:563.5.081, Dewey:537.71`.
  draft:
    category: Document information
    type: boolean
    added_in:
      component: metanorma-standoc
      version: v3.1.0
    description: |-
      If present, link:/author/topics/blocks/annotations[reviewer notes]
      will be rendered (otherwise those are suppressed). Is also ued as a legacy
      equivalent of `:version:`.
  document-scheme:
    category: Document information
    type: string
    added_in:
      component: metanorma-standoc
      version: v2.1.6
    description: |-
      Document content arrangement that Metanorma will enforce for this document.
      Accepted values are flavour-specific.
      Depending on the document scheme, Metanorma may insert clauses with
      predetermined text and orders clauses in accordance with the style prescribed by
      the SDO. If those styles are updated, this attribute indicates to Metanorma
      which iteration of the prescription to
      enforce.
      NOTE: As of this writing, implemented in the IEEE, BSI, ITU and ISO flavours.
  semantic-metadata-{name}:
    category: Generic metadata
    type: comma-list
    description: |-
      Comma-delimited list of values, relating to `name` as semantic metadata about the document.
      Stored in the document under `//metanorma-extension/semantic-metadata/{name}`, with repeating tags for each value.
  presentation-metadata-{name}:
    category: Generic metadata
    type: comma-list
    description: |-
      Comma-delimited list of values, relating to `name` as presentation metadata about the document.
      Stored in the document under `//metanorma-extension/presentation-metadata/{name}`, with repeating tags for each value.

      The following instances of generic metadata are applicable to all flavors of
      Metanorma; other instances are specific to flavors, and are documented there:
  semantic-metadata-headless:
    category: Generic metadata
    type: string
    description: |-
      This document is to be compiled without adding
      initial document boilerplate to it. This is used for compiling Metanorma AsciiDoc
      boilerplate documents themselves.
  presentation-metadata-doctype-alias:
    category: Generic metadata
    type: string
    added_in:
      component: isodoc
      version: v3.2.0
    description: |-
      Specify how the document type is to be
      rendered. This overrides the language-specific internationalization of the
      supplied document type, and is used in Metanorma tastes, to override the base
      flavor document type rendering.
  presentation-metadata-custom-charset-font:
    category: Generic metadata
    type: string
    added_in:
      component: isodoc
      version: v2.7.0
    description: |-
      Specify a custom character set for
      https://en.wikipedia.org/wiki/Private_Use_Areas[Unicode "Private Use Area" (PUA)]
      character codepoints
  presentation-metadata-publisher-{doc|html|pdf}-{width|height}[{_i}]:
    category: Generic metadata
    type: string
    repeatable: true
    added_in:
      component: isodoc
      version: v3.2.0
    example: |-
      For example, `presentation-metadata-publisher-pdf-height_2` specifies the height
      of the coverpage logo in PDF of the second specified publisher.
    description: |-
      Specify height and width of the publisher logo, for each of the standard output
      formats of Metanorma.
      The publishers are read in the same sequence for logo attributes as they are for
      publisher names and abbreviations, and the numbering includes the primary
      publisher of the document as the first publisher (for which a logo typically
      does not need to be specified.)
  presentation-metadata-ul-label-list:
    category: Generic metadata
    type: comma-list
    added_in:
      component: isodoc
      version: v3.2.2
    example: |-
      `:presentation-metadata-ul-label-list: *,&#x2013;,"x,x"` will use `*` at level 1;
      `&#x2013;` at level 2, `x,x` at level 3, then go back to  `*` at level 4.
    description: |-
      Specify the characters to be used as
      bullets for unordered lists, as a comma-delimited list of strings, each string
      corresponding to a deeper level of list.
      The bullet list rotates once the list is exceeded.
      NOTE: Custom unordered list bullets are only processed for PDF output.
  presentation-metadata-annex-delim:
    category: Generic metadata
    type: string
    added_in:
      component: isodoc
      version: v3.2.7
    description: |-
      Delimiter between the line heading
      giving the number of an annex, and the title of the annex (Metanorma XML,
      default `<br/><br/>`)
      .
  presentation-metadata-middle-title:
    category: Generic metadata
    type: string
    added_in:
      component: isodoc
      version: v3.2.7
    description: |-
      Presentation XML Liquid template for
      middle title (document title at the start of the main section of the document)
      (Metanorma XML, default `"<p class='zzSTDTitle1'>{{ doctitle }}</p>"`)
      .
      Refer to link:/develop/topics/metadata-and-boilerplate/#default-metadata[Default metadata values]
      for the typical values that can be used in metadata-driven Liquid templates under Metanorma.
  presentation-metadata-admonition-icon-{type}:
    category: Generic metadata
    type: string
    added_in:
      component: isodoc
      version: v3.6.4
    version_history:
    - component: isodoc
      version: v3.6.11
    description: |-
      Add the Unicode character
      as an icon in front of the label for all admonitions of type `{type}`; overrides
      any value given in `admonition-icon` under the `i18n` internationalization file
      .
      If the admonition type contains spaces, replace them with underscores in the
      attribute name: an admonition of type `Safety Precautions` is matched by
      `:presentation-metadata-admonition-icon-safety_precautions:`
      .
  presentation-metadata-html-details-open:
    category: Generic metadata
    type: string
    default: 'true'
    added_in:
      component: isodoc
      version: v3.6.12
    description: |-
      Whether the details element in HTML
      (used for collapsible examples) should be open or closed for HTML documents. Defaults to true,
      and corresponds to `<details open="open">` vs `<details>`.
      .
  part-of:
    category: Document relations
    subsection: Part of
    type: string
    description: document identifier that the current document is a part of.
  translated-from:
    category: Document relations
    subsection: Translated from
    type: string
    description: document identifier that the current document is a translation of.
  uri:
    category: URIs
    type: uri
    description: The URI to which this standard is published.
  xml-uri:
    category: URIs
    type: uri
    description: The URI to which the (Metanorma) XML representation of this standard is published.
  html-uri:
    category: URIs
    type: uri
    description: The URI to which the HTML representation of this standard is published.
  pdf-uri:
    category: URIs
    type: uri
    description: The URI to which the PDF representation of this standard is published.
  doc-uri:
    category: URIs
    type: uri
    description: The URI to which the DOC representation of this standard is published.
  relaton-uri:
    category: URIs
    type: uri
    description: The URI to which the Relaton XML representation of this standard is published.
  copyright-year:
    category: Timestamps
    type: string
    description: The year which will be claimed as when the copyright for the document was issued.
  announced-date:
    category: Timestamps
    type: date
    description: |-
      The date on which the publication of the standard was announced by the issuing authority.

      The date on which the document was announced as forthcoming.
    added_in:
      component: metanorma-standoc
      version: v1.9.3
  issued-date:
    category: Timestamps
    type: date
    description: The date on which the standard was issued (authorised for publication by the issuing authority).
  published-date:
    category: Timestamps
    type: date
    description: The date on which the standard was published (distributed by the publisher).
  implemented-date:
    category: Timestamps
    type: date
    description: The date on which the standard became active.
  created-date:
    category: Timestamps
    type: date
    description: The date on which the first version of the standard was created.
  updated-date:
    category: Timestamps
    type: date
    description: The date on which the current version of the standard was updated.
  corrected-date:
    category: Timestamps
    type: date
    added_in:
      component: metanorma-standoc
      version: v2.6.3
    description: |-
      The date on which the current version of the standard was corrected, without that correction amounting to a distinct
      update.
  obsoleted-date:
    category: Timestamps
    type: date
    description: The date on which the standard was obsoleted/revoked.
  confirmed-date:
    category: Timestamps
    type: date
    description: The date on which the standard was reviewed and approved by the issuing authority.
  unchanged-date:
    category: Timestamps
    type: date
    description: The date on which the standard was last renewed without any changes in content.
  circulated-date:
    category: Timestamps
    type: date
    description: The date on which the unpublished standard was last circulated officially as a preprint. For standards, this is associated with the latest transition to a formally defined preparation stage, such as Working Draft or Committee Draft.
  accessed-date:
    category: Timestamps
    type: date
    description: |-
      The date on which the standard was last accessed by the compiler of the bibliography; e.g. for a cited online resource,
      the date on which the document author viewed the resource.
  date:
    category: Timestamps
    type: date
    description: An arbitrary date in the production of the standard. Content of the attribute should be a token, giving the type of date, then space, then the date itself. Multiple dates can be added as `:date_2:`, `:date_3:`, etc.
  vote-started-date:
    category: Timestamps
    type: date
    added_in:
      component: metanorma-standoc
      version: v1.3.25
    description: The date on which the voting process starts for this document.
  vote-ended-date:
    category: Timestamps
    type: date
    added_in:
      component: metanorma-standoc
      version: v1.3.25
    description: The date on which the voting process ends for this document.
  technical-committee_{1}:
    category: Author information
    type: string
    repeatable: true
    example: |-
      In the following list, `technical-committee` can be replaced by each of the
      allowed editorial group labels; for example, if `workgroup` is an editorial
      group label, then `:workgroup-label:` and `:workgroup-type:` are document
      attributes, instead of `:technical-committee-label:` and
      `:technical-committee-type:`.
    description: |-
      The name of the relevant editorial group. The document attribute name for
      editorial groups varies by flavor, and there can be multiple types of editorial
      group, each with its own document attribute;
      see link:/author/topics/metadata/contributor#committee-groups[Contributor metadata: Groups]
      for the value for each flavor.
  technical-committee-number{_i}:
    category: Author information
    type: string
    repeatable: true
    description: The identifier of the editorial group.
  technical-committee-type{_i}:
    category: Author information
    type: string
    repeatable: true
    example: "`:technical-committee-number: 2`, `:technical-committee-type: TC`, giving _TC 2_."
    description: |-
      The type of the editorial group. Typically this is used as the abbreviation
      prefixed to the editorial group number.
  technical-committee-agency{_i}:
    category: Author information
    type: string
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v3.1.4
    description: |-
      The agency that the editorial group lies
      under, if it is other than the home agency
      (the publisher of the document).
      Only needed for multiple editorial groups.
  technical-committee-agency-abbr{_i}:
    category: Author information
    type: string
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v3.1.4
    example: |-
      For example, under metanorma-iso, `:technical-committee-agency:` can be
      specified as `ISO`, rather than needing to specify both
      `:technical-committee-agency: International Standardization Organization` and
      `:technical-committee-agency-abbr: ISO`.
    description: |-
      The abbreviation of the agency that
      the editorial group lies
      under.
      In most flavors, the abbreviation of the SDO is already available for lookup in
      Metanorma, and users need not provide this attribute.
  technical-committee_logo{_i}:
    category: Author information
    type: string
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v3.3.0
    description: |-
      The logo of the editorial group,
      specified as an image file.
  committee-types:
    category: Author information
    type: comma-list
    added_in:
      component: metanorma-standoc
      version: v3.3.0
    description: |-
      Comma-delimited list of committee types to be recognized
      for the document. Overrides the preset committee types set for the flavor.
      .
  corporate-author{_i}:
    category: Author information
    type: string
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v3.1.5
    description: |-
      The organization authoring the standard.
      This document attribute **should not** be provided if the authoring organization
      is identical to the publishing body, as its value is automatically set to that
      of `:publisher:`.
      Use `:corporate-author:` **only when** a standard is authored or co-authored by
      an agency distinct from the publishing body, and only the publishing agency is
      credited as the publisher.
      Multiple agencies can be specified as corporate authors (similar to
      `:publisher:`). The first agency specified is expected to be the publishing
      body. Use `:corporate-author_2:`, `:corporate-author_3:`, etc. for additional
      agencies.
      NOTE: For personal authors, use `:fullname:` or `:surname:` and `:givenname:`
      instead.
  fullname{_i}:
    category: Author information
    type: string
    repeatable: true
    anchor: fullname
    description: |-
      The full name of a person who is a contributor to the document.
      A second person is indicated by using a numeric suffix: `:fullname:`, `:fullname_2:`, `fullname_3:`, &c.
      The same convention applies to all the following attributes.
      (This and the other personal name attributes are not displayed in all standards.)
  surname{_i}:
    category: Author information
    type: string
    repeatable: true
    anchor: surname
    description: The surname of a person who is a contributor to the document.
  givenname{_i}:
    category: Author information
    type: string
    repeatable: true
    anchor: givenname
    description: The given name(s) of a person who is a contributor to the document.
  initials{_i}:
    category: Author information
    type: string
    repeatable: true
    description: The initials(s) of a person who is a contributor to the document.
  contributor-credentials{_i}:
    category: Author information
    type: string
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v2.3.9
    description: |-
      Credentials of the person, appearing after their name in Metanorma flavour-specific
      contexts.

      The credentials of the person (e.g. "PhD, F.R.Pharm.S"); these are often displayed inline with the
      person's name.
  role{_i}:
    category: Author information
    type: string
    repeatable: true
    anchor: role
    description: |-
      The role of a person who is a contributor to the document.
      By default, they are coded as an `editor`; they can also be represented as an `author`,
      or (if they are the responsible party for a sponsoring organization) `enabler`.
      Is meant to draw from the constrained vocabulary of Relaton: `author`, `editor`, `adapter`,
      `translator`, `performer`, `realizer`, `publisher`, `distributor`, `owner`, `authorizer`,
      `enabler`, `subject`; see https://www.relaton.org/model/creator/[Relaton specification].
  role-description{_i}:
    category: Author information
    type: string
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v2.7.5
    description: |-
      A more detailed description of the role of a person who is a contributor to
      the document.
  affiliation{_i}:
    category: Author information
    type: string
    repeatable: true
    description: The organization that a person who is a contributor to the document is affiliated with.
  affiliation_abbrev{_i}:
    category: Author information
    type: string
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v1.3.12
    description: |-
      The abbreviation of the organization that a person who is a contributor to the document
      is affiliated with.
  affiliation_subdiv{_i}:
    category: Author information
    type: comma-list
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v1.7.0
    version_history:
    - component: metanorma-standoc
      version: v2.8.3
    description: |-
      The subdivision of the organization that a person who is a contributor to the document
      is affiliated with.
      The subdivisions can be multiple (semicolon-delimited: processed via CSV, recognising quote marks),
      and they can also be hierarchical, with multiple levels of subdivision (comma-delimited,
      from larger to smaller) ;
      the different hierarchical levels can optionally be prefixed with type and a colon.
  affiliation_logo{_i}:
    category: Author information
    type: string
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v2.7.0
    description: |-
      The logo of the organization that a person who is a contributor to the document
      is affiliated with, specified as an image file.
  contributor-position{_i}:
    category: Author information
    type: string
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v2.3.9
    description: The position of the person within the organization.
  address{_i}:
    category: Author information
    type: string
    repeatable: true
    description: |-
      The organizational address of a person who is a contributor to the document.
      Mutually exclusive with street/city/region/country/postcode.
  street{_i}:
    category: Author information
    type: string
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v1.9.4
    description: |-
      The street component of the organization address of a person who is a contributor
      to the document.
  city{_i}:
    category: Author information
    type: string
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v1.9.4
    description: |-
      The city component of the organization address of a person who is a contributor
      to the document.
  region{_i}:
    category: Author information
    type: string
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v1.9.4
    description: |-
      The region component of the organization address of a person who is a contributor
      to the document.
  country{_i}:
    category: Author information
    type: string
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v1.9.4
    description: |-
      The country component of the organization address of a person who is a contributor
      to the document.
  postcode{_i}:
    category: Author information
    type: string
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v1.9.4
    description: |-
      The postcode component of the organization address of a person who is a contributor
      to the document.
  contributor-uri{_i}:
    category: Author information
    type: string
    repeatable: true
    description: The URI of a person who is a contributor to the document.
  email{_i}:
    category: Author information
    type: string
    repeatable: true
    description: The email of a person who is a contributor to the document.
  phone{_i}:
    category: Author information
    type: string
    repeatable: true
    description: The phone number of a person who is a contributor to the document.
  fax{_i}:
    category: Author information
    type: string
    repeatable: true
    description: The fax number of a person who is a contributor to the document.
  subdivision:
    category: Author information
    type: comma-list
    added_in:
      component: metanorma-standoc
      version: v1.6.1
    version_history:
    - component: metanorma-standoc
      version: v2.8.3
    description: |-
      The subdivision of the organization that is responsible for this
      document.
      The subdivisions can be multiple (semicolon-delimited: processed via CSV, recognising quote marks),
      and they can also be hierarchical, with multiple levels of subdivision (comma-delimited,
      from larger to smaller) ;
      the different hierarchical levels can optionally be prefixed with type and a colon.
  subdivision-abbr:
    category: Author information
    type: string
    added_in:
      component: metanorma-standoc
      version: v1.6.1
    description: |-
      The abbreviation of the subdivision of the organization that is responsible for this
      document.
  pub-address{_i}:
    category: Author information
    type: comma-list
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v1.6.1
    version_history:
    - component: metanorma-standoc
      version: v1.6.1
    description: |-
      The address of the organization responsible for this document, if it overrides
      the default..
      The number of this and subsequent attributes aligns with the number of
      `:publisher{_i}:`  +
      [NOTE]
      Each line in a multi-line address must end with `+ \`, e.g.

      [source,adoc]
      ----
      :pub-address: 1 Infinity Loop + \
      California + \
      United States of America
      ----
      NOTE: As of 2.7.0, if `:publisher:` is semicolon-delimited, instead of using numbered attributes,
      this and subsequent publisher attributes are ignored.
  pub-phone{_i}:
    category: Author information
    type: string
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v1.6.1
    description: |-
      The phone number of the organization responsible for this document, if it overrides
      the default.
  pub-fax{_i}:
    category: Author information
    type: string
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v1.6.1
    description: |-
      The fax number of the organization responsible for this document, if it overrides
      the default.
  pub-email{_i}:
    category: Author information
    type: string
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v1.6.1
    description: |-
      The email of the organization responsible for this document, if it overrides
      the default.
  pub-uri{_i}:
    category: Author information
    type: string
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v1.6.1
    description: |-
      The URI of the organization responsible for this document, if it overrides
      the default.
  sponsor-address{_i}:
    category: Author information
    type: string
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v2.7.0
    description: |-
      The address, phone number, fax number, email, URI of an organization sponsoring
      this document.
  sponsor-phone{_i}:
    category: Author information
    repeatable: true
    see: sponsor-address{_i}
  sponsor-fax{_i}:
    category: Author information
    repeatable: true
    see: sponsor-address{_i}
  sponsor-email{_i}:
    category: Author information
    repeatable: true
    see: sponsor-address{_i}
  sponsor-uri{_i}:
    category: Author information
    repeatable: true
    see: sponsor-address{_i}
  sponsor-subdivision{_i}:
    category: Author information
    type: comma-list
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v2.8.3
    description: |-
      The subdivision of the organization that is sponsoring this document.
      The subdivisions can be multiple (semicolon-delimited: processed via CSV, recognising quote marks),
      and they can also be hierarchical, with multiple levels of subdivision (comma-delimited,
      from larger to smaller) ;
      the different hierarchical levels can optionally be prefixed with type and a colon.
  authorizer{_i}:
    category: Author information
    type: string
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v2.8.3
    description: The organisation that authorised this document.
  authorizer_logo{_i}:
    category: Author information
    type: string
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v2.8.3
    description: |-
      The path to the logo of the authorizing organization, specified as an image
      file; the numbers in the attribute align to the `:authorizer{_i}:` attributes
      .
  authorizer-address{_i}:
    category: Author information
    type: string
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v2.8.3
    description: |-
      The address, phone number, fax number, email, URI of an organization authorizing
      this document.
  authorizer-phone{_i}:
    category: Author information
    repeatable: true
    see: authorizer-address{_i}
  authorizer-fax{_i}:
    category: Author information
    repeatable: true
    see: authorizer-address{_i}
  authorizer-email{_i}:
    category: Author information
    repeatable: true
    see: authorizer-address{_i}
  authorizer-uri{_i}:
    category: Author information
    repeatable: true
    see: authorizer-address{_i}
  authorizer-subdivision{_i}:
    category: Author information
    type: comma-list
    repeatable: true
    added_in:
      component: metanorma-standoc
      version: v2.8.3
    description: |-
      The subdivision of the organization that is authorizing this document.
      The subdivisions can be multiple (semicolon-delimited: processed via CSV, recognising quote marks),
      and they can also be hierarchical, with multiple levels of subdivision (comma-delimited,
      from larger to smaller) ;
      the different hierarchical levels can optionally be prefixed with type and a colon.
  fonts:
    category: Style customization
    subsection: Fonts
    type: comma-list
    added_in:
      component: metanorma-standoc
      version: v2.0.7
    example: |-
      Example of setting a custom font to Euphemia

      The https://www.tiro.com/syllabics/resources/index.html[Euphemia] font is
      an openly licensed font for end-users only commonly used to render
      https://en.wikipedia.org/wiki/Canadian_Aboriginal_syllabics[Canadian Syllabics].
      The font name `Euphemia` is supported by Fontist for unattended
      install. In a document that contains Canadian Syllabics, the following attributes
      can be used.

      :fonts: Euphemia
      :font-license-agreement: agree-to-terms
    description: |-
      Semicolon-delimited listing of fonts to be used for this document, in addition
      to the fonts predefined for the
      flavour. +

      Valid values are font names supported by https://www.fontist.org[Fontist].
      The full font name listing is available from the
      https://github.com/fontist/formulas[Fontist Formulas] repository.

      NOTE: This is currently only used in PDF generation.
  font-license-agreement:
    category: Style customization
    subsection: Fonts
    type: enum
    values:
    - name: no-install-fonts
      description: |-
        (default) do not install any additional fonts, even when
        listed in `:fonts:`.
    - name: agree-to-terms
      description: |-
        agree to all terms of the fonts that will be installed in an
        unattended manner.
    - name: continue-without-fonts
      description: |-
        do not warn if a font is not available on the
        system.
    default: no-install-fonts
    added_in:
      component: metanorma-standoc
      version: v2.0.7
    description: |-
      The response to the license agreement prompt by https://www.fontist.org[fontist]
      for the fonts specified in
      `:fonts:`.

      Valid values are:
  body-font:
    category: Style customization
    subsection: Fonts
    type: string
    description: |-
      Font for body text; will be inserted into CSS, overriding the default set for
      the particular Metanorma flavour.
  header-font:
    category: Style customization
    subsection: Fonts
    type: string
    description: |-
      Font for headers; will be inserted into CSS, overriding the default set for
      the particular Metanorma flavour.
  monospace-font:
    category: Style customization
    subsection: Fonts
    type: string
    description: |-
      Font for monospace; will be inserted into CSS, overriding the default set for
      the particular Metanorma flavour.
  html-stylesheet:
    category: Style customization
    subsection: HTML
    type: string
    legacy:
    - htmlstylesheet
    description: |-
      SCSS stylesheet to use for HTML output. Defaults to built-in stylesheet
      for the particular Metanorma flavour.  Overriding is not recommended.
  html-stylesheet-override:
    category: Style customization
    subsection: HTML
    type: string
    legacy:
    - htmlstylesheet-override
    added_in:
      component: metanorma-standoc
      version: v1.8.7
    description: |-
      CSS stylesheet to use for HTML output, inserted after the built-in stylesheet
      for the particular Metanorma flavour, and can be used to override
      it.
  html-cover-page:
    category: Style customization
    subsection: HTML
    type: string
    legacy:
    - htmlcoverpage
    description: |-
      HTML template for cover page.
      Defaults to built-in template for the particular Metanorma flavour.
      Overriding is not recommended.
  html-intro-page:
    category: Style customization
    subsection: HTML
    type: string
    legacy:
    - htmlintropage
    description: |-
      HTML template for introductory section.
      Defaults to built-in template for the particular Metanorma flavour.
      Overriding is not recommended.
  scripts:
    category: Style customization
    subsection: HTML
    type: string
    description: |-
      JavaScript scripts for HTML output.
      Defaults to built-in scripts for the particular Metanorma flavour.
      Overriding is not recommended.
  scripts-override:
    category: Style customization
    subsection: HTML
    type: string
    added_in:
      component: metanorma-standoc
      version: v1.9.4
    description: |-
      JavaScript scripts for HTML output. Inserted after any built-in
      scripts for the particular Metanorma flavour, and can be used to
      override them.
  scripts-pdf:
    category: Style customization
    subsection: HTML
    type: string
    deprecated: true
    description: |-
      JavaScript scripts for HTML to PDF output.
      Defaults to built-in scripts for the particular Metanorma flavour.
      Overriding is not recommended.
  presentation-metadata-papersize:
    category: Style customization
    subsection: PDF
    type: enum
    values:
    - name: Letter
    - name: letter
    - name: A4
    - name: a4
    description: |-
      PDF document page size. Can be used to override the page size in built-in stylesheet for the particular Metanorma flavour.
      Valid values are: `Letter`, `letter`, `A4` or `a4`.
  pdf-stylesheet:
    category: Style customization
    subsection: PDF
    type: string
    legacy:
    - pdfstylesheet
    added_in:
      component: metanorma-standoc
      version: v3.0.10
    description: |-
      XSLT stylesheet to use for PDF output.
      Defaults to built-in stylesheet for the particular Metanorma flavour.
      Overriding is not recommended.
  pdf-stylesheet-override:
    category: Style customization
    subsection: PDF
    type: string
    legacy:
    - pdfstylesheet-override
    added_in:
      component: metanorma-standoc
      version: 3.0.10
    description: |-
      XSLT stylesheet to use for PDF output, inserted after the built-in stylesheet
      for the particular Metanorma flavour, and can be used to override
      it.
  word-stylesheet:
    category: Style customization
    subsection: Word
    type: string
    legacy:
    - wordstylesheet
    description: |-
      Primary SCSS stylesheet to use for Word output.
      Defaults to built-in stylesheet for the particular Metanorma flavour.
      Overriding is not recommended.
  standard-stylesheet:
    category: Style customization
    subsection: Word
    type: string
    legacy:
    - standardstylesheet
    description: |-
      Secondary SCSS stylesheet use for Word output.
      Defaults to built-in template for the particular Metanorma flavour.
      Overriding is not recommended.
  word-stylesheet-override:
    category: Style customization
    subsection: Word
    type: string
    legacy:
    - wordstylesheet-override
    added_in:
      component: isodoc
      version: v1.8.7
    description: |-
      CSS stylesheet to use for Word output, inserted after the built-in stylesheet
      for the particular Metanorma flavour, and can be used to override
      it.
  header:
    category: Style customization
    subsection: Word
    type: string
    description: |-
      Header and footer file for Word output.
      Defaults to built-in template the particular Metanorma flavour.
      Overriding is not recommended.
  word-cover-page:
    category: Style customization
    subsection: Word
    type: string
    legacy:
    - wordcoverpage
    description: |-
      Word template for cover page.
      Defaults to built-in template for the particular Metanorma flavour.
      Overriding is not recommended.
  word-intro-page:
    category: Style customization
    subsection: Word
    type: string
    legacy:
    - wordintropage
    description: |-
      Word template for introductory section.
      Defaults to built-in template for the particular Metanorma flavour.
      Overriding is not recommended.
  ulstyle:
    category: Style customization
    subsection: Word
    type: string
    description: |-
      Word CSS selector for unordered lists in supplied stylesheets.
      Defaults to value for built-in stylesheet.
      Overriding is not recommended.
  olstyle:
    category: Style customization
    subsection: Word
    type: string
    description: |-
      Word CSS selector for ordered lists in supplied stylesheets.
      Defaults to value for built-in stylesheet.
      Overriding is not recommended.
  coverpage-image:
    category: Style customization
    subsection: Cover page
    type: comma-list
    description: |-
      Comma-delimited list of image locations, for images to be
      included on the (PDF) cover page. All image locations are relative to the source
      document. Currently only supported for BSI, ITU, JIS, Plateau.
      If the supplied image(s) is to replace the cover page(s) of the document in its
      entirety, and already includes title information, add
      the attribute `:presentation-metadata-full-coverpage-replacement: true` (supported for all flavours).
  innercoverpage-image:
    category: Style customization
    subsection: Cover page
    type: string
    description: |-
      Same, for images to be included on the (PDF) inside
      cover page. Currently only supported for BSI.
  tocside-image:
    category: Style customization
    subsection: Cover page
    type: string
    description: |-
      Same, for images to be included on the (PDF) Table of
      Contents side page. Currently only supported for BSI.
  backpage-image:
    category: Style customization
    subsection: Cover page
    type: string
    description: |-
      Same, for images to be included on the (PDF) back page.
      Currently only supported for BSI, JIS.
  data-uri-image:
    category: Image handling
    subsection: Data URI
    type: string
    default: 'true'
    added_in:
      component: metanorma-standoc
      version: v1.11.0
    description: |-
      Encode all images in Metanorma XML and HTML output as inline data-URIs.
      Defaults to `true`..
  data-uri-maxsize:
    category: Image handling
    subsection: Data URI
    type: boolean
    default: '13981013'
    added_in:
      component: metanorma-standoc
      version: v2.9.1
    description: |-
      Set the maximum permitted size of a Data URI-encoded image, in bytes.
      Defaults to `13981013` bytes (size of the Base-64 encoding of a 10 MB image).
      If set to `0`, no maximum is enforced..
  data-uri-attachments:
    category: Image handling
    subsection: Data URI
    type: string
    default: 'true'
    added_in:
      component: metanorma-standoc
      version: v2.8.10
    description: |-
      Encode all attachments in Metanorma XML as inline data-URIs.
      Defaults to `true`..
  svg-conform-profile:
    category: Image handling
    subsection: SVG
    type: string
    added_in:
      component: metanorma-standoc
      version: v3.2.1
    description: |-
      Profile of the https://github.com/claricle/svg_conform[`SVGConfirm`] software library to apply for
      SVG validation and repair. See https://github.com/claricle/svg_conform/blob/main/docs/profiles.adoc[SVG Profiles]
      for the available profile values. Metanorma by default uses the `metanorma` profile by default, except for
      IETF, which uses `svg_1_2_rfc`.
  plantuml-image-format:
    category: Image handling
    subsection: PlantUML
    type: enum
    values:
    - name: png
    - name: svg
    default: png
    added_in:
      component: metanorma-standoc
      version: v3.0.9
    description: |-
      Format to generate PlantUML diagrams as. Legal values are `png`, `svg`.
      Defaults to `png`..
  xrefstyle:
    category: Cross-references
    type: enum
    values:
    - name: short
      description: |-
        (default) the clause type and number is used as the cross-reference.
        .Example of a cross-reference rendered in the "short" style
        "Clause 3.1.2"
    - name: basic
      description: |-
        the title of the clause is used as the cross-reference.
        .Example of a cross-reference rendered in the "basic" style
        "Other considerations"
    - name: full
      description: |-
        combines the title with the clause type/number cross-reference.
        .Example of a cross-reference rendered in the "full" style
        "Clause 3.1.2, Other considerations"
    - name: id
      added_in:
        component: metanorma-standoc
        version: v2.2.7
      description: |-
        the cross-reference is to be rendered as the target anchor identifier
        (or any identifier aliasing the
        anchor).
        .Example of a cross-reference rendered in the "id" style
        The following cross-reference:

        [source,adoc]
        ----
        [[my-anchor]]
        === My title
        ...

        === Another place
        <<my-anchor>>
        ----

        Renders the cross-reference as:

        "my-anchor"
    default: short
    added_in:
      component: metanorma-standoc
      version: v2.2.6
    description: |-
      Override the default rendering style of internal cross-references to other
      locations in the
      document.
      Available styles as follows:
  erefstyle:
    category: Cross-references
    type: string
    added_in:
      component: metanorma-standoc
      version: v3.3.0
    description: |-
      Override the default rendering style of cross-references to bibliographic entries
      .
      The legal values for such override are drawn from link:/author/topics/inline-markup/citations/#citation-style-types[General citation style types].
  originstyle:
    category: Cross-references
    type: string
    added_in:
      component: metanorma-standoc
      version: v3.3.0
    description: |-
      Override the default rendering style of source references to bibliographic entries
      .
      The legal values for such override are drawn from link:/author/topics/inline-markup/citations/#citation-style-types[General citation style types].
  modspec-identifier-base:
    category: Cross-references
    type: string
    added_in:
      component: metanorma-standoc
      version: v2.2.7
    description: |-
      (optional)
      Base identifier pattern for ModSpec instances throughout the document. The
      attribute value provides a prefix that will be removed from all ModSpec instance
      identifiers used to cross-reference ModSpec instances. The specification of the
      pattern only affects the rendering of cross-references, not the underlying XML
      representation of the ModSpec instances. See more details at
      link:/author/topics/blocks/requirements-modspec/#identifier-base[ModSpec identifier base].
  block-unnumbered:
    category: Cross-references
    type: comma-list
    added_in:
      component: metanorma-standoc
      version: v2.4.6
    description: |-
      (optional)
      A comma-delimited list of Metanorma block names, which should have numbering
      suppressed throughout the document.
      Typically will be used for sourcecode fragments: `:block-unnumbered: sourcecode`.
  smartquotes:
    category: Smart quotes
    type: enum
    values:
    - name: 'true'
      description: |-
        (default) Smart quotes are not applied to the following type of text:
        *** text in source code;
        *** text in pseudo-code;
        *** text in monospace.
    - name: 'false'
      description: |-
        The AsciiDoc default is used to generate smart quotes:
        `"&#x060; &#x060;"`, `'&#x060; &#x060;'`. The rules for smart formatting follow
        the https://github.com/pbhogan/sterile[sterile] gem, and are given in
        https://github.com/pbhogan/sterile/blob/main/lib/sterile/data/smart_format_rules.rb[smart_format_rules.rb].
        In particular:
    default: 'true'
    description: |-
      Apply "`smart quotes`" and other auto-formatting to the XML output (and hence
      the downstream outputs). Available values below:

      * `"` and `'` followed by space, with optional punctuation intervening, are treated as closing,
      and converted to smart closing quotes `”` and `’`.
      * `"` and `'` preceded by space, with optional punctuation intervening, are treated as opening,
      and converted to smart opening quotes `“` and `‘`.
      * Midword apostrophes are treated as closing: `Sana'a` becomes `Sana’a`.
      * Initial apostrophes before numerals are treated as closing: `'80s` becomes `’80s`.
      * There are many possible exceptions to these default rules, such as initial apostrophes
      (`fish ’n’ chips`), and quote pairs used to illustrate the punctuation (`Use smart quotes (" ")`).
      For such cases, use either real smart quotes (the literal characters `“ ” ‘ ’`) or the Asciidoc
      ASCII codes, `"&#x060; &#x060;"`, `'&#x060; &#x060;'`

      The smart quotes converted by Metanorma postprocessing are specifically those of English.
      Other languages' smart quotes will need to be entered as the correct characters.

      NOTE: `:smartquotes:` is a document-wide toggle. To keep *specific* runs of text as
      straight quotes while the rest of the document remains smart-quoted — for example,
      literal characters quoted from a specification, such as PDF string-delimiter operators —
      use link:/author/topics/blocks/passthroughs#pass-format-straightquotes[`pass-format:straightquotes["..."]`].
  toclevels:
    category: Table of contents
    type: integer
    default: '2'
    description: |-
      Number of table of contents levels to render. Accepts an integer value. (default: `2`).
      Can be overridden with output-specific options (`htmltoclevels`, `doctoclevels`).
  toclevels-html:
    category: Table of contents
    type: integer
    default: '2'
    added_in:
      component: metanorma-standoc
      version: v2.7.5
    description: |-
      Number of table of contents levels to render in HTML output; used to override
      `:toclevels:` for HTML output. Accepts an integer value. (default: `2`).
      Formerly `:htmltoclevels:`.
  toclevels-doc:
    category: Table of contents
    type: integer
    default: '2'
    added_in:
      component: metanorma-standoc
      version: v2.7.5
    description: |-
      Number of table of contents levels to render in Microsoft Word "DOC" output;
      used to override `:toclevels:` for Word DOC output. Accepts an integer value.
      (default: `2`).
      Formerly `:doctoclevels:`.
  toclevels-pdf:
    category: Table of contents
    type: integer
    default: '2'
    added_in:
      component: metanorma-standoc
      version: v2.7.5
    description: |-
      Number of table of contents levels to render in PDF output;
      used to override `:toclevels:` for PDF output.
      Accepts an integer value. (default: `2`)
  toc-figures:
    category: Table of contents
    type: boolean
    added_in:
      component: metanorma-standoc
      version: v2.0.4
    version_history:
    - component: metanorma-standoc
      version: v3.4.9
    description: |-
      Introduce table of contents for figures.
      No attribute value needed.
      Only numbered and/or captioned figures are included.
      Disabled if given the value `false`.
  toc-tables:
    category: Table of contents
    type: boolean
    added_in:
      component: metanorma-standoc
      version: v2.0.4
    version_history:
    - component: metanorma-standoc
      version: v3.4.9
    description: |-
      Introduce table of contents for tables.
      No attribute value needed.  Only numbered and/or captioned tables are included.
      Disabled if given the value `false`.
  toc-examples:
    category: Table of contents
    type: boolean
    added_in:
      component: metanorma-standoc
      version: v3.4.7
    version_history:
    - component: metanorma-standoc
      version: v3.4.9
    description: |-
      Introduce table of contents for examples.
      No attribute value needed.
      Only numbered and/or captioned examples are included.
      Disabled if given the value `false`.
  toc-requirements:
    category: Table of contents
    type: boolean
    added_in:
      component: metanorma-standoc
      version: v2.0.4
    version_history:
    - component: metanorma-standoc
      version: v3.4.9
    description: |-
      Introduce table of contents for requirements, recommendations, and
      permissions.
      No attribute value needed.
      Only numbered and/or captioned requirements, recommendations, and permissions are included.
      Disabled if given the value `false`.
  break-up-urls-in-tables:
    category: Tables
    type: boolean
    added_in:
      component: metanorma-standoc
      version: v1.3.25
    description: |-
      If present, long strings in table cells are broken up on rendering, to help
      tables fit within the page width.  No attribute value needed..
      The current behaviour is: strings are broken by zero-width spaces;
      words are broken up every 10 characters on punctuation (e.g. URIs on / ),
      and every 20 characters if there is no punctuation in the word,
      in order to deal with very narrow columns. (Because the break is zero-width,
      it will not be visible unless it coincides with the end of a column.)
  sourcecode-markup-start:
    category: Sourcecode
    type: string
    added_in:
      component: metanorma-standoc
      version: v1.7.4
    description: Initial delimiter for markup inserted in sourcecode
  sourcecode-markup-end:
    category: Sourcecode
    type: string
    added_in:
      component: metanorma-standoc
      version: v1.7.4
    description: Final delimiter for markup inserted in sourcecode
  source-highlighter:
    category: Sourcecode
    type: boolean
    default: 'true'
    added_in:
      component: metanorma-standoc
      version: v2.3.2
    description: Whether to use a source highlighter for sourcecode; default value is true
  source-linenums-option:
    category: Sourcecode
    type: boolean
    default: 'false'
    added_in:
      component: metanorma-standoc
      version: v2.3.2
    description: Provided a source highlighter is being used, whether to display line numbers; default value is false
  bare:
    category: Sourcecode
    type: string
    added_in:
      component: metanorma-standoc
      version: v1.9.4
    description: |-
      (optional)
      The document is rendered in "`bare form`" -- without the cover page,
      boilerplate, or introductory text expected of a complete
      document.
      This is typically used for HTML output, e.g. clauses as standalone documents, or document attachments.
  base-asset-path:
    category: Sourcecode
    type: string
    added_in:
      component: metanorma-standoc
      version: v1.10.7
    description: |-
      (optional)
      All media paths in the XML path are relative to the given directory; used when
      the Metanorma XML file to be processed is not necessarily in the same directory
      as the source Metanorma AsciiDoc file, and the media file paths are given as
      relative and not absolute file locations (and are not encoded as data URIs via
      `:data-uri-image:`).
  log-filter-severity:
    category: Logging
    type: string
    added_in:
      component: metanorma-standoc
      version: v2.9.7
    description: |-
      Filter from error log all warnings at the given severity level or above it.
      See link:/author/topics/output/validation[Validation] for valid values.
  log-filter-category:
    category: Logging
    type: comma-list
    added_in:
      component: metanorma-standoc
      version: v2.9.7
    description: |-
      Filter from error log all warnings belonging to one of the named categories; comma-delimited.
      See link:/author/topics/output/validation[Validation] for valid values.
  log-filter-error-ids:
    category: Logging
    type: comma-list
    added_in:
      component: metanorma-standoc
      version: v3.2.1
    description: |-
      Filter from error log all warnings with the identifiers of individual errors to exclude (comma-delimited).
      See link:/author/topics/output/validation#error-id[Error ID].
      .
  pdf-encrypt:
    category: PDF protection and permissions
    type: enum
    values:
    - name: 'true'
      description: Applies encryption to PDF output.
    - name: 'false'
      description: Do not encrypt PDF output. (default)
    default: 'false'
    description: Specify encryption of PDF output.
  pdf-encryption-length:
    category: PDF protection and permissions
    type: enum
    values:
    - name: '256'
      description: Use 256-bit AES keys (default)
    - name: '128'
      description: Use 128-bit AES keys.
    default: '256'
    description: Specify encryption strength.
  pdf-user-password:
    category: PDF protection and permissions
    type: string
    description: |-
      Specify user password needed to open the encrypted PDF document.
      The attribute value sets the user password.
  pdf-owner-password:
    category: PDF protection and permissions
    type: string
    description: |-
      Specify owner password to bypass restrictions on encrypted PDF document.
      The attribute value sets the owner password.
  pdf-allow-copy-content:
    category: PDF protection and permissions
    type: enum
    values:
    - name: 'true'
      description: Content can be copy-pasted from the PDF document. (default)
    - name: 'false'
      description: Content cannot be copy-pasted from the PDF document.
    default: 'true'
    description: Allow content to be copy-pasted from the PDF document.
  pdf-allow-edit-content:
    category: PDF protection and permissions
    type: enum
    values:
    - name: 'true'
      description: Content of the PDF document can be edited. (default)
    - name: 'false'
      description: Content of the PDF document cannot be edited.
    default: 'true'
    description: Allow content of the PDF document to be edited.
  pdf-allow-assemble-document:
    category: PDF protection and permissions
    type: enum
    values:
    - name: 'true'
      description: Inserting, deleting or rotating pages in the PDF document is allowed. (default)
    - name: 'false'
      description: Inserting, deleting or rotating pages in the PDF document is disallowed.
    default: 'true'
    description: Allow inserting, deleting, or rotating pages in the PDF document.
  pdf-allow-edit-annotations:
    category: PDF protection and permissions
    type: enum
    values:
    - name: 'true'
      description: Annotations and signatures can be added to the PDF document. (default)
    - name: 'false'
      description: Annotations and signatures cannot be added to the PDF document.
    default: 'true'
    description: Allow annotations and signatures to be added to the PDF document.
  pdf-allow-print:
    category: PDF protection and permissions
    type: enum
    values:
    - name: 'true'
      description: PDF content can be printed, physically or to a file. (default)
    - name: 'false'
      description: PDF content cannot be printed, physically or to a file.
    default: 'true'
    description: Allow PDF document to be printed, physically or to a file.
  pdf-allow-print-hq:
    category: PDF protection and permissions
    type: enum
    values:
    - name: 'true'
      description: PDF content can be printed in high quality. (default)
    - name: 'false'
      description: PDF content cannot be printed in high quality.
    default: 'true'
    description: Allow PDF document to be printed in high quality.
  pdf-allow-fill-in-forms:
    category: PDF protection and permissions
    type: enum
    values:
    - name: 'true'
      description: Forms in the PDF document can be filled in. (default)
    - name: 'false'
      description: Forms in the PDF document are read-only, they cannot be filled in.
    default: 'true'
    description: Allow forms to be filled in the PDF document.
  pdf-allow-access-content:
    category: PDF protection and permissions
    type: enum
    values:
    - name: 'true'
      description: Text and graphics can be extracted from the PDF document. (default)
    - name: 'false'
      description: Text and graphics cannot be extracted from the PDF document.
    default: 'true'
    description: Allow text and graphics extraction from the PDF document for accessibility purposes.
  pdf-encrypt-metadata:
    category: PDF protection and permissions
    type: enum
    values:
    - name: 'true'
      description: The PDF metadata stream will be encrypted. (default)
    - name: 'false'
      description: The PDF metadata stream will not be encrypted.
    default: 'true'
    description: Specify encryption of the metadata stream.
