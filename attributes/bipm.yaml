# yaml-language-server: $schema=../schemas/attribute-manifest.schema.yaml
# Metanorma document attributes — BIPM
# Generated by scripts/extract-attributes.rb on 2026-07-22; reviewed against gem validators.
---
flavor: bipm
label: BIPM
inherits_from: standoc
gem: metanorma-bipm
source: flavors/bipm/ref/document-attributes.adoc
notes: See /flavors/bipm/ref/notes/ for additional guidance.
description: |-
  [[note_general_doc_ref_doc_attrib]]
  [NOTE]
  ====
  The document attributes listed below are unique to Metanorma's processing of BIPM documents.

  For _common document attributes_, see link:/author/ref/document-attributes[Document attributes reference] in general Metanorma author's documentation. That page describes attributes that apply to all Metanorma flavors, not just BIPM.

  For an _introduction to Metanorma AsciiDoc document attributes_ and how Metanorma uses them, see link:/author/ref/document-attributes/[the corresponding topic].
  ====
attributes:
  edition:
    category: Document information
    type: string
    description: The document edition.
  revdate:
    category: Document information
    type: date
    description: The date the document was last updated.
  copyright-year:
    category: Document information
    type: string
    description: |-
      The year which will be claimed as when the copyright for
      the document was issued.
  doctype:
    category: Document information
    type: enum
    required: true
    description: |-
      *Mandatory.* The document type. Permitted types are:
      * `brochure` (default)
      * `mise-en-pratique`
      * `rapport`
      * `monographie`
      * `guide`
      * `meeting-report`
      * `technical-report`
      * `working-party-note`
      * `strategy`
      * `cipm-mra`
      * `resolution`
      * `policy` (for JCTLM)
    values:
    - name: brochure
      description: Brochure.
      notes: Default document type (metanorma.yml default_doctype).
    - name: mise-en-pratique
      description: Mise en pratique.
    - name: rapport
      description: Rapport.
    - name: monographie
      description: Monographie.
    - name: guide
      description: Guide.
    - name: meeting-report
      description: Meeting report.
    - name: technical-report
      description: Technical report.
    - name: working-party-note
      description: Working party note.
      notes: 'Documented on the source page and labelled in the gem i18n files, but NOT accepted by the current validator: metanorma.yml doctypes lists `working-part-note` instead, so the converter (metanorma-generic lib/metanorma/generic/converter.rb doctype) logs GENERIC_1 and silently falls back to `brochure`.'
    - name: strategy
      description: Strategy.
    - name: cipm-mra
      description: CIPM MRA.
    - name: resolution
      description: Resolution.
    - name: policy
      description: Policy (for JCTLM).
      notes: Added in metanorma-bipm v2.4.3 (per source page).
    - name: working-part-note
      description: Working party note (gem configuration spelling).
      notes: 'Accepted by the current metanorma-bipm configuration (metanorma.yml doctypes) but not documented on the source page. Almost certainly an upstream typo of `working-party-note`: the gem i18n files label `working-party-note` (lib/isodoc/bipm/i18n-fr.yaml) and have no entry for `working-part-note`.'
    notes: Value set cross-checked against metanorma.yml doctypes (enforced at conversion time by metanorma-generic converter.rb doctype, fallback `brochure`).
  status:
    category: Document information
    type: enum
    description: |-
      The document status. Permitted types are:
      * `draft-proposal`
      * `draft-development`
      * `in-force`
      * `retired`
    values:
    - name: draft-proposal
      description: Draft proposal.
    - name: draft-development
      description: Draft development.
    - name: in-force
      description: In force.
      notes: Default stage (metanorma.yml default_stage) and a published stage.
    - name: retired
      description: Retired.
      notes: Published stage (metanorma.yml published_stages).
    notes: Value set cross-checked against metanorma.yml stage_abbreviations + published_stages + default_stage; enforced by metanorma-generic validate.rb stage_validate. All four documented values match the gem exactly.
  language:
    category: Document information
    type: enum
    required: true
    description: "*Mandatory.* The language of the document (`en` or `fr`)"
    values:
    - name: en
      description: English.
    - name: fr
      description: French.
    notes: Only `en` and `fr` ship i18n in the gem (metanorma.yml i18nyaml).
  title-en:
    category: Document information
    type: string
    required: true
    description: "*Mandatory.* The title of the document in English. For JCGM documents treated as equivalent to `title-main-en` in ISO."
  title-fr:
    category: Document information
    type: string
    required: true
    description: "*Mandatory.* The title of the document in French. For JCGM documents treated as equivalent to `title-main-fr` in ISO."
  title-cover-en:
    category: Document information
    type: string
    description: The title of the front cover of the document in English (where different from the title proper).
  title-cover-fr:
    category: Document information
    type: string
    description: The title of the front cover of the document in French (where different from the title proper).
  title-part-en:
    category: Document information
    type: string
    description: The title of the document part in English (if applicable).
  title-part-fr:
    category: Document information
    type: string
    description: The title of the document part in French (if applicable).
  title-subpart-en:
    category: Document information
    type: string
    description: The title of the document subpart in English (if applicable).
  title-subpart-fr:
    category: Document information
    type: string
    description: The title of the document subpart in French (if applicable).
  title-appendix-en:
    category: Document information
    type: string
    description: The title of the appendix in English, if this document is an appendix published separately; `title-en` becomes the title of the main document, as presented within the standalone appendix.
  title-appendix-fr:
    category: Document information
    type: string
    description: The title of the appendix in French, if this document is an appendix published separately; `title-fr` becomes the title of the main document, as presented within the standalone appendix.
  title-annex-en:
    category: Document information
    type: string
    added_in:
      component: metanorma-bipm
      version: v1.0.2
    description: The title of the annex in English, if this document is an annex of an appendix published separately ; `title-appendix-en` becomes the title of the main document, as presented within the standalone appendix.
  title-annex-fr:
    category: Document information
    type: string
    added_in:
      component: metanorma-bipm
      version: v1.0.2
    description: The title of the annex in French, if this document is an annex of an appendix published separately ; `title-appendix-fr` becomes the title of the main document, as presented within the standalone appendix.
  title-provenance-en:
    category: Document information
    type: string
    added_in:
      component: metanorma-bipm
      version: v1.0.8
    description: A subtitle giving the provenance of the document, in English.
  title-provenance-fr:
    category: Document information
    type: string
    added_in:
      component: metanorma-bipm
      version: v1.0.8
    description: A subtitle giving the provenance of the document, in French.
  partnumber:
    category: Document information
    type: string
    description: The number of the document part, if applicable. If it is in the format `m.n`, the portion after the period becomes the subpart number.
  appendix-id:
    category: Document information
    type: string
    description: The number of the appendix, if this document is an appendix published separately. (Naming of appendices and annexes varies by document-scheme. The attribute name remains consistently `appendix-id` for the top level of ancillary content.)
  annex-id:
    category: Document information
    type: string
    added_in:
      component: metanorma-bipm
      version: v1.0.2
    description: |-
      The number of the annex of the appendix, if this document is an annex of an appendix published separately.
      (Naming of appendices and annexes varies by document-scheme. The attribute name remains consistently `annex-id` for the second level of ancillary content.)
  si-aspect:
    category: Document information
    type: enum
    description: |-
      The domain of SI covered by the document; used to select logo in PDF cover page. The logo nominates one primary SI base units, and defining consonants for that unit and possibly others as well. Permitted values are:
      * `A_e_deltanu` (ampere; time)
      * `A_e` (ampere)
      * `cd_Kcd_h_deltanu` (candela; mass, time)
      * `cd_Kcd` (candela)
      * `full` (all units)
      * `K_k_deltanu` (kelvin; mass, time)
      * `K_k` (kelvin)
      * `kg_h_c_deltanu` (kilogram; length, time)
      * `kg_h` (kilogram)
      * `m_c_deltanu` (metre; time)
      * `m_c` (metre)
      * `mol_NA` (mole)
      * `s_deltanu` (second)
      NOTE: See the https://github.com/metanorma/metanorma-bipm/issues/14[SI Aspect implementation issue] for rendering details.
    values:
    - name: A_e_deltanu
      description: Ampere; time.
    - name: A_e
      description: Ampere.
    - name: cd_Kcd_h_deltanu
      description: Candela; mass, time.
    - name: cd_Kcd
      description: Candela.
    - name: full
      description: All units.
    - name: K_k_deltanu
      description: Kelvin; mass, time.
      notes: 'Documented on the source page and accepted by lib/isodoc/bipm/metadata.rb SI_ASPECT (PDF logo selection), but REJECTED by the current validator: lib/metanorma/bipm/validate.rb SI_ASPECT_VALUES lists `K_k_deltanu_h` instead.'
    - name: K_k
      description: Kelvin.
    - name: kg_h_c_deltanu
      description: Kilogram; length, time.
    - name: kg_h
      description: Kilogram.
    - name: m_c_deltanu
      description: Metre; time.
    - name: m_c
      description: Metre.
    - name: mol_NA
      description: Mole.
    - name: s_deltanu
      description: Second.
      notes: 'Documented on the source page and accepted by lib/isodoc/bipm/metadata.rb SI_ASPECT (PDF logo selection), but REJECTED by the current validator: absent from lib/metanorma/bipm/validate.rb SI_ASPECT_VALUES.'
    - name: K_k_deltanu_h
      description: Kelvin; mass, time (validator spelling).
      notes: Accepted by the current metanorma-bipm validator (lib/metanorma/bipm/validate.rb SI_ASPECT_VALUES) but not documented on the source page and absent from lib/isodoc/bipm/metadata.rb SI_ASPECT (PDF logo selection), which uses `K_k_deltanu` instead.
    - name: units_A
      description: Not documented on the source page.
      notes: Accepted by the current metanorma-bipm validator (lib/metanorma/bipm/validate.rb SI_ASPECT_VALUES) but absent from lib/isodoc/bipm/metadata.rb SI_ASPECT (PDF logo selection).
    - name: units_cd
      description: Not documented on the source page.
      notes: Accepted by the current metanorma-bipm validator (lib/metanorma/bipm/validate.rb SI_ASPECT_VALUES) but absent from lib/isodoc/bipm/metadata.rb SI_ASPECT (PDF logo selection).
    - name: units_full
      description: Not documented on the source page.
      notes: Accepted by the current metanorma-bipm validator (lib/metanorma/bipm/validate.rb SI_ASPECT_VALUES) but absent from lib/isodoc/bipm/metadata.rb SI_ASPECT (PDF logo selection).
    - name: units_K
      description: Not documented on the source page.
      notes: Accepted by the current metanorma-bipm validator (lib/metanorma/bipm/validate.rb SI_ASPECT_VALUES) but absent from lib/isodoc/bipm/metadata.rb SI_ASPECT (PDF logo selection).
    - name: units_kg
      description: Not documented on the source page.
      notes: Accepted by the current metanorma-bipm validator (lib/metanorma/bipm/validate.rb SI_ASPECT_VALUES) but absent from lib/isodoc/bipm/metadata.rb SI_ASPECT (PDF logo selection).
    - name: units_m
      description: Not documented on the source page.
      notes: Accepted by the current metanorma-bipm validator (lib/metanorma/bipm/validate.rb SI_ASPECT_VALUES) but absent from lib/isodoc/bipm/metadata.rb SI_ASPECT (PDF logo selection).
    - name: units_mol
      description: Not documented on the source page.
      notes: Accepted by the current metanorma-bipm validator (lib/metanorma/bipm/validate.rb SI_ASPECT_VALUES) but absent from lib/isodoc/bipm/metadata.rb SI_ASPECT (PDF logo selection).
    - name: units_s
      description: Not documented on the source page.
      notes: Accepted by the current metanorma-bipm validator (lib/metanorma/bipm/validate.rb SI_ASPECT_VALUES) but absent from lib/isodoc/bipm/metadata.rb SI_ASPECT (PDF logo selection).
    notes: 'The gem carries two disagreeing value sets: the validator (validate.rb SI_ASPECT_VALUES, 20 values) and the metadata logo list (isodoc/bipm/metadata.rb SI_ASPECT, 13 values = the documented set). Documented values match metadata.rb exactly; deltas against validate.rb are annotated per value.'
  meeting-note:
    category: Document information
    type: string
    description: Note on when and where a guide was adopted.
  document-scheme:
    category: Document information
    type: enum
    added_in:
      component: metanorma-bipm
      version: v2.6.11
    description: |-
      Specifies different behaviour based on date of scheme. If the scheme is `2019`, the labels of
      second-level and third-level ancillary content are _Appendix/Annex_ in English, _Annexe/Annexe_ in French.
      If the scheme is `2021` or later, the labels are _Annex/Annexe_ in English,
      _Appendix/Appendice_ in French.
    values:
    - name: '2019'
      description: Labels of second-level and third-level ancillary content are _Appendix/Annex_ in English, _Annexe/Annexe_ in French.
    - name: '2021'
      description: Labels of second-level and third-level ancillary content are _Annex/Annexe_ in English, _Appendix/Appendice_ in French (scheme 2021 or later).
      notes: 'Default scheme (lib/isodoc/bipm/presentation_xml_convert.rb: `@docscheme ||= "2021"`). Added in metanorma-bipm v2.6.11 (per source page).'
    notes: Cross-checked against lib/metanorma/bipm/front.rb:119 (`@document_scheme == "2019"`) and lib/isodoc/bipm/presentation_xml_convert.rb:29,40. Any value other than `2019` behaves as `2021`.
  supersedes:
    category: Document dates and relationships
    type: comma-list
    description: |-
      One or more BIPM document that this BIPM document standard supersedes; the superseded
      document may still remain in effect. Identified with document identifier. Comma delimited.
  superseded-by:
    category: Document dates and relationships
    type: comma-list
    description: |-
      One or more BIPM document that this BIPM document standard is superseded by; this
      document may still remain in effect. Identified with document identifier. Comma delimited.
  supersedes-date_{i}:
    category: Document dates and relationships
    type: string
    description: |-
      Date of the document draft or version which this document supersedes.
      Assumes superseded document does not have distinct identifier.

      Date of the document draft or version which this document supersedes.
  supersedes-draft_{i}:
    category: Document dates and relationships
    type: string
    description: |-
      Draft of the document which this document supersedes.
      Assumes superseded document does not have distinct identifier.

      Draft of the document which this document supersedes.
  supersedes-edition{i}:
    category: Document dates and relationships
    type: string
    description: |-
      Version of the document which this document supersedes.
      Assumes superseded document does not have distinct identifier.
  comment-period-from:
    category: Document dates and relationships
    type: string
    description: Start of the period during which comments are allowed on the document draft.
  comment-period-to:
    category: Document dates and relationships
    type: string
    description: End of the period during which comments are allowed on the document draft. (optional)
  obsoleted-date:
    category: Document dates and relationships
    type: date
    description: The date a document was superseded.
  implemented-date:
    category: Document dates and relationships
    type: date
    description: The date a document became effective.
  supersedes-version_{i}:
    category: Document dates and relationships
    type: string
    description: Version of the document which this document supersedes.
  committee-en:
    category: Contribution information
    type: string
    required: true
    description: "*Mandatory.* The name of the relevant committee in English. This includes inter-organization entities."
  committee-fr:
    category: Contribution information
    type: string
    required: true
    description: "*Mandatory.* The name of the relevant committee in French. This includes inter-organization entities."
  committee-acronym:
    category: Contribution information
    type: enum
    required: true
    description: |-
      *Mandatory.* The acronym of the relevant committee. This includes inter-organization entities.
      * `CGPM`: General Conference on Weights and Measures / Conférence générale des poids et mesures
      * `CIPM`: International Committee for Weights and Measures / Comité international des poids et mesures
      * `BIPM`: International Bureau of Weights and Measures / Bureau International des Poids et Mesures
      * `CCAUV`: Consultative Committee for Acoustics, Ultrasound and Vibration / Comité consultatif de l'acoustique, des ultrasons et des vibrations
      * `CCEM`: Consultative Committee for Electricity and Magnetism / Comité consultatif d'électricité et magnétisme
      * `CCL`: Consultative Committee for Length / Comité consultatif des longueurs
      * `CCM`: Consultative Committee for Mass and Related Quantities / Comité consultatif pour la masse et les grandeurs apparentées
      * `CCPR`: Consultative Committee for Photometry and Radiometry / Comité consultatif de photométrie et radiométrie
      * `CCQM`: Consultative Committee for Amount of Substance: Metrology in Chemistry and Biology / Comité consultatif pour la quantité de matière : métrologie en chimie et biologie
      * `CCRI`: Consultative Committee for Ionizing Radiation / Comité consultatif des rayonnements ionisants
      * `CCT`: Consultative Committee for Thermometry / Comité consultatif de thermométrie
      * `CCTF`: Consultative Committee for Time and Frequency / Comité consultatif du temps et des fréquences
      * `CCU`: Consultative Committee for Units / Comité consultatif des unités
      * `CCL-CCTF-WGFS`: CCL-CCTF Frequency Standards Working Group
      * `JCGM`: Joint Committee for Guides in Metrology / Comité commun pour les guides en métrologie
      * `JCRB`: Joint Committee of the Regional Metrology Organizations and the BIPM / Comité mixte des organisations régionales de métrologie et du BIPM
      * `JCTLM`: Joint Committee for Traceability in Laboratory Medicine / Comité commun pour la traçabilité en médecine de laboratoire
      * `INetQI`: International Network on Quality Infrastructure
    values:
    - name: CGPM
      description: General Conference on Weights and Measures / Conférence générale des poids et mesures.
    - name: CIPM
      description: International Committee for Weights and Measures / Comité international des poids et mesures.
    - name: BIPM
      description: International Bureau of Weights and Measures / Bureau International des Poids et Mesures.
    - name: CCAUV
      description: Consultative Committee for Acoustics, Ultrasound and Vibration / Comité consultatif de l'acoustique, des ultrasons et des vibrations.
    - name: CCEM
      description: Consultative Committee for Electricity and Magnetism / Comité consultatif d'électricité et magnétisme.
    - name: CCL
      description: Consultative Committee for Length / Comité consultatif des longueurs.
    - name: CCM
      description: Consultative Committee for Mass and Related Quantities / Comité consultatif pour la masse et les grandeurs apparentées.
    - name: CCPR
      description: Consultative Committee for Photometry and Radiometry / Comité consultatif de photométrie et radiométrie.
    - name: CCQM
      description: 'Consultative Committee for Amount of Substance: Metrology in Chemistry and Biology / Comité consultatif pour la quantité de matière : métrologie en chimie et biologie.'
    - name: CCRI
      description: Consultative Committee for Ionizing Radiation / Comité consultatif des rayonnements ionisants.
    - name: CCT
      description: Consultative Committee for Thermometry / Comité consultatif de thermométrie.
    - name: CCTF
      description: Consultative Committee for Time and Frequency / Comité consultatif du temps et des fréquences.
    - name: CCU
      description: Consultative Committee for Units / Comité consultatif des unités.
    - name: CCL-CCTF-WGFS
      description: CCL-CCTF Frequency Standards Working Group.
    - name: JCGM
      description: Joint Committee for Guides in Metrology / Comité commun pour les guides en métrologie.
    - name: JCRB
      description: Joint Committee of the Regional Metrology Organizations and the BIPM / Comité mixte des organisations régionales de métrologie et du BIPM.
    - name: JCTLM
      description: Joint Committee for Traceability in Laboratory Medicine / Comité commun pour la traçabilité en médecine de laboratoire.
    - name: INetQI
      description: International Network on Quality Infrastructure.
    notes: All 18 documented acronyms match metanorma.yml committees exactly. The validator (validate.rb committee_validate) additionally accepts the full English and French committee names listed in metanorma.yml, in both the subdivision name and identifier fields.
  workgroup:
    category: Contribution information
    type: string
    description: The name of the relevant workgroup.
  workgroup-acronym:
    category: Contribution information
    type: string
    description: The acronym of the relevant workgroup.
  role_{i}:
    category: Contribution information
    type: string
    description: |-
      If provided and is other than `author` or `editor` (e.g. "`WG-N co-chair`"),
      is treated as a subclass of `editor`.
