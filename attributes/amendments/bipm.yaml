document-scheme:
  add_values:
  - name: '2019'
    description: Labels of second-level and third-level ancillary content are _Appendix/Annex_
      in English, _Annexe/Annexe_ in French.
  - name: '2021'
    description: Labels of second-level and third-level ancillary content are _Annex/Annexe_
      in English, _Appendix/Appendice_ in French (scheme 2021 or later).
    notes: 'Default scheme (lib/isodoc/bipm/presentation_xml_convert.rb: `@docscheme
      ||= "2021"`). Added in metanorma-bipm v2.6.11 (per source page).'
  notes: Cross-checked against lib/metanorma/bipm/front.rb:119 (`@document_scheme
    == "2019"`) and lib/isodoc/bipm/presentation_xml_convert.rb:29,40. Any value other
    than `2019` behaves as `2021`.
language:
  add_values:
  - name: en
    description: English.
  - name: fr
    description: French.
  notes: Only `en` and `fr` ship i18n in the gem (metanorma.yml i18nyaml).
committee-acronym:
  add_values:
  - name: CGPM
    description: General Conference on Weights and Measures / Conférence générale
      des poids et mesures.
  - name: CIPM
    description: International Committee for Weights and Measures / Comité international
      des poids et mesures.
  - name: BIPM
    description: International Bureau of Weights and Measures / Bureau International
      des Poids et Mesures.
  - name: CCAUV
    description: Consultative Committee for Acoustics, Ultrasound and Vibration /
      Comité consultatif de l'acoustique, des ultrasons et des vibrations.
  - name: CCEM
    description: Consultative Committee for Electricity and Magnetism / Comité consultatif
      d'électricité et magnétisme.
  - name: CCL
    description: Consultative Committee for Length / Comité consultatif des longueurs.
  - name: CCM
    description: Consultative Committee for Mass and Related Quantities / Comité consultatif
      pour la masse et les grandeurs apparentées.
  - name: CCPR
    description: Consultative Committee for Photometry and Radiometry / Comité consultatif
      de photométrie et radiométrie.
  - name: CCQM
    description: 'Consultative Committee for Amount of Substance: Metrology in Chemistry
      and Biology / Comité consultatif pour la quantité de matière : métrologie en
      chimie et biologie.'
  - name: CCRI
    description: Consultative Committee for Ionizing Radiation / Comité consultatif
      des rayonnements ionisants.
  - name: CCT
    description: Consultative Committee for Thermometry / Comité consultatif de thermométrie.
  - name: CCTF
    description: Consultative Committee for Time and Frequency / Comité consultatif
      du temps et des fréquences.
  - name: CCU
    description: Consultative Committee for Units / Comité consultatif des unités.
  - name: CCL-CCTF-WGFS
    description: CCL-CCTF Frequency Standards Working Group.
  - name: JCGM
    description: Joint Committee for Guides in Metrology / Comité commun pour les
      guides en métrologie.
  - name: JCRB
    description: Joint Committee of the Regional Metrology Organizations and the BIPM
      / Comité mixte des organisations régionales de métrologie et du BIPM.
  - name: JCTLM
    description: Joint Committee for Traceability in Laboratory Medicine / Comité
      commun pour la traçabilité en médecine de laboratoire.
  - name: INetQI
    description: International Network on Quality Infrastructure.
  notes: All 18 documented acronyms match metanorma.yml committees exactly. The validator
    (validate.rb committee_validate) additionally accepts the full English and French
    committee names listed in metanorma.yml, in both the subdivision name and identifier
    fields.
meeting-note:
  set:
    type: string
    description: Note on when and where a guide was adopted.
