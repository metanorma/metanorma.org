doctype:
  add_values:
  - name: brochure
    description: Brochure.
    notes: Default document type (metanorma.yml default_doctype).
  - name: mise-en-pratique
    description: Mise en pratique.
  - name: rapport
    description: Rapport.
  - name: monographie
    description: Monographie.
  - name: guide
    description: Guide.
  - name: meeting-report
    description: Meeting report.
  - name: technical-report
    description: Technical report.
  - name: working-party-note
    description: Working party note.
  - name: strategy
    description: Strategy.
  - name: cipm-mra
    description: CIPM MRA.
  - name: resolution
    description: Resolution.
  - name: policy
    description: Policy (for JCTLM).
    notes: Added in metanorma-bipm v2.4.3 (per source page).
  - name: working-part-note
    description: Working party note (gem configuration spelling).
    notes: 'Accepted by the current metanorma-bipm configuration (metanorma.yml doctypes)
      but not documented on the source page. Almost certainly an upstream typo of
      `working-party-note`: the gem i18n files label `working-party-note` (lib/isodoc/bipm/i18n-fr.yaml)
      and have no entry for `working-part-note`.'
  notes_update:
    working-party-note: 'Documented on the source page and labelled in the gem i18n
      files, but NOT accepted by the current validator: metanorma.yml doctypes lists
      `working-part-note` instead, so the converter (metanorma-generic lib/metanorma/generic/converter.rb
      doctype) logs GENERIC_1 and silently falls back to `brochure`.'
  notes: Value set cross-checked against metanorma.yml doctypes (enforced at conversion
    time by metanorma-generic converter.rb doctype, fallback `brochure`).
  drop:
  - added_in
status:
  add_values:
  - name: draft-proposal
    description: Draft proposal.
  - name: draft-development
    description: Draft development.
  - name: in-force
    description: In force.
    notes: Default stage (metanorma.yml default_stage) and a published stage.
  - name: retired
    description: Retired.
    notes: Published stage (metanorma.yml published_stages).
  notes: Value set cross-checked against metanorma.yml stage_abbreviations + published_stages
    + default_stage; enforced by metanorma-generic validate.rb stage_validate. All
    four documented values match the gem exactly.
