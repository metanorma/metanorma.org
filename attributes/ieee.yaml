# yaml-language-server: $schema=../schemas/attribute-manifest.schema.yaml
# Metanorma document attributes — IEEE SA
# Generated by scripts/extract-attributes.rb on 2026-07-22; reviewed against gem validators.
---
flavor: ieee
label: IEEE SA
inherits_from: standoc
gem: metanorma-ieee
source: flavors/ieee/ref/document-attributes.adoc
notes: See /flavors/ieee/ref/contributors/ for contributor metadata guidance.
description: |-
  [[note_general_doc_ref_doc_attrib_ieee]]
  [NOTE]
  ====
  Document attributes listed below are unique to the processing of IEEE SA documents
  in Metanorma.

  For _common document attributes_, see link:/author/ref/document-attributes/[Document attributes reference] in general Metanorma author's documentation. That page describes attributes that apply to all Metanorma flavors, not just IEEE SA.

  For an _introduction to Metanorma AsciiDoc document attributes_ and how Metanorma uses them, see link:/author/ref/document-attributes/[the corresponding topic].
  ====
attributes:
  docnumber:
    category: Document information
    type: string
    example: |-
      Example for IEEE SA `docnumber`

      :docnumber: 2830
    description: 'In IEEE SA terms: the designation number for the document. Do not include the initial "P".'
  partnumber:
    category: Document information
    type: string
    added_in:
      component: isodoc
      version: v1.0.12
    description: The document part number, where applicable.
  subpartnumber:
    category: Document information
    type: string
    added_in:
      component: isodoc
      version: v1.0.12
    description: The document subpart number, where applicable.
  conformance:
    category: Document information
    type: string
    added_in:
      component: isodoc
      version: v1.0.12
    description: Specification of the conformance of the document, where applicable (e.g. _Conformance_ `02-2021`).
  draft:
    category: Document information
    type: string
    example: |-
      Example for IEEE SA `docstage`

      :docstage: draft
      :version: 2
    description: 'The draft number. Use together with `:docstage: draft`. Do not include the initial "D".'
  edition:
    category: Document information
    type: string
    example: |-
      Example for IEEE SA `edition`

      :edition: 1
    description: |-
      The edition number of the document. In case that a document is a
      draft, the edition number indicates the intended edition number.
  amendment-number:
    category: Document information
    type: string
    description: "(only when `docsubtype` is set to `amendment`) The number of the amendment."
  corrigendum-number:
    category: Document information
    type: string
    description: "(only when `docsubtype` is set to `corrigendum`) The number of the corrigendum."
  isbn-pdf:
    category: Document information
    type: string
    example: |-
      Example for IEEE SA `isbn-pdf`

      :isbn-pdf: 978-1-5044-7724-6
    description: The ISBN of the PDF document in ISBN-13 format.
  isbn-print:
    category: Document information
    type: string
    example: |-
      Example for IEEE SA `isbn-print`

      :isbn-print: 978-1-5044-7725-3
    description: The ISBN of the print document in ISBN-13 format.
  stdid-pdf:
    category: Document information
    type: string
    example: |-
      Example for IEEE SA `stdid-pdf`

      :stdid-pdf: STD24807
    description: The final standard identifier of the PDF document.
  stdid-print:
    category: Document information
    type: string
    example: |-
      Example for IEEE SA `stdid-print`

      :stdid-print: STDPD24807
    description: The final standard identifier of the print document.
  docstage:
    category: Document information
    type: enum
    values:
    - name: draft
      description: This document is in draft stage, being developed.
    - name: approved
      description: |-
        (default) This document has been approved by the IEEE SASB.
        NOTE: Approved does not necessarily mean published, it is a necessary stage
        prior to publication. However approved documents are rendered as published documents,
        with no draft indications.
    - name: superseded
      description: This document has been superseded.
    - name: withdrawn
      description: This document has been withdrawn.
    default: approved
    description: 'Document stages. Allowed values are:'
  doctype:
    category: Document information
    type: enum
    values:
    - name: standard
      description: This document is a Standard (default)
    - name: recommended-practice
      description: This document is a Recommended Practice
    - name: guide
      description: This document is a Guide
    - name: whitepaper
      description: This document is a White Paper
    - name: redline
      description: This document is a Redline product document
    - name: other
      description: This document is of a type not otherwise described
    default: standard
    description: |-
      Document type. Definitions of the document type are found on
      the https://standards.ieee.org/develop/drafting-standard/resources/[IEEE SA Style Manual].
      Choices:
  docsubtype:
    category: Document information
    type: enum
    values:
    - name: document
      description: Document is new or a revision (default)
    - name: amendment
      description: Document is an amendment
    - name: corrigendum
      description: Document is an corrigendum
    - name: erratum
      description: Document is an erratum
    - name: icap
      description: Document is an ICAP (IEEE Conformity Assessment Program) document (applies only to `whitepaper`)
    - name: industry-connections-report
      description: Document is an Industry Connections Report document (applies only to `whitepaper`)
      notes: 'Not recognised by the current gem as spelled: the code uses the singular `industry-connection-report` (lib/metanorma/ieee/front.rb:9, lib/isodoc/ieee/metadata.rb:144, lib/isodoc/ieee/presentation_xml_convert.rb:123). The validator (lib/metanorma/ieee/validate.rb doctype_validate) accepts only amendment, corrigendum, erratum, document and logs an IEEE_6 warning for any other subdoctype.'
    - name: industry-affiliate-network
      added_in:
        component: metanorma-ieee
        version: v1.5.3
      description: Document is an Industry Affiliate Network document
      notes: Documented on the source page (added in metanorma-ieee v1.5.3) but not referenced anywhere in metanorma-ieee lib code (checked master == v1.6.15); the validator (lib/metanorma/ieee/validate.rb doctype_validate) logs an IEEE_6 warning for it.
    - name: industry-connection-report
      description: Document is an Industry Connections Report document (applies only to `whitepaper`)
      notes: Spelling actually recognised by the gem (lib/metanorma/ieee/front.rb:9, lib/isodoc/ieee/metadata.rb:144, lib/isodoc/ieee/word_wp_convert.rb:35, spec/metanorma/base_spec.rb:413). The source page documents the plural `industry-connections-report`, which matches nothing in the gem. Not in the validator's accepted list -- doctype_validate logs an IEEE_6 warning for it.
    default: document
    description: 'Document subtype. Choices:'
  trial-use:
    category: Document information
    type: string
    description: |-
      Document published for a limited period of time.
      Can apply to any of the document types. (Default value: `false`.)
      NOTE: A Trial-Use standard is only described in the text of the introduction,
      it is not prominently displayed nor is it fielded data.
      NOTE: Please see
      https://standards.ieee.org/about/policies/opman/sect5/[Operations Manual, 5.7 Trial-Use standards]
      for more details.
  issued-date:
    category: Document information
    type: date
    example: |-
      Example for IEEE SA `issued-date`

      :issued-date: 2021-06-16
    description: |-
      The date on which the document was approved. (Applicable to drafts.)
      Like all dates in Metanorma, this must be supplied in `YYYY-MM-DD` format.
  feedback-ended-date:
    category: Document information
    type: date
    description: |-
      (conditional: used only when `trial-use` is set to `true`.)
      Specific to trial-use documents: the final date at which comments about the
      document will be accepted.
  ieee-sasb-approved-date:
    category: Document information
    type: date
    added_in:
      component: metanorma-ieee
      version: v1.5.3
    description: |-
      Date that the document was approved specifically by the
      IEEE SA Standards Board.
  obsoleted-date:
    category: Document information
    type: date
    description: |-
      ** When `trial-use` is set to `false`: the date on which the document will become `inactive`.
      NOTE: See https://standards.ieee.org/about/policies/opman/sect6/[Operations Manual, 6.3.3 Inactive standards] for details.

      ** When `trial-use` is set to `true`: the date on which the document will expire.
      NOTE: A trial-use document is effective for not more than three years
      (https://standards.ieee.org/about/policies/opman/sect5/[Operations Manual, 5.7 Trial-Use standards]).
  keywords:
    category: Document information
    type: comma-list
    example: |-
      Example for IEEE SA `keywords` (IEEE Std 2830(TM)-2021)

      :keywords: data fusion, IEEE 2830™, shared machine learning, SML, trusted execution environment, TEE
    description: Comma-delimited list of keywords associated with the document.
  doctitle:
    category: Document information
    type: string
    description: |-
      Document title.
      NOTE: Do not include the words "{Draft/IEEE} (Trial-Use) {Guide/Standard/Recommended Practice} for",
      these words are supplied automatically by Metanorma.
      NOTE: The `:doctitle:` value can also be set using the first line of the
      Metanorma AsciiDoc markup, prefaced by `= ` instead of setting the document
      attribute.
      .Example of default document titling
      ====
      [source,adoc]
      ----
      :doctitle: Spatial Web Protocol, Architecture and Governance
      :docstage: approved
      :doctype: recommended-practice
      ----

      Document title: _Spatial Web Protocol, Architecture and Governance_
      Full document title: _IEEE Recommended Practice for Spatial Web Protocol, Architecture and Governance_
      Abbreviated document title: _IEEE Rec. Prac. for Spatial Web Protocol, Architecture and Governance_

      ====
  title-full:
    category: Document information
    type: string
    added_in:
      component: metanorma-ieee
      version: v1.5.4
    description: |-
      Full document title
      By default, the words "(Draft/IEEE) (Trial-Use) {Guide/Standard/Recommended Practice} for" are prefixed
      to the supplied title automatically by Metanorma, depending on document metadata, in the form of the title
      used to render the document.
      In order to override this, users can supply the complete title of the document with this document
      attribute.
  title-abbrev:
    category: Document information
    type: string
    added_in:
      component: metanorma-ieee
      version: v1.5.4
    description: |-
      Abbreviated document title
      The full title of the document is abbreviated by Metanorma, for use in Word output headers,
      by constructing the full title depending on document metadata, but using a standard abbreviation
      for the document type.  In order to override this, users can supply the abbreviated title of the document with this document
      attribute.
      .Example of user-supplied document titling
      ====
      [source,adoc]
      ----
      :doctitle: Spatial Web Protocol, Architecture and Governance
      :docstage: approved
      :doctype: recommended-practice
      :title-full: IEEE Recommended Practice for Spatial Web Protocol
      :title-abbrev: IEEE Rec. Prac. for SWF
      ----

      Document title: _Spatial Web Protocol, Architecture and Governance_
      Full document title: _IEEE Recommended Practice for Spatial Web Protocol_
      Abbreviated document title: _IEEE Rec. Prac. for SWF_

      ====
  document-scheme:
    category: Document information
    type: enum
    values:
    - name: ieee-sa-2021
      description: |-
        (default)
        * A "Word usage" subclause will be supplied at the end of the "Overview"
        clause with contents defined in the IEEE SA Style Manual 2021.
        * The "Participants" clause will be automatically generated according to IEEE
        SA requirements using the information supplied by the user-defined "Participant"
        clauses.
    - name: legacy
      description: |-
        (all unsupported values fall back to `legacy`)
        Metanorma will not supply the "Word usage" subclause and will not
        generate or modify the "Participants" clause.
    default: ieee-sa-2021
    description: |-
      The document scheme that this document aligns to.
      Metanorma will enforce alignment as appropriate, including by supplying
      predefined sections.
      Accepted values:
  program:
    category: Document information
    type: string
    added_in:
      component: metanorma-ieee
      version: v1.1.6
    description: Program under which a white paper was authored.
  merges:
    category: Document relationships
    type: comma-list
    description: |-
      This document incorporates the document(s) with the nominated
      identifiers (semicolon-delimited). In IEEE identifiers, indicated as _incorporated_.
  updates:
    category: Document relationships
    type: comma-list
    description: |-
      This document is an update of the document(s) with the nominated
      identifiers (semicolon-delimited). Applies to revisions, as well as to appendices
      and corrigenda.
  supplements:
    category: Document relationships
    type: string
    added_in:
      component: isodoc
      version: v1.0.12
    description: |-
      This document is a supplement of the document with the nominated
      identifier.
  society:
    category: Document contributors
    subsection: Society
    type: string
    example: |-
      Example for IEEE SA `society`

      :society: Computer Society
    description: |-
      The IEEE society responsible for the document. Do not include the
      "IEEE" prefix.
  committee:
    category: Document contributors
    subsection: Committee
    type: string
    example: |-
      Example for IEEE SA `committee`

      :committee: C/AISC - Artificial Intelligence Standards Committee

      :committee: Standards Activities Board
    description: The committee responsible for the document.
  working-group:
    category: Document contributors
    subsection: Working group
    type: string
    example: |-
      Example for IEEE SA `working-group`

      :working-group: Spatial Web Working Group
    description: |-
      The working group responsible for the document.
      Include any final "Working Group" text in the group name.
  balloting-group:
    category: Document contributors
    subsection: Balloting group
    type: string
    description: |-
      The Standards Association balloting group responsible for the document.
      Do not supply the final "Standards Association balloting group" text in the group name;
      that is supplied by Metanorma.
  balloting-group-type:
    category: Document contributors
    subsection: Balloting group
    type: enum
    values:
    - name: individual
    - name: entity
    default: individual
    description: |-
      The type of the Standards Association balloting group responsible for the document,
      _individual_ or _entity_ (default: _individual_).
  surname:
    category: Document contributors
    subsection: Personal authors
    type: string
    aliases:
    - surname_2
    - surname_{i}
    description: Surname of personal authors
  surname_2:
    category: Document contributors
    subsection: Personal authors
    alias_of: surname
  surname_{i}:
    category: Document contributors
    subsection: Personal authors
    alias_of: surname
  givenname:
    category: Document contributors
    subsection: Personal authors
    type: string
    aliases:
    - givenname_2
    - givenname_{i}
    description: Given name of personal authors
  givenname_2:
    category: Document contributors
    subsection: Personal authors
    alias_of: givenname
  givenname_{i}:
    category: Document contributors
    subsection: Personal authors
    alias_of: givenname
  contributor-position:
    category: Document contributors
    subsection: Personal authors
    type: string
    description: Job title of personal authors
  contributor-position_2:
    category: Document contributors
    subsection: Personal authors
    see: contributor-position
  contributor-position_{i}:
    category: Document contributors
    subsection: Personal authors
    see: contributor-position
  hierarchical-object-numbering:
    category: Visual appearance
    type: boolean
    description: |-
      If set, do not number tables and figures consecutively throughout the body of the
      document, but restart numbering with each clause (hierarchically).
      Use in complex documents, with multiple tables or figures, that need to be tracked against
      clauses for ease of lookup (so _Figure 6-3, Figure 6-4_, instead of _Figure 21, Figure 22_.)
  presentation-metadata-coverpage-statement:
    category: Visual appearance
    type: string
    added_in:
      component: metanorma-ieee
      version: v1.5.3
    description: |-
      In Industry Affiliate Network documents,
      used to give the coverpage statement of the affiliate organisation's
      contribution.
  presentation-metadata-page-break-between-sections:
    category: Visual appearance
    type: boolean
    description: If set to `true`, page breaks will be added between the document sections in the PDF.
  ieee-dtd:
    category: Document processing
    type: string
    added_in:
      component: isodoc
      version: v0.1.0
    description: |-
      The location of the IEEE XML DTD.
      Used to validate any IEEE XML generated for the document.
