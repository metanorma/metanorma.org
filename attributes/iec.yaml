# yaml-language-server: $schema=../schemas/attribute-manifest.schema.yaml
# Metanorma document attributes — IEC
# Generated by scripts/extract-attributes.rb on 2026-07-22; reviewed against gem validators.
---
flavor: iec
label: IEC
inherits_from: standoc
gem: metanorma-iec
source: flavors/iec/ref/document-attributes.adoc
notes: See /flavors/iec/ref/notes/ for stage-code mappings and usage notes.
description: |-
  [[note_general_doc_ref_doc_attrib_iec]]
  [NOTE]
  ====
  Below are listed document attributes that are unique to Metanorma's processing
  of IEC documents.

  Generally, _document attributes for ISO_ also apply: refer to
  link:/author/iso/ref/document-attributes[Metanorma-ISO document attributes]
  for a detailed listing of attributes it shares with IEC.

  For _common document attributes_, see
  link:/author/ref/document-attributes/[Document attributes reference] in general
  Metanorma author's documentation. That page describes attributes that apply to
  all Metanorma flavors, not just IEC.

  For an _introduction to Metanorma AsciiDoc document attributes_ and how
  Metanorma uses them, see
  link:/author/ref/document-attributes/[the corresponding topic].
  ====

  NOTE: Document requirements stated in ISO/IEC Directives, Part 2:2018
  (https://www.iec.ch/members_experts/refdocs/iec/isoiecdir2%7Bed8.0.RLV%7Den.pdf[IEC version (PDF link)],
  https://www.iso.org/sites/directives/current/part2/index.xhtml[ISO version (HTML link)])
  apply equally to ISO and IEC deliverables.
attributes:
  partnumber:
    category: Parts and subparts
    type: string
    description: "`{part}` or `{part}-{subpart}`"
  translated-from:
    category: Document relations
    subsection: Translated from
    type: string
    description: document identifier that the current document is a translation of.
  doctype:
    category: Document type
    type: enum
    values:
    - name: international-standard
      description: International Standard
    - name: technical-specification
      description: Technical Specification
    - name: technical-report
      description: Technical Report
    - name: publicly-available-specification
      description: Publicly Available Specification
    - name: guide
      description: Guide
    - name: interpretation-sheet
      description: Interpretation Sheet
    - name: international-workshop-agreement
      description: International Workshop Agreement (IWA)
      notes: Accepted by the current metanorma-iec validator (lib/metanorma/iec/validate.rb doctype_validate) but not documented on the source page; the page's NOTE explicitly states that unlike ISO, IEC does not have international-workshop-agreement.
    description: |-
      type of document. The permitted types are as follows.
      NOTE: Unlike ISO, IEC does not have `international-workshop-agreement`,
      and does have `interpretation-sheet`.
  function:
    category: Document type
    type: enum
    values:
    - name: emc
      description: EMC
    - name: safety
      description: Safety
    - name: environment
      description: Environment
    - name: quality-assurance
      description: Quality assurance
    added_in:
      component: metanorma-iec
      version: v1.2.9
    description: |-
      function of document.
      Most documents do not have a category. The permitted types are as follows.
  horizontal:
    category: Document type
    type: enum
    values:
    - name: 'true'
      description: Horizontal standard
    - name: 'false'
      description: "(default) Non-horizontal standard"
    default: 'false'
    added_in:
      component: metanorma-iec
      version: v1.2.9
    description: |-
      whether the document is a horizontal standard.
      Allowed values below.
  docstage:
    category: Project stage and substage of document
    subsection: Via ISO International Harmonized Stage Codes
    type: string
    description: project stage code of document
  docsubstage:
    category: Project stage and substage of document
    subsection: Via ISO International Harmonized Stage Codes
    type: string
    description: project substage code of document
  stage:
    category: Project stage and substage of document
    subsection: Via project stage abbreviation
    type: string
    description: project stage abbreviation
  accessibility-color-inside:
    category: Cover page attributes
    type: string
    default: 'false'
    added_in:
      component: metanorma-iec
      version: v1.2.10
    description: |-
      indication that document contains colour content
      (default: `false`)
  price-code:
    category: Cover page attributes
    type: string
    added_in:
      component: metanorma-iec
      version: v1.2.10
    description: |-
      price code group of publication, as documented in the
      https://www.iec.ch/members_experts/tools/pdf/IEC_DATA_FEEDS.pdf[IEC Data Feeds: Technical documentation document]
  cen-processing:
    category: Cover page attributes
    type: string
    default: 'false'
    added_in:
      component: metanorma-iec
      version: v1.2.11
    description: |-
      CEN (European Committee for Standardization) processing
      (default: `false`)
  secretary:
    category: Cover page attributes
    type: string
    added_in:
      component: metanorma-iec
      version: v1.2.12
    description: Secretary of the secretariat.
  interest-to-committees:
    category: Cover page attributes
    type: string
    added_in:
      component: metanorma-iec
      version: v1.2.12
    description: Draft is of interest to the following committees.
