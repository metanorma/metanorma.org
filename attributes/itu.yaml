# yaml-language-server: $schema=../schemas/attribute-manifest.schema.yaml
# Metanorma document attributes — ITU-T
# Generated by scripts/extract-attributes.rb on 2026-07-22; reviewed against gem validators.
---
flavor: itu
label: ITU-T
inherits_from: standoc
gem: metanorma-itu
source: flavors/itu/ref/document-attributes.adoc
notes: See /flavors/itu/ref/editorial-groups/ for the ITU editorial group structure.
description: |-
  [[note_general_doc_ref_doc_attrib_itu]]
  [NOTE]
  ====
  Document attributes listed below are unique to the processing of ITU documents in Metanorma.

  For _common document attributes_, see link:/author/ref/document-attributes/[Document attributes reference] in general Metanorma author's documentation. That page describes attributes that apply to all Metanorma flavors, not just ITU.

  For an _introduction to Metanorma AsciiDoc document attributes_ and how Metanorma uses them, see link:/author/ref/document-attributes/[the corresponding topic].
  ====
attributes:
  doctype:
    category: Document information
    type: enum
    values:
    - name: recommendation
      description: "(default) This document is an ITU Recommendation."
    - name: recommendation-supplement
      description: This document is a Supplement of an ITU Recommendation.
    - name: recommendation-amendment
      description: This document is an Amendment of an ITU Recommendation.
    - name: recommendation-corrigendum
      description: This document is a Corrigendum of an ITU Recommendation.
    - name: recommendation-errata
      description: This document is an Errata of an ITU Recommendation.
    - name: recommendation-annex
      description: This document is an Annex of an ITU Recommendation.
    - name: focus-group
      description: This document is the output of a Focus Group.
    - name: implementers-guide
      description: This document is an ITU Implementers Guide.
    - name: technical-paper
      description: This document is an ITU Technical Paper.
    - name: technical-report
      description: This document is an ITU Technical Report.
    - name: joint-itu-iso-iec
      description: This document is a "`Common Text`" Recommendation between ITU and ISO/IEC JTC 1.
    - name: resolution
      description: This document is an ITU Resolution.
      notes: 'Not accepted by the current validator: lib/metanorma/itu/validate.rb doctype_validate (log ITU_1, severity 2) omits it, although the gem otherwise fully supports it (doctype_dict entry in lib/isodoc/itu/i18n-en.yaml, lib/metanorma/itu/cleanup_section.rb, lib/isodoc/itu/itu.resolution.xsl). The validator accept-list appears stale upstream.'
    - name: service-publication
      description: This document is an ITU Service Publication (e.g. an Annex to the ITU Operational Bulletin).
    - name: handbook
      description: This document is an ITU Handbook.
      notes: 'Not accepted by the current validator: lib/metanorma/itu/validate.rb doctype_validate (log ITU_1, severity 2) omits it; the only gem support is a cover-color rule in lib/isodoc/itu/itu.technical-report.xsl.'
    - name: question
      description: This document is an ITU Question.
      notes: 'Not accepted by the current validator: lib/metanorma/itu/validate.rb doctype_validate (log ITU_1, severity 2) omits it; no rendering support for this doctype found in the gem.'
    - name: contribution
      description: This document is an ITU Contribution.
    default: recommendation
    description: Document type. Choices below.
  status:
    category: Document information
    type: enum
    values:
    - name: in-force
      description: This document is In-force.
    - name: in-force-prepublished
      description: This document is In-force but the text is not final.
    - name: superseded
      description: This document has been superseded.
    - name: withdrawn
      description: This document has been withdrawn.
    - name: draft
      description: |-
        **Do not use this value!**
        NOTE: If the document is a draft, use the general `:draft:` document
        attribute instead of `:status:` to indicate so (see
        link:/author/ref/document-attributes/[Document attributes reference]).
    description: |-
      Document status. Synonym: `:docstage:`. Choices below.

      In general, the document stages are:

      * Draft Recommendation (the text of the Recommendation is being developed and
      may be quite mature, but it has not yet been approved)

      * Once the text is mature, the SG may decide to "`Consent it`" (APP) or
      "`Determine it`" (TAP). The draft Recommendation is then in "`Consented`" (AAP)
      or "`Determined`" (TAP) state.

      * As soon as it has been approved, the Recommendation is no longer a draft
      Recommendation, but an in-force Recommendation.

      * TSB then prepublishes the Recommendation. Prepublished Recommendations are
      in-force texts that are not yet in their final form.
      Because they are not final, they are made available only to the Membership.

      * TSB copy-edits and publishes the Recommendation. This final in-force version
      is made available to all for free download.

      * If the Recommendation is revised, it will be superseded by the revision as
      soon as the revision is approved.

      * Recommendations are seldom withdrawn, but it may happen when the SG decides to
      do so.

      Please refer to the Traditional Approval Process (TAP) (https://www.itu.int/pub/T-RES-T.1-2016[WTSA Resolution 1])
      and the Alternative Approval Process (AAP) (https://www.itu.int/rec/T-REC-A.8/en[Recommendation A.8])
      for further details.
  docnumber:
    category: Document information
    type: string
    description: |-
      The identifier for the document, including the series, the document number, and
      any suffix, but excluding the bureau. For instance, `H.781`, `G.108.2`,
      `G.709/Y.1331`.
  td-number:
    category: Document information
    type: string
    added_in:
      component: metanorma-itu
      version: v2.2.5
    description: |-
      Temporary Document number for the document.
      Used for study group meetings.
  amendment-number:
    category: Document information
    type: string
    added_in:
      component: metanorma-itu
      version: v1.2.5
    description: Number of amendment, if this is an amendment.
  amendment-title:
    category: Document information
    type: string
    added_in:
      component: metanorma-itu
      version: v1.2.5
    description: Title of amendment, if this is an amendment.
  corrigendum-number:
    category: Document information
    type: string
    added_in:
      component: metanorma-itu
      version: v1.2.5
    description: Number of corrigendum, if this is a corrigendum.
  corrigendum-title:
    category: Document information
    type: string
    added_in:
      component: metanorma-itu
      version: v1.2.5
    description: Title of corrigendum, if this is a corrigendum.
  recommendation-number:
    category: Document information
    type: string
    added_in:
      component: metanorma-itu
      version: v1.2.8
    description: |-
      For implementation guides, the
      recommendation that this document is an implementation guide
      for.
      If this is a guide for multiple recommendations, they are
      slash-delimited. If this is a guide for a subseries of recommendations,
      the recommendations as specified as `.\*`, e.g. `H.350.*`.
  common-text-docnumber:
    category: Document information
    type: string
    added_in:
      component: metanorma-itu
      version: v2.6.9
    description: |-
      For  "`Common Text`" Recommendations between ITU and ISO/IEC JTC 1 (`joint-itu-iso-iec`).
      The full document identifier for the recommendation assigned by ISO/IEC.
  series:
    category: Document information
    type: string
    description: |-
      Series that the Recommendation belongs to. Use full title, for example:
      "`H: Audiovisual and Multimedia Systems`"
  series1:
    category: Document information
    type: string
    description: |-
      First level subseries, for example: "`IPTV multimedia services and applications for IPTV`"
      (= "`H.700--H.789`")
  series2:
    category: Document information
    type: string
    description: |-
      Second level subseries, for example: "`Digital Signage`"
      (= "`H.780--H.789`")
  intended-type:
    category: Document information
    type: string
    added_in:
      component: metanorma-itu
      version: v1.2.6
    description: Intended type for this document (for technical reports) (`R`, `C`, `TD`)
  language:
    category: Document information
    type: string
    default: en
    description: |-
      The language of the document (only `en` for now; will eventually support
      `ar`, `zh`, `en`, `fr`, `ru`, `es`)  (default: `en`)
  provisional-name:
    category: Document information
    type: string
    description: |-
      A provisional identifier allocated to the document if the proper
      document identifier (`:docnumber:`) is not yet known.
  ip-notice-received:
    category: Document information
    type: string
    default: 'false'
    description: |-
      ITU has received a notice of intellectual property,
      protected by patents, which may be required to implement this Recommendation.
      (default: `false`)
  title-{en, fr, es, ar, ru, zh}:
    category: Document information
    type: string
    description: The title to use, in each of the official languages of the ITU.
  annex-id:
    category: Document information
    type: string
    description: The ID to use for the annex, if this document is an annex.
  annex-title-{en, fr, es, ar, ru, zh}:
    category: Document information
    type: string
    description: |-
      The title to use for the annex, if this document is an annex,
      in each of the official languages of the ITU.
  subtitle-{en, fr, es, ar, ru, zh}:
    category: Document information
    type: string
    added_in:
      component: metanorma-itu
      version: v1.0.16
    description: |-
      The subtitle to use, in each of the official languages of the ITU;
      appears only at the start of the document body, not in the
      front cover.
  collection-title:
    category: Document information
    type: string
    added_in:
      component: metanorma-itu
      version: v1.0.16
    example: '"Recommendations", "Articles", "Final Acts".'
    description: |-
      The collection of documents that this document appears in.
      Accepts a text value.
      Appears on the top left of the cover page for some collections.
  slogan-title:
    category: Document information
    type: string
    added_in:
      component: metanorma-itu
      version: v1.0.16
    description: |-
      The slogan that this document is branded with, in connection with an
      event.

      Slogan that this document is branded with, in connection with
      an event. Some Flagship publications allow the slogan title.
      [NOTE]
      When using the slogan title, be aware that the ITU official style guide
      specifies proprietary fonts for the slogan title that are not freely available
      cross-platforms.

      * "Adelle Italic" for Latin and Cyrillic scripts;

      * "Traditional Arabic" for Arabic;

      * "STKaiti" for Chinese.

      These are fonts that Fontist cannot directly install, and the user is
      responsible for pre-installing them on their machine.
    notes: Also documented under “Visual appearance”; both descriptions are merged here.
  document-scheme:
    category: Document information
    type: enum
    values:
    - name: legacy
    - name: current
    added_in:
      component: metanorma-itu
      version: v1.0.16
    description: |-
      Switch between old and new PDF formats.
      Legal values: `legacy` and `current` (default).
  bureau_{i}:
    category: Author Information
    type: enum
    values:
    - name: T
      description: Telecommunication Standardization Bureau (TSB), ITU-T. (default)
    - name: R
      description: Radiocommunication Bureau (RRB), ITU-R.
    - name: D
      description: Telecommunication Development Bureau (BDT), ITU-D.
    default: T
    required: true
    description: Mandatory. Bureau that the document belongs to. Choices are listed below.
  sector:
    category: Author Information
    type: string
    added_in:
      component: metanorma-itu
      version: v1.0.16
    description: Standardization sector that publishes the document, if the document is published outside of the defined bureaus. Only use this attribute if it does not belong to the ITU-{D/R/T} sectors, otherwise use `:bureau:` instead.
  group_{i}:
    category: Author Information
    type: string
    required: true
    description: Mandatory. Top-level group that the document belongs to.
  group-type_{i}:
    category: Author Information
    type: enum
    values:
    - name: tsag
      description: Telecommunication Standardization Advisory Group (TSAG)
    - name: study-group
      description: Study Group (SG)
    - name: focus-group
      description: Focus Group (FG)
    - name: adhoc-group
      description: Ad-hoc Group
    - name: correspondence-group
      description: Correspondence Group
    - name: joint-coordination-activity
      description: Joint Coordination Activity (JCA)
    - name: working-party
      description: Working Party (WP)
    - name: working-group
      description: Working Group (WG)
    - name: rapporteur-group
      description: Rapporteur Group (RG)
    - name: intersector-rapporteur-group
      description: Intersector Rapporteur Group (IRG)
    - name: regional-group
      description: Regional Group. ITU-T Study Groups can have Regional Groups.
    description: Type of top-level group that the document belongs to. Permitted values listed below.
  group-acronym_{i}:
    category: Author Information
    type: string
    description: Acronym of top-level editorial group that the document belongs to.
  group-year-start_{i}:
    category: Author Information
    type: string
    description: Year that the editorial group study period started.
  group-year-end_{i}:
    category: Author Information
    type: string
    description: Year that Project group study period ended.
  subgroup_{i}:
    category: Author Information
    type: string
    description: Editorial subgroup that the document belongs to.
  subgroup-type_{i}:
    category: Author Information
    type: string
    example: |-
      Example of a group with a subgroup

      The "TSAG Rapporteur Group" is to be encoded as `:group-type: tsag` and
      `:subgroup-type: rapporteur-group`.
    description: |-
      Type of editorial subgroup that the document belongs to. Permitted values
      are as for `group-type`.
  subgroup-acronym_{i}:
    category: Author Information
    type: string
    description: Acronym of editorial subgroup that the document belongs to.
  workgroup_{i}:
    category: Author Information
    type: string
    description: Project workgroup (third-level editorial group) that the document belongs to.
  workgroup-type_{i}:
    category: Author Information
    type: string
    description: |-
      Type of Project workgroup that the document belongs to. Permitted values are
      as for `group-type`.
  workgroup-acronym_{i}:
    category: Author Information
    type: string
    description: Acronym of Project workgroup that the document belongs to.
  question:
    category: Author Information
    type: comma-list
    added_in:
      component: metanorma-itu
      version: v2.5.0
    example: |-
      Example of a document that answers to two questions

      :question: Q10/17: Identity management and telebiometrics architecture and mechanisms, "Q11/17: Generic technologies (such as Directory, PKI, formal languages, object identifiers) to support secure applications"
    description: |-
      The Questions that the document addresses.
      A document can address multiple questions.
      This attribute is formatted as a comma-delimited list of questions, each optionally prefixed by an identifier and colon.
  meeting:
    category: Author Information
    type: string
    added_in:
      component: metanorma-itu
      version: v1.2.5
    description: Name of meeting that generated this document (for resolutions, technical reports, technical papers, implementers guides)
  meeting-date:
    category: Author Information
    type: date
    added_in:
      component: metanorma-itu
      version: v1.2.5
    example: |-
      Example of a meeting data range

      2000-01-01/2000-01-02
    description: |-
      Date of meeting that generated this document (for resolutions, technical reports, technical papers, implementers guides).
      If the date is a range, it is given slash-delimited.
  meeting-place:
    category: Author Information
    type: string
    added_in:
      component: metanorma-itu
      version: v1.2.11
    description: Place of meeting that generated this document (for resolutions).
  meeting-acronym:
    category: Author Information
    type: string
    added_in:
      component: metanorma-itu
      version: v1.2.11
    description: Acronym of meeting that generated this document (for resolutions).
  source:
    category: Author Information
    type: string
    added_in:
      component: metanorma-itu
      version: v1.2.6
    description: Source for this document (for technical reports, technical papers, implementers guides)
  fullname_{i}:
    category: Author Information
    type: string
    added_in:
      component: metanorma-itu
      version: v1.2.6
    description: Name of contact for this document (for technical reports, technical papers, implementers guides)
  affiliation_{i}:
    category: Author Information
    type: string
    added_in:
      component: metanorma-itu
      version: v1.2.6
    description: Name of organization or company for contact for this document (for technical reports, technical papers, implementers guides)
  address_{i}:
    category: Author Information
    type: string
    added_in:
      component: metanorma-itu
      version: v1.2.6
    description: Country for this document (for technical reports, technical papers, implementers guides)
  phone_{i}:
    category: Author Information
    type: string
    added_in:
      component: metanorma-itu
      version: v1.2.6
    description: Phone number of contact for this document (for technical reports, technical papers, implementers guides)
  fax_{i}:
    category: Author Information
    type: string
    added_in:
      component: metanorma-itu
      version: v1.2.6
    description: Fax number of contact for this document (for technical reports, technical papers, implementers guides)
  email_{i}:
    category: Author Information
    type: string
    added_in:
      component: metanorma-itu
      version: v1.2.6
    description: Email of contact for this document (for technical reports, technical papers, implementers guides)
  role_{i}:
    category: Author Information
    type: string
    added_in:
      component: metanorma-itu
      version: v1.2.8
    description: 'Role of contact for this document (for implementers guides): may be either `editor` (default) or `rapporteur`'
  recommendation-from:
    category: Document Status
    type: string
    description: Date from which Recommendation status applies
  recommendation-to:
    category: Document Status
    type: string
    description: Date to which Recommendation status applies
  approval-process:
    category: Document Status
    type: enum
    values:
    - name: tap
      description: |-
        Traditional Approval Process (TAP), as described in
        https://www.itu.int/pub/T-RES-T.1-2016[WTSA Resolution 1, Section 9].
    - name: aap
      description: |-
        Alternative Approval Process (AAP), as described in
        https://www.itu.int/rec/T-REC-A.8/en[Recommendation A.8].
    description: Approval Process for Recommendation status. Legal values are listed below.
  approval-status:
    category: Document Status
    type: enum
    values:
    - name: determined
      description: ": Determined"
    - name: in-force
      description: ": In-force"
    - name: a
      description: ": Approved"
    - name: ac
      description: ": Approved with Substantial Changes"
    - name: aj
      description: ": Additional Review Judgement"
    - name: ar
      description: ": Additional Review"
    - name: at
      description: ": Approved with Typographical Corrections"
    - name: lc
      description: ": Last Call"
    - name: c
      description: ": Consented"
    - name: lj
      description: ": Last Call Judgment (includes Last Call Comment resolution)"
    - name: na
      description: ": Not Approved"
    - name: ri
      description: ": Re-Initiate Last Call"
    - name: sg
      description: ": Referred to Study Group Approval"
    - name: tap
      description: ": Moved to TAP (ITU-T A.8 / §5.2)"
    description: |-
      Approval status code for Recommendation status. Legal values are listed below.

      When `:approval-process:` is `tap`:::
      (refer to https://www.itu.int/pub/T-RES-T.1-2016[WTSA Resolution 1],
      Figure 9.1 "`Approval of new and revised Recommendations using TAP -- Sequence of events`")

      When `:approval-process:` is `aap`:::
      (refer to https://www.itu.int/rec/T-REC-A.8/en[Recommendation A.8],
      Figure 1 "`Sequence of Events`")
  edition:
    category: Document Status
    type: string
    description: |-
      In the case of Resolutions, this attribute is used to indicate whether the current
      document is a revision of an earlier document; if it is, it should have a value other than "1".
      (Resolutions are identified through place and year, regardless of whether they constitute revisions
      or not.)
  complement-of:
    category: Document Status
    type: comma-list
    added_in:
      component: metanorma-itu
      version: v1.2.12
    description: |-
      Identifier of document that this is a complement or supplement of; used
      in particular for recommendation supplements, to nominate the document or documents that this is a
      supplement of. Semicolon-delimited.
  timing:
    category: Document Status
    type: string
    added_in:
      component: metanorma-itu
      version: v2.4.8
    description: |-
      For contributions: the timeframe when a proposed document is expected to be
      realised by.
  smartquotes:
    category: Visual appearance
    type: string
    description: |-
      In ITU, quotes and apostrophes default to straight.
      When this attribute is set, Metanorma will convert quotes and apostrophes to smart quotes and smart apostrophes.
      In the rest of Metanorma, if this attribute is not supplied, quotes and apostrophes default to "`smart`".
  document-schema:
    category: Visual appearance
    type: string
    added_in:
      component: metanorma-itu
      version: v2.3.7
    description: |-
      Used to specify the document scheme that this document aligns to.
      If the value `legacy` is provided, the resulting behaviour is as with the document attribute `:legacy-do-not-insert-missing-sections:`.
  legacy-do-not-insert-missing-sections:
    category: Visual appearance
    type: boolean
    added_in:
      component: metanorma-itu
      version: v1.0.11
    description: |-
      If set, do not insert the sections "`Scope`", "`References`", "`Definitions`", "`Abbreviations and acronyms`",
      "`Conventions`" if missing. +
      Use this if you have a legacy Recommendation document with clauses with names preceding this requirement
      (e.g. "`Prerequisites`", "`Process`", "`General`"), and you do not want the compulsory new sections
      to be added in at the start of the document.
  hierarchical-object-numbering:
    category: Visual appearance
    type: boolean
    added_in:
      component: metanorma-itu
      version: v1.0.11
    description: |-
      If set, do not number objects (tables, figures etc.) consecutively throughout the body of the
      document, but restart numbering with each clause
      (hierarchically). +
      Use in complex documents, with multiple tables or figures, that need to be
      tracked against clauses for ease of lookup (so _Figure 6-3, 6-4_, instead of
      _Figure 21, 22_.)
      Note that equations in ITU are always numbered hierarchically.
  coverpage-image:
    category: Visual appearance
    type: comma-list
    added_in:
      component: metanorma-itu
      version: v1.0.16
    description: |-
      Comma-delimited list of image locations, for images to be included on the PDF
      cover page of ITU "Service Publications" (and title page for logos). All image
      locations are relative to the source
      document..
  presentation-metadata-color-cover-title:
    category: Visual appearance
    type: enum
    values:
    - name: black
      description: Black title color (default).
    - name: white
      description: White title color.
    default: black
    description: |-
      Title color on the PDF cover page. Specify the color depends on the contrast
      with the background image (`:coverpage-image:`). Valid values are:
  presentation-metadata-cover-header-hide:
    category: Visual appearance
    type: enum
    values:
    - name: 'false'
      description: "(default) Show the page header titles on the PDF."
    - name: 'true'
      description: Hide the page header titles on the PDF.
    default: 'false'
    description: |-
      Whether to hide page header titles.
      The header titles are the "ITUPublications", "International Telecommunication
      Union", with the Sector or Bureau name on the cover page.
      NOTE: Some Flagship publications opt to omit the cover page header.
      Some Flagship publications opt to omit the cover page header.
      Valid values are:
  presentation-metadata-color-cover-itu-logo:
    category: Visual appearance
    type: enum
    values:
    - name: "#1DA0DB"
      description: "(default) Default ITU blue logo color."
    - name: white
      description: White logo color.
    - name: "{custom-color-in-hex}"
      description: Any custom color, specified as a hex color code.
    default: "#1DA0DB"
    description: |-
      Color of the ITU logo on the PDF cover page. Specify color depending on the
      contrast with background. Valid values are:
