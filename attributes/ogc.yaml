# yaml-language-server: $schema=../schemas/attribute-manifest.schema.yaml
# Metanorma document attributes — OGC
# Generated by scripts/extract-attributes.rb on 2026-07-22; reviewed against gem validators.
---
flavor: ogc
label: OGC
inherits_from: standoc
gem: metanorma-ogc
source: flavors/ogc/ref/document-attributes.adoc
notes: See /flavors/ogc/ref/notes/ for legacy document-type abbreviations, the White Paper rename, branding schemes, and legacy AsciiDoc attribute synonyms.
description: "= Metanorma for OGC document attributes"
attributes:
  abbrev:
    category: Document type and stage
    type: string
    description: The standard abbreviation of the document, used e.g. in URIs
  doctype:
    category: Document type and stage
    type: string
    required: true
    anchor: ogc-doctype
    added_in:
      component: metanorma-ogc
      version: v2.2.6
    version_history:
    - component: metanorma-ogc
      version: v1.5.5
    description: |-
      *Mandatory.*
      Document type.
      Values:

      * `standard`: Standard (a document subtype is necessary, see <<ogc-docsubtype>>) (_default_)
      * `draft-standard`: Standard (a document subtype is necessary, see <<ogc-docsubtype>>)
      * `abstract-specification-topic`: Abstract Specification
      * `best-practice`: Best Practice (a document subtype is necessary, see <<ogc-docsubtype>>)
      * `change-request-supporting-document`: Change Request Supporting Document
      * `community-practice`: Community Practice
      * `community-standard`: Community Standard
      * `discussion-paper`: Discussion Paper
      * `engineering-report`: Engineering Report
      * `other`: Note, Primer, etc.
      * `policy`: Policy, Policy -- Name Type Specification
      * `reference-model`: Reference Model
      * `release-notes`: Release Notes
      * `test-suite`: Test Suite
      * `user-guide`: User Guide
      * `technical-paper`: Technical Paper
        (for documents issued/published on or after 2021-12-16).

      Deprecated values:

      * `white-paper`: White Paper. Superseded by the "`Technical Paper`" document
        type for a publication date on and after 2021-12-16. See <<legacy-ogc-whitepaper>> for further information.
  docsubtype:
    category: Document type and stage
    type: string
    anchor: ogc-docsubtype
    description: |-
      Document subtype.
      Choices:
      * For `doctype` set to `standard`:
      ** `implementation`: Implementation (_default_)
      ** `conceptual-model`: Conceptual model
      ** `conceptual-model-and-encoding`: Conceptual model and encoding
      ** `conceptual-model-and-implementation`: Conceptual model and implementation
      ** `encoding`: Encoding
      ** `extension`: Extension
      ** `profile`: Profile
      ** `profile-with-extension`: Profile with extension

      * For `doctype` set to `best-practice`:
      ** `general`: General (_default_)
      ** `encoding`: Encoding
      ** `extension`: Extension
      ** `profile`: Profile
      ** `profile-with-extension`: Profile with extension
  status:
    category: Document type and stage
    type: enum
    values:
    - name: draft
      description: |-
        Draft. This is the only draft stage for document types that are not
          `standard`, `draft-standard`, `abstract-specification-topic`, `community-standard`.
    - name: work-item-draft
      description: |-
        Work item draft. This is the first stage for a
          `community-standard`.
    - name: swg-draft
      description: |-
        Candidate SWG Draft. This is the first stage for a
          `standard` or `draft-standard`.
    - name: oab-review
      description: |-
        Candidate OAB Review Draft. This is the intended draft for the
          "`OAB + OGC-NA Review`".
          This stage is only valid for `standard`, `draft-standard`, `abstract-specification-topic` and
          `community-standard`.
      notes: Also accepted by the current validator for best-practice and community-practice (lib/metanorma/ogc/validate.rb stage_type_validate only rejects draft, swg-draft and work-item-draft for those doctypes); it is rejected only for the remaining doctypes.
    - name: public-rfc
      description: |-
        Public RFC. This is the draft for the (30 days) public comment period.
          This stage is only valid for `standard`, `draft-standard`, `abstract-specification-topic`,
          `community-standard`, `best-practice` and `community-practice`.
    - name: tc-vote
      description: |-
        Candidate TC Vote Draft. This is the intended draft for the TC adoption and PC adoption votes.
          This stage is only valid for `standard`, `draft-standard`, `abstract-specification-topic`,
          `community-standard`, `best-practice` and `community-practice`.
    - name: approved
      added_in:
        component: metanorma-ogc
        version: v1.2.5
      description: |-
        Published. This is the document intended to be published.
          This status is to be set after comments are handled with the TC chair (after `tc-vote`).
          `published` is an allowed synonym of `approved`.
    - name: deprecated
      description: Deprecated. This document has been deprecated.
    - name: rescinded
      added_in:
        component: metanorma-ogc
        version: v1.5.1
      description: Rescinded. This document has been rescinded as inaccurate.
    - name: retired
      description: Retired. This document has been retired and no longer considered normative.
    - name: legacy
      added_in:
        component: metanorma-ogc
        version: v2.4.7
      description: Legacy. This document has been retired and replaced by a completely new standard.
      notes: Not accepted by the current validator (lib/metanorma/ogc/validate.rb stage_type_validate) for doctypes other than standard, draft-standard, abstract-specification-topic, community-standard, best-practice and community-practice. The source page's status/doctype matrix predates this stage and has no column for it.
    added_in:
      component: metanorma-ogc
      version: v1.5.1
    description: |-
      Document status/stage. Synonym: `:docstage:`.
      Choices:

      [NOTE]
      The following figure and table shows available document statuses for each
      document type.

      .OGC document type and document stage publication flows
      image::/assets/author/ogc/ogc-doctype-pub-process.svg[]

      .Document statuses available for various OGC document types
      |===
      | | draft | work-item-draft | swg-draft | oab-review | public-rfc | tc-vote | approved (published) | deprecated | rescinded | retired

      h| standard, draft-stadard, abstract-specification-topic |   |   | x | x | x | x | x | x | x | x
      h| community-standard                                    |   | x |   | x | x | x | x | x | x | x
      h| best-practice, community-practice                     |   | x |   |   | x | x | x | x | x | x
      h| _all other types_                                     | x |   |   |   |   |   | x |   |   | x

      |===
  edition:
    category: Document type and stage
    type: string
    example: "`2.3.1` means: major version 2, minor version 3, patch version 1."
    description: |-
      The version number of the document. Dot-delimited, consists of a major version
      number, a minor version number, and an optional patch version number.
  keywords:
    category: Document type and stage
    type: comma-list
    description: Comma-delimited list of the keywords associated with the document.
  committee:
    category: Author info
    type: string
    required: true
    description: |-
      *Mandatory.*
      Name of relevant committee producing the document. Use one of:
      * `technical`: Technical Committee
      * `planning`: Planning Committee
      * `strategic-member-advisory`: Strategic Member Advisory Committee
  subcommittee-type:
    category: Author info
    type: string
    description: The type of the relevant subcommittee producing the document.
  subcommittee-number:
    category: Author info
    type: string
    description: The number of the relevant subcommittee producing the document.
  workgroup:
    category: Author info
    type: string
    required: true
    description: |-
      *Mandatory.*
      Name of relevant working group producing the document.
  workgroup-type:
    category: Author info
    type: string
    description: Type of the relevant workgroup producing the document.
  workgroup-number:
    category: Author info
    type: string
    description: Number of the relevant workgroup producing the document.
  submitting-organizations:
    category: Author info
    type: comma-list
    example: |-
      Example of setting submitting organizations

      _University of Calgary, Canada; National Central University, Taiwan_
    description: |-
      Semicolon-delimited list of the submitting organizations
      for this document. The organization names themselves may contain commas.
  role:
    category: Author info
    type: enum
    values:
    - name: author
    - name: editor
    - name: contributor
      description: Contributor. Encoded by the gem as an `author` role with description `contributor`.
      notes: Documented on the source page as a legal value (added in metanorma-ogc v2.0.2) and special-cased by the current gem (lib/metanorma/ogc/front.rb personal_role), but not captured as a structured value by the extractor.
    added_in:
      component: metanorma-ogc
      version: v2.0.2
    description: |-
      Role of contributor (`link:/author/ref/document-attributes/#role[:role:]`).
      Legal values are `author`, `editor`, and
      `contributor`.
  editor:
    category: Author info
    type: string
    description: |-
      Same as `link:/author/ref/document-attributes/#fullname[:fullname:]`
      alongside `link:/author/ref/document-attributes/#role[:role:]` specified as `editor`.
  external-id:
    category: URIs and IDs
    type: string
    description: |-
      External identifier referring to this document. If not supplied, a default value is
      generated: `http://www.opengis.net/doc/{abbreviation of doctype}/{abbrev}/{version}`.
      (Version is omitted if not provided. If `:abbrev:` and `:doctype:` are not provided,
      the default value is not generated.
  referenceURLID:
    category: URIs and IDs
    type: string
    description: Identifier embedded into a document type-specific external URL.
  previous-uri:
    category: URIs and IDs
    type: uri
    description: URI of previous version of the document.
  docnumber:
    category: URIs and IDs
    type: string
    description: |-
      The document number assigned to the OGC document (without the "`OGC`" prefix).
      NOTE: A new document number is obtained through the
      https://portal.ogc.org/?m=public&subtab=instructions&tab=1["`OGC Pending Documents`"]
      page at the OGC portal.

      The number is of the pattern `YY-NNN{rM}` formulated following the following rules:

      * `YY` represents the final two digits of the year this document number was first reserved.

      * `NNN` is a three digit number is assigned sequentially for each document in the year.

      * `{rM}` is only for revisions:

      ** The first edition of a document has the document number `YY-NNN`. e.g., `00-027` is OGC document 027 first published in 2000.

      ** Minor editorial changes and corrigenda do not result in a change to the document number.

      ** The `YY-NNN` identifier portion is maintained if the document undergoes content changes (revisions).

      ** A revised document will have its identifier suffixed with `r` followed by the revision number `M`, a sequential number indicating the number of revisions. So `05-020r27` is revision 27 of OGC document 020 first published in 2005. (Revision 27 may appear years later than 2005.)

      * A new major version of a document receives a new document number, including likely a new year.
