  document-scheme:
    category: Document type and stage
    values:
    - name: '2026'
      description: 2026 OGC branding (logo and PDF color scheme). Default; also used when no scheme is specified, when an unrecognized value is given, or for deliverables published on or after 2026-01-01.
      notes: Accepted by the current metanorma-ogc converter (lib/metanorma/ogc/converter.rb document_scheme); not listed as an OGC-specific value in the manifest.
    - name: '2022'
      description: 2022 OGC branding, for deliverables published on or after 2021-11-08.
      notes: Accepted by the current metanorma-ogc converter (lib/metanorma/ogc/converter.rb document_scheme); not listed as an OGC-specific value in the manifest.
    - name: '2018'
      description: 2018 OGC branding, for deliverables dated prior to 2021-11-08.
      notes: Accepted by the current metanorma-ogc converter (lib/metanorma/ogc/converter.rb document_scheme); not listed as an OGC-specific value in the manifest.
    type: enum
