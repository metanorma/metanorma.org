# yaml-language-server: $schema=../schemas/attribute-manifest.schema.yaml
# Metanorma document attributes — IETF (RFC XML v2)
# Generated by scripts/extract-attributes.rb on 2026-07-22; reviewed against gem validators.
---
flavor: ietf-v2
label: IETF (RFC XML v2)
inherits_from: standoc
gem: metanorma-ietf
source: flavors/ietf/ref/document-attributes-v2.adoc
notes: See /author/ietf/ref/global-options/ for header rules, author-suffixing conventions, and xml2rfc processing instruction guidance.
description: |-
  [[note_general_doc_ref_doc_attrib_ietf]]
  [NOTE]
  ====
  The document attributes listed below are unique to Metanorma's processing of RFC XML v2
  IETF documents. The document attributes particular to RFC XML v3, and used in the current version of
  this gem, link:document-attributes[are given separately].

  For _common document attributes_, see link:/author/ref/document-attributes/[Document attributes reference] in general Metanorma author's documentation. That page describes attributes that apply to all Metanorma flavors, not just IETF.

  For an _introduction to Metanorma AsciiDoc document attributes_ and how Metanorma uses them, see link:/author/ref/document-attributes/[the corresponding topic].
  ====
attributes:
  doctype:
    category: Document type
    type: enum
    values:
    - name: internet-draft
      description: |-
        sets the document as an Internet-Draft (default value):
        ** `rfc@docName` will be set to the `:name:` attribute
    - name: rfc
      description: |-
        sets the document as an RFC:
        ** `rfc@number` will be set to the `:name:` attribute
    default: internet-draft
    description: |-
      Specifies document status. Choices:
      Defaults to `internet-draft`.
  no-rfc-bold-bcp14:
    category: Global options
    type: enum
    values:
    - name: 'true'
    - name: 'false'
    default: 'true'
    description: |-
      Optional. Default value `true`. Allowed values: `true`, `false`.
      Override default assumption that boldface uppercase BCP14 word is to be rendered with `bcp14` tag.
  smart-quotes:
    category: Global options
    type: enum
    values:
    - name: 'true'
    - name: 'false'
    default: 'true'
    description: |-
      Optional. Default value `true`. Allowed values: `true`, `false`.
      Permit smart quotes, when they are specified explicitly in AsciiDoc (as `pass:["`...`"]`, `pass:['`...`']`).
      When disabled, smart quotes are rendered as straight quotes, and Asciidoc's default conversion
      of straight apostrophes to smart is undone.
  inline-definition-lists:
    category: Global options
    type: enum
    values:
    - name: 'true'
    - name: 'false'
    default: 'false'
    description: |-
      Optional. Default value `false`. Allowed values: `true`, `false`.
      Only applies to v2. By default, `<vspace blankLines="1">` is inserted after
      the definition in a v2 definition list, to satisfy the requirement from `idnits` validation
      that definition terms be separated by a carriage return from the definition. That is, by
      default inline definition lists are rendered as paragraphing definition lists. If the option is
      on, the additional `vspace` element is not added, and inline definition lists are left as is.
  flush-caches:
    category: Global options
    type: enum
    values:
    - name: 'true'
    - name: 'false'
    default: 'false'
    description: |-
      Optional. Default value `false`. Allowed values: `true`, `false`.
      Delete and reload the caches of references to be included externally, and of workgroups,
      during processing of this document.
      The caches are stored in `~/.metanorma-ietf-biblio-cache.json` and
      `~/.metanorma-ietf-workgroup-cache.json`.
  biblio-dir:
    category: Global options
    type: boolean
    description: |-
      Optional. Name of directory. If present, gives the name of a
      directory from which RFC XML references are to be read into the
      document, rather than assuming the references are already present
      in the document.
  normative:
    category: Global options
    type: comma-list
    description: |-
      Optional. Comma-delimited list of reference anchors. Used in conjunction with `:biblio-dir:`, which uses a single directory for all references: this attribute
      lists those references which are to be considered normative, and listed under the "`Normative References`" heading.
  "= Document Title":
    category: Document attributes
    type: string
    required: true
    description: |-
      Mandatory. Title of document.
      RFC XML: `rfc/front/title`
  abbrev:
    category: Document attributes
    type: string
    required: true
    description: |-
      Mandatory. Abbreviation of document title. Usually the document name without
      the keyword `draft-`.
      RFC XML: `rfc/front/title@abbrev`
  name:
    category: Document attributes
    type: string
    required: true
    description: |-
      Mandatory. Sets the document's name. This should be a number if
      the document is an RFC, and a name (in the form of `draft-ietf-somewg-someprotocol-07`)
      if it is an Internet-Draft.
      When `doctype` is set to:
      * `internet-draft`: the value should be in the form `draft-ietf-somewg-someprotocol-07`.
      ** RFC XML: `rfc@docName`
      * `rfc`: the value should be a number like `7991` as described
      in  https://tools.ietf.org/html/rfc7991#section-2.47.6[here]
      RFC XML: `rfc@number`
      NOTE: Usage here differs from usage in AsciiRFC v3.
  status:
    category: Document attributes
    type: enum
    values:
    - name: standard
      description: "(mapped in v2 to: `std`)"
    - name: informational
      description: "(mapped in v2 to: `info`)"
    - name: experimental
      description: "(mapped in v2 to: `exp`)"
    - name: bcp
    - name: historic
    description: |-
      Set the current status of this document. Synonym: `:docstage:`.
      The following values are allowed:
      RFC XML `rfc@category`
      NOTE: Usage here differs from usage in AsciiRFC v3.
  intended-series:
    category: Document attributes
    type: enum
    values:
    - name: standard
      description: "(I.-D. only) (mapped in v2 to: `std`)"
    - name: informational
      description: "(mapped in v2 to: `info`)"
    - name: experimental
      description: "(mapped in v2 to: `exp`)"
    - name: bcp
      description: "(I.-D. only)"
    - name: bcp nnnn
      description: "(RFC only, where `nnnn` is the document number)"
    - name: fyi
      description: "(I.-D. only)"
    - name: fyi nnnn
      description: "(RFC only, where `nnnn` is the document number)"
    - name: full-standard
      description: "(I.-D. only)  (mapped in v2 to: `std`)"
    - name: full-standard nnnn
      description: "(RFC only, where `nnnn` is the document number) (mapped in v2 to: `std`)"
    - name: historic
    required: true
    description: |-
      Mandatory. Set the intended series of this
      document. For Internet Drafts, this indicates the intended series once the document is published as an RFC. For RFCs, this indicates the current status of the document. The following values are allowed:
      RFC XML `front/@category` (`exp` and `historic` only supported for Internet Drafts; document number not used)
      NOTE: Usage here differs from usage in AsciiRFC v3.
  series-no:
    category: Document attributes
    type: string
    description: |-
      Optional. The document series is defined by the `category` attribute;
      `seriesNo` is only applicable to the values _info_ ("FYI" series),
      _std_ ("STD" series), and _bcp_ ("BCP" series). RFC XML v3 counterpart: `rfc@seriesNo`
      NOTE: This attribute is only available in AsciiRFC v3.
  submission-type:
    category: Document attributes
    type: enum
    values:
    - name: IETF
      description: "(default)"
    - name: independent
    - name: IAB
    - name: IRTF
    default: IETF
    description: |-
      Set document submission type for this document. The following values are allowed:
      RFC XML: `rfc@submissionType`
      NOTE: Usage here differs from usage in AsciiRFC v3.

      Optional. Document stream of document described in
      https://tools.ietf.org/html/rfc7841[RFC7841]. Allowed values: `IETF` (default),
      `independent`, `IAB`, and `IRTF`.
      RFC XML: `rfc@submissionType`
  ipr:
    category: Document attributes
    type: string
    default: trust200902
    required: true
    description: |-
      Mandatory. IP status of document. See
      https://tools.ietf.org/html/rfc7991#section-2.45.5[here]. Defaults to
      `trust200902`.
      RFC XML: `rfc@ipr`
  ipr-extract:
    category: Document attributes
    type: string
    description: |-
      Optional. Identifies a section that can be extracted from text. See
      https://tools.ietf.org/html/rfc7991#section-2.45.6[here].
      RFC XML: `rfc@iprExtract`
  obsoletes:
    category: Document attributes
    type: comma-list
    description: |-
      Optional. A comma-separated list of RFC numbers or Internet-Draft names that
      this document obsoletes. Delimited by `comma + space`.
      RFC XML: `rfc@obsoletes`
  updates:
    category: Document attributes
    type: comma-list
    description: |-
      Optional. A comma-separated list of RFC numbers or Internet-Draft names that
      this document updates. Delimited by `comma + space`.
      RFC XML: `rfc@updates`
  revdate:
    category: Document attributes
    type: date
    description: |-
      Optional. Latest revision date of document. Default value is current time.
      Accepts ISO 8601 date. Also accepts `YYYY` year, and `YYYY[-]MM` year/month.
      For consistency with AsciiDoc, `:revdate:` is given as
      an ISO 8601 date; the converter breaks it down into day, month name and year
      RFC XML: `front/date@day`, `front/date@month`, `front/date@year`
  area:
    category: Document attributes
    type: comma-list
    description: |-
      Optional. Comma delimited text on which IETF area this document relates to. Value should
      "be either the full name or the abbreviation of one of the IETF areas as
      listed on <http://www.ietf.org/iesg/area.html>". See
      https://tools.ietf.org/html/rfc7991#section-2.4[here].
      RFC XML: `front/area`
  workgroup:
    category: Document attributes
    type: comma-list
    description: |-
      Optional. Comma delimited text on which IETF or IRTF workgroup or research group this
      document originates from. See https://tools.ietf.org/html/rfc7991#section-2.65[here].
      RFC XML: `front/workgroup`
  keyword:
    category: Document attributes
    type: comma-list
    description: |-
      Optional. Comma delimited text for singular keywords used for RFC index and
      metadata.
      RFC XML: `front/keyword`
  xml-lang:
    category: Document attributes
    type: string
    default: en
    description: |-
      Optional. Set the document language. By default this is `en`.
      RFC XML: `rfc@xml:lang`
  consensus:
    category: Document attributes
    type: enum
    values:
    - name: 'false'
      description: "(mapped in v2 to: `no`)"
    - name: 'true'
      description: "(mapped in v2 to: `yes`)"
    description: |-
      Set document consensus for this document. The following values are allowed:
      RFC XML: `rfc@consensus`
  fullname{_i}:
    category: Author attributes
    subsection: Name and affiliation
    type: string
    repeatable: true
    description: |-
      Optional. Author's full name. Can set here instead of document header's "`Author`" line.
      RFC XML: `front/author@fullname`
  forename_initials{_i}:
    category: Author attributes
    subsection: Name and affiliation
    type: string
    repeatable: true
    description: |-
      Optional. Author's initials excluding surname. Defaults to dynamically
      calculated initials. Distinct from the AsciiDoc `:initials:` attribute, which
      includes surname.
      RFC XML: `front/author@initials`
  lastname{_i}:
    category: Author attributes
    subsection: Name and affiliation
    type: string
    repeatable: true
    description: |-
      Optional. Author's last name. Can set here instead of document header's "`Author`" line.
      RFC XML: `front/author@surname`
  role{_i}:
    category: Author attributes
    subsection: Name and affiliation
    type: string
    default: author
    repeatable: true
    description: |-
      Optional. Defaults to `author`. Possible values: `author`, `editor`. If `author` is supplied,
      the attribute is not populated.
      RFC XML: `front/author@role`
  organization{_i}:
    category: Author attributes
    subsection: Name and affiliation
    type: string
    default: '""'
    repeatable: true
    description: |-
      Optional. Defaults to `""`. Author's organization affiliation.
      RFC XML: `front/author/organization`
  organization_abbrev{_i}:
    category: Author attributes
    subsection: Name and affiliation
    type: string
    default: '""'
    repeatable: true
    description: |-
      Optional. Defaults to `""`. Author's organization's abbreviation shown.
      RFC XML: `front/author/organization@abbrev`
  email{_i}:
    category: Author attributes
    subsection: Address
    type: string
    repeatable: true
    description: |-
      Email of author.
      RFC XML: `front/author/address/email`
  fax{_i}:
    category: Author attributes
    subsection: Address
    type: string
    repeatable: true
    deprecated: true
    description: |-
      Fax number of author. Deprecated in v3.
      RFC XML: `front/author/address/facsimile`
  uri{_i}:
    category: Author attributes
    subsection: Address
    type: string
    repeatable: true
    description: |-
      URI of author.
      RFC XML: `front/author/address/uri`
  phone{_i}:
    category: Author attributes
    subsection: Address
    type: string
    repeatable: true
    description: |-
      Author's phone number. Scheme-specific part of a `tel` URI (does not include
      the prefix `tel:`).
      See https://tools.ietf.org/html/rfc3966#section-3[RFC3966 `global-number-digits`].
      RFC XML: `front/author/address/phone`
  street{_i}:
    category: Author attributes
    subsection: Address
    type: string
    repeatable: true
    description: |-
      Address of author, non-city/region/code/country portion.
      Multiple lines concatenated with `"\ "` will be split into separate `<street>`
      elements.
      RFC XML: `front/author/address/postal/street`
  city{_i}:
    category: Author attributes
    subsection: Address
    type: string
    repeatable: true
    description: |-
      City portion of author's address
      RFC XML: `front/author/address/postal/city`
  region{_i}:
    category: Author attributes
    subsection: Address
    type: string
    repeatable: true
    description: |-
      Region, state or province portion of author's address. For US/CA the 2-letter state code.
      RFC XML: `front/author/address/postal/region`
  country{_i}:
    category: Author attributes
    subsection: Address
    type: string
    repeatable: true
    description: |-
      Country of author's address
      RFC XML: `front/author/address/postal/country`
  code{_i}:
    category: Author attributes
    subsection: Address
    type: string
    repeatable: true
    description: |-
      Postal code of author's address
      RFC XML: `front/author/address/postal/code`
  artworkdelimiter:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: when producing `txt` or `nroff` files, use this string to delimit artwork
  artworklines:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: when producing txt or nroff files, add this many blank lines around artwork
  authorship:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: render author information
  autobreaks:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: automatically force page breaks to avoid widows and orphans (not perfect)
  background:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: when producing a HTML file, use this image
  colonspace:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: put two spaces instead of one after each colon ("`:`") in txt or nroff files
  comments:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: render `<cref>` information
  compact:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: when producing a txt/nroff file, try to conserve vertical whitespace (the default value is the current value of the `rfcedstyle` PI)
  docmapping:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: use hierarchical tags (e.g., `<h1>`, `<h2>`, etc.) for (sub)section titles
  editing:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: insert editing marks for ease of discussing draft versions
  emoticonic:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: automatically replaces input sequences such as `|*text|` by, e.g., `<strong>text</strong>` in html output
  footer:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: override the center footer string
  header:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: override the leftmost header string
  inline:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: if comments is "yes", then render comments inline; otherwise render them in an "Editorial Comments" section
  iprnotified:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: include boilerplate from Section 10.4(d) of http://tools.ietf.org/html/rfc2026
  linkmailto:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: 'generate mailto: URL, as appropriate'
  linefile:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: a string like "35:file.xml" or just "35" (file name then defaults to the containing file's real name or to the latest linefile specification that changed it) that will be used to override xml2rfc's reckoning of the current input position (right after this PI) for warning and error reporting purposes (line numbers are 1-based)
  notedraftinprogress:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: generates "(work in progress)", as appropriate
  private:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: produce a private memo rather than an RFC or Internet-Draft
  refparent:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: title of the top-level section containing all references
  rfcedstyle:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: |-
      attempt to closely follow finer details from the latest observable RFC-Editor style so as to minimize the probability of being sent back corrections after submission. +
      This directive is a kludge whose exact behavior is likely to change on a regular basis to match the current flavor of the month; presently, it will: +
      * capitalize the adjective "`This`" in automatically generated headings,
      * use the variant "`acknowledgement`" spelling instead of Merriam Webster's main "`acknowledgment`" dictionary entry,
      * use the "`eMail`" spelling instead of Knuth's more modern "`email`" spelling,
      * only put one blank line instead of two before top sections,
      * omit "`Intellectual Property and Copyright Statements`" and "`Author's Address`" from the table of content, and
      * not limit the indentation to a maximum tag length in `<references>` sections.
  rfcprocack:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: if there already is an automatically generated Acknowledg(e)ment section, pluralize its title and add a short sentence acknowledging that xml2rfc was used in the document's production to process an input XML source file in RFC-2629 format
  slides:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: when producing a html file, produce multiple files for a slide show
  sort-refs:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: "(`sortrefs`) sort references"
  strict:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: try to enforce the ID-nits conventions and DTD validity
  subcompact:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: if compact is "yes", then you can make things a little less compact by setting this to "no" (the default value is the current value of the compact PI)
  sym-refs:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: "(`symrefs`) use anchors rather than numbers for references"
  text-list-symbols:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: modify the list of symbols used (when generated text) for list type="symbols". For example, specifying "abcde" will cause "a" to be used for 1st level, "b" for the 2nd level, etc, cycling back to the first character "a" at the 6th level. Specifying "o*" will cause the characters "o" and "*" to be alternated for each successive level.
  toc-include:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: "(`toc`) generate a table-of-contents"
  tocappendix:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: control whether the word "Appendix" appears in the table-of-content
  toc-depth:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: if `:toc-include:` is "yes", then this determines the depth of the table-of-contents
  tocindent:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: if `:toc-include:` is "yes", then setting this to "yes" will indent subsections in the table-of-contents
  tocnarrow:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: affects horizontal spacing in the table-of-content
  tocompact:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: if `:toc-include:` is "yes", then setting this to "no" will make it a little less compact
  topblock:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: put the famous header block on the first page
  useobject:
    category: Attributes for `xml2rfc` processing instructions
    subsection: Processing instructions for `xml2rfc`
    type: string
    description: when producing a HTML file, use the `<object>` HTML element with inner replacement content instead of the `<img>` HTML element, when a source XML element includes an `src` attribute
