# yaml-language-server: $schema=../schemas/attribute-manifest.schema.yaml
# Metanorma document attributes — China Standards
# Generated by scripts/extract-attributes.rb on 2026-07-22; reviewed against gem validators.
---
flavor: gb
label: China Standards
inherits_from: standoc
gem: metanorma-gb
source: flavors/gb/ref/document-attributes.adoc
notes: See /flavors/gb/ref/notes/ for title, classification and prefix-inference guidance.
description: |-
  [[note_general_doc_ref_doc_attrib_gb]]
  [NOTE]
  ====
  The document attributes listed below are unique to Metanorma's processing of GB documents.

  For _common document attributes_, see link:/author/ref/document-attributes/[Document attributes reference] in general Metanorma author's documentation. That page describes attributes that apply to all Metanorma flavors, not just GB.

  For an _introduction to Metanorma AsciiDoc document attributes_ and how Metanorma uses them, see link:/author/ref/document-attributes/[the corresponding topic].
  ====
attributes:
  title-intro-zh:
    category: Document info
    type: string
    description: |-
      These are the title introduction, main title, and part title in Chinese.
      The intro and part titles are optional
      (they replace their French counterparts in
      https://github.com/metanorma/metanorma-iso[metanorma-iso].)
      This and the other `:title-*` document attributes are used instead
      of the `metanorma-standoc` `:title:` attribute and the default AsciiDoc title
      (the first line of the document header, prefixed with `=`).
  title-main-zh:
    category: Document info
    see: title-intro-zh
  title-part-zh:
    category: Document info
    see: title-intro-zh
  title-intro-en:
    category: Document info
    type: string
    description: |-
      These are the title introduction, main title, and part title in English.
      The intro and part titles are optional.
      (They form the document subtitle, instead of the document title as in
      https://github.com/metanorma/metanorma-iso[metanorma-iso].)
  title-main-en:
    category: Document info
    see: title-intro-en
  title-part-en:
    category: Document info
    see: title-intro-en
  scope:
    category: Document info
    type: enum
    default: national
    description: |-
      The scope of the GB standard (`national`, `sector`, `professional`, `local`,
      `enterprise`, `social-group`). Defaults to `national`.
    values:
    - name: national
      description: "(default) National standard."
    - name: sector
      description: Sector (industry) standard. The `:prefix:` is validated against the sector prefix list in the gem (lib/asciidoctor/gb/validate.rb prefix_validate).
    - name: professional
      description: Professional standard.
    - name: local
      description: Local standard. The `:prefix:` is the two-digit region code; any leading `DB` is stripped by the converter (lib/asciidoctor/gb/front.rb get_prefix).
    - name: enterprise
      description: Enterprise standard (`Q/` prefix). `:issuer:` is required (lib/asciidoctor/gb/validate.rb issuer_validate).
    - name: social-group
      description: Social group standard (`T/` prefix).
    notes: Value set cross-checked against the gbstandard.rng gbscope enum (national/sector/professional/local/enterprise/social-group); matches the inline list on the source page. When `:scope:` is omitted it is inferred from a `T/` or `Q/` prefix, else defaults to `national` (lib/asciidoctor/gb/front.rb get_scope).
  mandate:
    category: Document info
    type: enum
    default: mandatory
    description: |-
      The mandate of the GB standard (`mandatory`, `recommended`, `guidelines`).
      Defaults to `mandatory`.
    values:
    - name: mandatory
      description: "(default) Mandatory standard. Rendered as document type `standard`."
    - name: recommended
      description: Recommended standard. Rendered as document type `recommendation`.
    - name: guidelines
      description: Guidelines. Also derived from a `/Z` prefix when `:mandate:` is not given.
      notes: Enumerated by gbstandard.rng gbmandate and produced by get_mandate, but the current gem passes `guidelines` through unchanged as ext/doctype (lib/asciidoctor/gb/front.rb doctype), which is rejected by doctype_validate and the gbstandard.rng DocumentType enum (standard, recommendation). Accepted as a mandate, but currently triggers a doctype validation warning.
    notes: Value set cross-checked against the gbstandard.rng gbmandate enum (mandatory/recommended/guidelines); matches the inline list on the source page. When `:mandate:` is omitted it is inferred from a `/T` or `/Z` prefix suffix, else defaults to `mandatory` (lib/asciidoctor/gb/front.rb get_mandate).
  topic:
    category: Document info
    type: enum
    default: basic
    description: The topic of the GB standard (`basic`, `health-and-safety`, `environment-protection`, `engineering-and-construction`, `product`, `method`, `management-techniques`, `other`). Defaults to `basic`.
    values:
    - name: basic
      description: "(default) Basic topic."
    - name: health-and-safety
      description: Health and safety.
    - name: environment-protection
      description: Environment protection.
    - name: engineering-and-construction
      description: Engineering and construction.
    - name: product
      description: Product.
    - name: method
      description: Method.
    - name: management-techniques
      description: Management techniques.
    - name: other
      description: Other.
    notes: Value set cross-checked against the gbstandard.rng gbtopic enum (basic/health-and-safety/environment-protection/engineering-and-construction/product/method/management-techniques/other); matches the inline list on the source page. Defaults to `basic` when omitted (lib/asciidoctor/gb/front.rb get_topic).
  prefix:
    category: Document info
    subsection: Classification
    type: string
    description: |-
      The prefix classifying the GB standard.
      (Refer to
      https://github.com/metanorma/metanorma-model-gb/blob/main/models/gb-standard-national-prefix.adoc[GB National Standard Prefixes],
      https://github.com/metanorma/metanorma-model-gb/blob/main/models/gb-standard-sector-prefix.adoc[GB Sector Standard Prefixes],
      https://github.com/metanorma/metanorma-model-gb/blob/main/models/gb-standard-local-prefix.adoc[GB Local Standard Prefixes],
      https://github.com/metanorma/metanorma-gb/issues/54[GB Social and Enterprise Standard Prefixes].)
      Any `/Z` or `/T` suffix (indicating "recommended" and "guidelines" mandate) is
      ignored unless the `:mandate:` attribute is not given. Any `Q/` or `T/` prefix for social and enterprise
      standards is ignored unless the `:scope:` attribute is not given.
      If no prefix is given, `GB` is assumed.
  library-ics:
    category: Document info
    subsection: Classification
    type: comma-list
    description: The ICS (International Categorization for Standards) number for the GB standard. There may be more than one ICS for a document; if so, they should be comma-delimited. (Unlike the case for ISO, the ICS identifier is output to the front page of the GB standard.)
  library-ccs:
    category: Document info
    subsection: Classification
    type: string
    description: The CCS (Chinese Categorization Scheme) code for the GB standard. See https://github.com/metanorma/cn-ccs-codes
  library-plan:
    category: Document info
    subsection: Classification
    type: string
    description: The Plan Number (计划单号) for the GB standard. Read by the gem as `:library-plan:` (previously documented as `:plan-number:`).
  iso-standard:
    category: Document info
    subsection: Relations to other standards
    type: string
    description: |-
      (optional) A corresponding ISO standard that the GB standard relates to. Format
      is full document code, then optionally comma followed by document title;
      e.g. `ISO/IEC 27001:2013, Information security management systems`
  equivalence:
    category: Document info
    subsection: Relations to other standards
    type: enum
    default: equivalent
    description: |-
      (optional, only valid if there is a corresponding `:iso-standard:`)
      The relation of the GB standard to the corresponding ISO standard
      (`equivalent`, `identical`, `nonequivalent`). Defaults to `equivalent`.
    values:
    - name: equivalent
      description: "(default) The GB standard is equivalent to the corresponding ISO standard."
    - name: identical
      description: The GB standard is identical to the corresponding ISO standard.
    - name: nonequivalent
      description: The GB standard is not equivalent to the corresponding ISO standard.
    notes: Value set documented inline on the source page; the current gem does not validate it — any string is accepted and the default is `equivalent` (lib/asciidoctor/gb/front.rb metadata_equivalence).
  obsoletes:
    category: Document info
    subsection: Relations to other standards
    type: string
    description: |-
      (optional)
      A corresponding GB standard that this GB standard obsoletes. Format is full
      document code, then optionally comma followed by document title;
      e.g. `GB/T 22080-2008`
  obsoletes-parts:
    category: Document info
    subsection: Relations to other standards
    type: string
    description: |-
      A list of bibliographic localities in the corresponding GB standard that this
      GB standard obsoletes. These are formatted the same way as the localities in
      citations; e.g. `clause 7-9, clause 11`
  technical-committee-type:
    category: Author info
    type: enum
    description: The type of the technical committee (`technical` or `provisional`).
    values:
    - name: technical
      description: Technical committee.
    - name: provisional
      description: Provisional committee.
    - name: drafting
      description: Drafting committee.
      notes: Enumerated by the gbstandard.rng schema (gbcommittee/@type) but not documented on the source page.
    notes: Value set cross-checked against the gbstandard.rng gbcommittee/@type enum (technical/provisional/drafting).
  issuer:
    category: Author info
    type: string
    description: The issuer of the standard. This is the authority which authors, manages, and issues the standard. For social standards, this is the social group; for enterprise standards, this is the company. The issuer appears on the standard frontispiece. By default, the issuer is inferred from the prefix of the standard; this attribute overrides the value inferred from the prefix. It is required for social and entperprise standards.
  publisher:
    category: Author info
    type: string
    description: The publisher of the standard, which distributes the standard. This is distinct from the issuer, the authority which authors, manages, and issues the standard.
  proposer:
    category: Author info
    type: string
    description: The party which proposed the standard.
  authority:
    category: Author info
    type: string
    description: The authority which sponsored the standard.
  author:
    category: Author info
    type: string
    description: The individuals who drafted the standard.
  author-committee:
    category: Author info
    type: string
    description: The committees which drafted the standard. (Also `:author-committee_2:`, `:author-committee_3:`...)
  title-font:
    category: Visual appearance
    type: string
    description: |-
      The font to use for the standard class and issuer on the (Word) cover page; described in GB/T 1.1 as
      "custom font". If not provided, the font is inferred from the scope of the standard, aligning
      with existing practice: SimSun for national scope, SimHei for all other scopes.
  keep-boilerplate:
    category: Visual appearance
    type: boolean
    description: |-
      If absent (default), any paragraphs supplied at the start of the Terms and Definitions
      section are deleted, and replaced with standard predefined text. If present, any such
      paragraphs in the text are retained.
  standard-logo-img:
    category: Visual appearance
    type: string
    description: User-supplied graphic to overwrite the logo for the standard on the title page.
  standard-class-img:
    category: Visual appearance
    type: string
    description: User-supplied graphic to overwrite the name of the standard class on the title page.
  standard-issuer-img:
    category: Visual appearance
    type: string
    description: User-supplied graphic to overwrite the name of the standard issuer on the title page.
