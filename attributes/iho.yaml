# yaml-language-server: $schema=../schemas/attribute-manifest.schema.yaml
# Metanorma document attributes — IHO
# Generated by scripts/extract-attributes.rb on 2026-07-22; reviewed against gem validators.
---
flavor: iho
label: IHO
inherits_from: standoc
gem: metanorma-iho
source: flavors/iho/ref/document-attributes.adoc
notes: See /flavors/iho/ref/notes/ for additional guidance.
description: |-
  [[note_general_doc_ref_doc_attrib_iho]]
  [NOTE]
  ====
  The document attributes listed below are unique to Metanorma's processing of IHO documents.

  For _common document attributes_, see link:/author/ref/document-attributes/[Document attributes reference] in general Metanorma author's documentation. That page describes attributes that apply to all Metanorma flavors, not just IHO.

  For an _introduction to Metanorma AsciiDoc document attributes_ and how Metanorma uses them, see link:/author/ref/document-attributes/[the corresponding topic].
  ====
attributes:
  title:
    category: Document information
    type: string
    required: true
    description: "*Mandatory.* The title of the document in English."
  title-part:
    category: Document information
    type: string
    added_in:
      component: metanorma-iho
      version: v1.1.10
    description: The title of the document part in English (if applicable).
  title-appendix:
    category: Document information
    type: string
    added_in:
      component: metanorma-iho
      version: v1.1.10
    description: The title of the appendix in English, if this document is an appendix published separately; `title` becomes the title of the main document, as presented within the standalone appendix.
  title-annex:
    category: Document information
    type: string
    added_in:
      component: metanorma-iho
      version: v1.1.10
    description: The title of the annex in English, if this document is an annex published separately; `title` becomes the title of the main document, as presented within the standalone appendix.
  semantic-metadata-annex-informative:
    category: Document information
    type: string
    added_in:
      component: metanorma-iho
      version: v1.1.10
    description: 'Indicate in the title that the annex is informative: set to `true` if so.'
  title-supplement-en:
    category: Document information
    type: string
    added_in:
      component: metanorma-iho
      version: v1.1.10
    description: The title of the document supplement in English (if applicable).
  series:
    category: Document information
    type: enum
    values:
    - name: B
      description: Bathymetric Publications
    - name: C
      description: Capacity Building Publications
    - name: M
      description: Miscellaneous Publications
    - name: P
      description: Periodic Publications
    - name: S
      description: Standards and Specifications
    required: true
    example: |-
      Example for IHO S-102

      :series: S
    description: 'Series that the document belongs to. *Mandatory.*  Permitted values:'
  docnumber:
    category: Document information
    type: string
    required: true
    example: |-
      Example for IHO S-102

      :docnumber: 102
    description: The designation number for the document. Do not include the series prefix. *Mandatory.*
  partnumber:
    category: Document information
    type: string
    added_in:
      component: metanorma-iho
      version: v1.1.10
    description: The part number of the document, if applicable.
  appendix-id:
    category: Document information
    type: string
    added_in:
      component: metanorma-iho
      version: v1.1.10
    description: The appendix number of the document, if applicable.
  annex-id:
    category: Document information
    type: string
    added_in:
      component: metanorma-iho
      version: v1.1.10
    description: The annex number of the document, if applicable.
  supplement-id:
    category: Document information
    type: string
    added_in:
      component: metanorma-iho
      version: v1.1.10
    description: The supplement number of the document, if applicable.
  doctype:
    category: Document information
    type: enum
    values:
    - name: standard
      description: IHO Standard
    - name: specification
      description: IHO Specification
    - name: resolution
      description: IHO Resolution
    - name: regulation
      description: Regulation-related
    required: true
    example: |-
      Example for IHO S-102

      :doctype: standard
    description: 'Document type. *Mandatory.* Permitted types:'
  status:
    category: Document information
    type: enum
    values:
    - name: draft-proposal
      description: Draft at the proposal stage.
    - name: draft-development
      description: Draft at the development stage.
    - name: draft-testing
      description: Draft at the testing stage.
    - name: draft-implementation
      description: Draft at the implementation stage.
    - name: in-force
      description: Document is in-force.
    - name: retired
      description: Document has been retired.
    example: |-
      Example for IHO S-102

      :status: in-force
    description: |-
      Document status. Synonym: `:docstage:`.
      Refer to IHO M-3, "Principles and procedures for making changes to IHO technical
      standards and specifications" (2/2007 as amended), for the relationships between
      stages.
      Permitted types:
  edition:
    category: Document information
    type: string
    example: |-
      Example for IHO S-102

      :edition: 2.1.0
    description: |-
      The edition number of the document. The format of IHO edition
      numbers fits in a pattern of `major.minor.patch`. Please refer to
      IHO M-3, "Principles and procedures for making changes to IHO technical
      standards and specifications" (2/2007 as amended), 4.2, for the numbering pattern.
  edition-major:
    category: Document information
    type: string
    added_in:
      component: metanorma-iho
      version: v0.7.4
    description: |-
      The major component of the edition number of the document.
      If this attribute is present, it is used instead of `edition`, combined with `edition-minor` and `edition-patch`
      if they are also present.
  edition-minor:
    category: Document information
    type: string
    added_in:
      component: metanorma-iho
      version: v0.7.4
    description: The minor component of the edition number of the document.
  edition-patch:
    category: Document information
    type: string
    added_in:
      component: metanorma-iho
      version: v0.7.4
    description: The patch component of the edition number of the document.
  comment-from:
    category: Document information
    type: string
    description: |-
      The beginning of the period during which comments may be
      submitted to the document draft. Accepted values: ISO 8601 date.
  comment-to:
    category: Document information
    type: string
    description: |-
      The end of the period during which comments may be submitted to
      the document draft. The end of the period may change, and may be left open-ended
      (omitted). Accepted values: ISO 8601 date.
  copyright-year:
    category: Document information
    type: string
    example: |-
      Example for IHO S-102

      :copyright-year: 2022
    description: Year the document was published.
  published-date:
    category: Document information
    type: string
    example: |-
      Example for IHO S-102

      :published-date: 2022-01-15
  implemented-date:
    category: Document information
    type: date
    description: The date a document becomes effective. YYYY-MM-DD.
  obsoleted-date:
    category: Document information
    type: date
    description: The date a document becomes no longer effective. YYYY-MM-DD.
  document-scheme:
    category: Document information
    type: enum
    values:
    - name: '2019'
      description: |-
        (default) The current layout from IHO B-12 Edition 2.0.3 "Guidance on
        Crowdsourced Bathymetry" will be applied.
    - name: legacy
      description: |-
        (all unsupported values fall back to `legacy`)
        The layout from IHO C-17 Edition 2.0.0 "Spatial Data Infrastructures -- The Marine
        Dimension" will be applied.
    default: '2019'
    description: |-
      The document scheme that this document aligns to.
      The two available schemes only differ in layout presentation.
      Accepted values:
  committee:
    category: Document contributors
    subsection: Committee
    type: enum
    values:
    - name: hssc
      description: Hydrographic Services and Standards Programme (HSSC)
    - name: ircc
      description: Inter-Regional Coordination Committee (IRCC)
    required: true
    example: |-
      Example for IHO S-102

      :committee: hssc
    description: |-
      *Mandatory.* Name of relevant IHO committee. A second, third etc. committee is
      named as `:committee_2:`, `:committee_3:`, etc. Permitted values:
  workgroup:
    category: Document contributors
    subsection: Working group
    type: string
    required: true
    example: |-
      Example for IHO S-102

      :workgroup: tsmad
    description: |-
      *Mandatory.* Name of relevant IHO working group. All working groups have an
      associated committee. A second, third etc. committee is named as
      `:workgroup_2:`, `:workgroup_3:`, etc.
  coverpage-image:
    category: Visual appearance
    type: comma-list
    added_in:
      component: metanorma-iho
      version: v1.1.4
    description: |-
      Comma-delimited list of image locations, for images to be included on the (PDF)
      cover page. All image locations are relative to the source document.
      By default in IHO, the coverpage is a PDF, and covers just the yellow are in the coverpage:
      image::/assets/iho/coverpage.yellow.png[]
      If the supplied image PDF is to replace the cover page of the document in its
      entirety, and already includes title information, specify `:document-scheme:`
      with a value other than
      `2019`.
