# yaml-language-server: $schema=../schemas/attribute-manifest.schema.yaml
# Metanorma document attributes — ISO
# Generated by scripts/extract-attributes.rb on 2026-07-22; reviewed against gem validators.
---
flavor: iso
label: ISO
inherits_from: standoc
gem: metanorma-iso
source: flavors/iso/ref/document-attributes.adoc
notes: See /flavors/iso/ref/identifier-patterns/ for identifier construction rules, stage-code mappings, and title-component guidance.
description: |-
  [[note_general_doc_ref_doc_attrib]]
  [NOTE]
  ====
  The document attributes listed below are unique to Metanorma's processing of ISO documents.

  For _common document attributes_, see link:/author/ref/document-attributes[Document attributes reference] in general Metanorma author's documentation. That page describes attributes that apply to all Metanorma flavors, not just ISO.

  For an _introduction to Metanorma AsciiDoc document attributes_ and how Metanorma uses them, see link:/author/ref/document-attributes/[the corresponding topic].
  ====
attributes:
  docnumber:
    category: Document information
    type: string
    example: |-
      Example of setting `:docnumber:`

      For ISO 8601-1:2019, the `docnumber` is `8601`.

      For ISO 24229:2022, the `docnumber` is `24229`.
    description: The ISO document number without any part. +
  partnumber:
    category: Document information
    type: string
    example: |-
      Example of setting `:partnumber:`

      For ISO 10303-2:2022, the `partnumber` is `2`.

      For ISO 8000-118, the `partnumber` is `118`.
    description: The ISO document part number. This can be "`part-subpart`" if this is an ISO/IEC or IEC document. +
  docidentifier:
    category: Document information
    type: string
    description: |-
      The full document identiifer assembled out of component metadata,
      rather than relying on the provided metadata to build it up.

      NOTE: For a committee document, provide the N-document number for this attribute.
      The N-document number is normally specified to Metanorma as `:tc-docnumber` for drafts:
      see <<distribution-group,Distribution group>>.
  doctype:
    category: Document information
    type: enum
    values:
    - name: international-standard
      description: International Standard (IS)
    - name: technical-specification
      description: Technical Specification (TR)
    - name: technical-report
      description: Technical Report (TR)
    - name: publicly-available-specification
      description: Publicly Available Specification (PAS)
    - name: international-workshop-agreement
      description: International Workshop Agreement (IWA)
    - name: guide
      description: Guide (Guide)
    - name: technical-corrigendum
      added_in:
        component: isodoc
        version: v1.3.25
      description: Technical Corrigendum (Cor)
    - name: amendment
      added_in:
        component: isodoc
        version: v1.3.25
      description: Amendment (Amd)
    - name: committee-document
      added_in:
        component: metanorma-iso
        version: v2.7.2
      description: Committee Document (for internal documents)
    - name: addendum
      added_in:
        component: metanorma-iso
        version: v2.8.8
      description: Addendum (Add)
    - name: supplement
      added_in:
        component: metanorma-iso
        version: v3.4.6
      description: Supplement (Suppl)
    - name: extract
      added_in:
        component: metanorma-iso
        version: v3.4.6
      description: Extract (Ext)
    - name: recommendation
      description: Recommendation (Rec)
      notes: Accepted by the current metanorma-iso validator (lib/metanorma/iso/validate.rb doctype_validate) and mapped in lib/metanorma/iso/front_id.rb DOCTYPE2HASHID, but not documented on the source page.
    required: true
    description: |-
      Has its possible values defined by
      https://www.iso.org/deliverables-all.html[ISO deliverables: The different types of ISO publications]
      (mandatory). Permitted types are:
  updates-document-type:
    category: Document information
    type: string
    added_in:
      component: isodoc
      version: v1.3.25
    description: |-
      (only when `doctype` is set to `amendment`, `technical-corrigendum`, `addendum`, `supplement`, or `extract`)
      The document type that this amendment, technical corrigendum, addendum, supplement or extract is
      updating.
  docsubtype:
    category: Document information
    type: enum
    values:
    - name: vocabulary
      added_in:
        component: metanorma-iso
        version: v1.8.2
      description: |-
        The "vocabulary" document type is defined in the
        https://www.iso.org/ISO-house-style.html[ISO House Rules]
        and title requirements defined in the ISO/IEC Directives, Part 2, 2018, 11.5.2.
        The initial clause of the terms section,
        "`For the purposes of this document, the following terms and definitions apply`",
        is deleted; terminological entries are permitted outside of
        Clause 3.
    description: |-
      A subclass of doctype for which special processing rules apply.
      Valid values are listed below.
  docstage:
    category: Document information
    type: enum
    description: |-
      The stage code for the document status (see
      https://www.iso.org/stage-codes.html[International harmonized stage codes]).
      Synonym of `:status:`.
      NOTE: Typically, ISO authors create Metanorma documents at stages `00` through `40`
      (PWI `00.`, AWI, NP, WD, CD, DIS).
      Documents at the final stages, `50` and `60` (FDIS, PRF, IS), are created by
      ISO Editorial Program Managers at ISO/CS (aka ISO EPMs, ISO Editors), and the
      EPMs are expected to provide the Project Leader with
      Authors using Metanorma are not expected to edit documents at those stages, and
      are not necessary in a normal submission process.
      These stages, however, can be used for mirroring and tracking of final stage
      and published standards, which many authors do.
    values:
    - name: '00'
      description: Preliminary stage (PWI).
    - name: '10'
      description: Proposal stage (NP, AWI).
    - name: '20'
      description: Preparatory stage (WD).
    - name: '30'
      description: Committee stage (CD).
    - name: '40'
      description: Enquiry stage (DIS).
    - name: '50'
      description: Approval stage (FDIS).
    - name: '60'
      description: Publication stage (`60.00` is the PRF proof, `60.60` the published document).
    - name: '90'
      description: Review stage.
      notes: Enumerated by the isostandard.rnc schema but not described on the source page.
    - name: '95'
      description: Withdrawal stage.
      notes: Enumerated by the isostandard.rnc schema but not described on the source page.
    notes: Stage-code value set cross-checked against the isostandard.rnc schema enum (00/10/20/30/40/50/60/90/95).
  docsubstage:
    category: Document information
    type: enum
    description: |-
      The substage code for the document status (see
      https://www.iso.org/stage-codes.html[International harmonized stage codes]).
      If this is left out, a substage of "`00`" is assumed, with the exception of
      stage "`60`" (published), where a substage of "`60`" is assumed.
      ("`60.00`" is the final proof "`PRF stage`", "`60.60`" the published document "`published`".)
    values:
    - name: '00'
      description: Assumed substage when omitted (except at stage `60`).
    - name: '20'
      description: Substage 20.
      notes: Enumerated by the isostandard.rnc schema but not described on the source page.
    - name: '60'
      description: Assumed substage at stage `60` (`60.00` = PRF proof, `60.60` = published).
    - name: '90'
      description: Substage 90.
      notes: Enumerated by the isostandard.rnc schema but not described on the source page.
    - name: '92'
      description: Substage 92.
      notes: Enumerated by the isostandard.rnc schema but not described on the source page.
    - name: '93'
      description: Substage 93.
      notes: Enumerated by the isostandard.rnc schema but not described on the source page.
    - name: '98'
      description: Substage 98.
      notes: Enumerated by the isostandard.rnc schema but not described on the source page.
    - name: '99'
      description: Substage 99.
      notes: Enumerated by the isostandard.rnc schema but not described on the source page.
    notes: Substage value set cross-checked against the isostandard.rnc schema enum (00/20/60/90/92/93/98/99).
  horizontal:
    category: Document information
    type: enum
    values:
    - name: 'true'
      description: The document is a horizontal standard.
    - name: 'false'
      description: "(default) The document is not a horizontal standard."
    default: 'false'
    added_in:
      component: metanorma-iso
      version: v1.5.13
    description: Whether the document is a horizontal standard.
  fast-track:
    category: Document information
    type: enum
    values:
    - name: 'true'
      description: The document is a fast-track standard.
    - name: 'false'
      description: "(default) The document is not a fast-track standard."
    default: 'false'
    added_in:
      component: metanorma-iso
      version: v2.7.0
    description: Whether the document is a fast-track standard.
  document-scheme:
    category: Document information
    type: enum
    values:
    - name: '2024'
      description: "(default) Latest document layout as of 2024 (default)"
    - name: '2013'
      description: Document layout used from 2013 to early 2024.
    - name: '2012'
      description: Document layout used from mid-2012 to 2013. It is equivalent to the `1989` layout with a logo change.
    - name: '1989'
      description: Document layout used from 1989 to mid-2012.
    - name: '1987'
      description: Document layout used from 1987 to 1989.
    - name: '1972'
      description: Document layout used from 1972 to 1987.
    - name: '1951'
      description: Document layout used from 1951 to 1971. The first available published ISO layout.
    - name: '1979'
      description: Document layout used from 1979 to 1987.
      notes: Accepted by the current metanorma-iso converter (lib/metanorma/iso/base.rb DOCUMENT_SCHEMES) but not documented on the source page.
    default: '2024'
    added_in:
      component: metanorma-iso
      version: v2.7.1
    version_history:
    - component: metanorma-iso
      version: v2.7.6
    description: |-
      Specifies the version of the ISO document specification that should be used in
      generating the Metanorma document.

      When omitted, the scheme to apply is inferred from the `:copyright-year:`
      document attribute, if set. Otherwise, the current default scheme is
      applied..
      NOTE: Currently used only to specify the PDF layout.
  semantic-metadata-feedback-link:
    category: Document information
    type: string
    added_in:
      component: metanorma-iso
      version: v2.7.1
    description: |-
      (only for `document-scheme` value `2024`)
      Specifies the URL for any feedback to be provided for the
      ISO document.
      In the PDF layout of 2024 it is used to generate cover page QR code.
  library-ics:
    category: Document information
    type: comma-list
    description: |-
      The ICS (International Categorization for Standards) number for the document.
      There may be more than one ICS for a document; if so, they should be comma-delimited.
  classification:
    category: Document information
    type: comma-list
    added_in:
      component: metanorma-iso
      version: v2.7.2
    example: |-
      UDC code for ISO/R1-1951

      :classification: UDC:536.5.081:531.71

      UDC code for ISO 3402:1991

      :classification: UDC:663.971/.976:620.1:551.511.12

      UDC code for ISO 9833:1993

      :classification: UDC:635.61:664.8.037(083.13)

      UDC codes for ISO 10526:2007 | CIE S 014-2/E:2006

      :classification: UDC:535.65:006, UDC:535.643.2
    description: |-
      (for `document-scheme` values of `1989` and prior, and a publication date before `1994`)

      The
      https://en.wikipedia.org/wiki/Universal_Decimal_Classification[Universal Decimal Classification (UDC)]
      code(s) for the document. In publication years prior to 1994, ISO used
      UDC instead of ICS (which was published in 1992) in publications. This
      corresponds to document schemes of `1989` and
      prior.

      UDC is a rather complex scheme with logical operators.

      Values are prefixed with `UDC:`. Note that UDC uses punctuation symbols,
      including colon, but not comma.

      If multiple values are present, the classification token is repeated, and comma
      delimited.

      NOTE: The exception is that ISO | CIE co-publications use UDCs in addition to ICS
      as CIE uses UDC.
  price-code:
    category: Document information
    type: string
    added_in:
      component: metanorma-iso
      version: v2.8.10
    description: |-
      Price code group of publication. Valid values are as documented in the
      https://www.iec.ch/members_experts/tools/pdf/IEC_DATA_FEEDS.pdf[IEC Data Feeds: Technical documentation document]
  iso-cen-parallel:
    category: Document information
    type: string
    added_in:
      component: metanorma-iso
      version: v2.9.4
    description: |-
      Indication that the project is under the
      https://www.cencenelec.eu/about-cen/cen-and-iso-cooperation/[ISO/CEN Vienna Agreement].
      This means that the document is developed in parallel by ISO and CEN and goes
      through parallel approval
      processes.
  publisher:
    category: Document information
    subsection: Document identifier / Publisher
    type: enum
    values:
    - name: ISO
      description: ISO.
    - name: ISO;IEC
      description: Joint ISO and IEC. (e.g. ISO/IEC JTC 1 and ISO/IEC JTC 2 documents)
    - name: IEC;ISO
      description: Joint IEC and ISO. (e.g. IEC/ISO SMART documents)
    - name: ISO;IEC;IEEE
      description: Joint ISO/IEC/IEEE.
    - name: ISO;IEEE
      description: Joint ISO/IEEE.
    - name: ISO;SAE
      description: Joint ISO/SAE.
    - name: IWA
      description: International Workshop Agreement.
    added_in:
      component: metanorma-iso
      version: v2.0.9
    description: |-
      Publisher of the document. Accepted values are:

      In the case of IEC/ISO, both `:publisher:` and `:copyright-holder:` need to
      be set for the document identifier and the logos to be in correct order.

      NOTE: `ISO` is no longer forced to appear
      first.
  title-intro-{en,fr}:
    category: Document information
    subsection: Title
    type: string
    description: |-
      The introductory component of the English or French
      title of the document.
  title-main-{en,fr}:
    category: Document information
    subsection: Title
    type: string
    required: true
    description: |-
      The main component of the English or French title
      of the document (mandatory).
  title-part-{en,fr}:
    category: Document information
    subsection: Title
    type: string
    description: The English or French title of the document part.
  title-complement-{en,fr}:
    category: Document information
    subsection: Title
    type: string
    added_in:
      component: isodoc
      version: v3.0.8
    description: The English or French complementary title
  title-amendment-{en,fr}:
    category: Document information
    subsection: Title
    type: string
    added_in:
      component: isodoc
      version: v1.3.25
    description: |-
      (only when `doctype` is set to `amendment` or `technical-corrigendum`)
      The English or French title of the amendment
  title-addendum-{en,fr}:
    category: Document information
    subsection: Title
    type: string
    added_in:
      component: metanorma-iso
      version: v2.8.8
    description: |-
      (only when `doctype` is set to `addendum`)
      The English or French title of the addendum
  title-supplement-{en,fr}:
    category: Document information
    subsection: Title
    type: string
    added_in:
      component: metanorma-iso
      version: v3.4.6
    description: |-
      (only when `doctype` is set to `supplement`)
      The English or French title of the supplement
  title-extract-{en,fr}:
    category: Document information
    subsection: Title
    type: string
    added_in:
      component: metanorma-iso
      version: v3.4.6
    description: |-
      (only when `doctype` is set to `extract`)
      The English or French title of the extract
  amendment-number:
    category: Document information
    subsection: Title
    type: string
    added_in:
      component: isodoc
      version: v1.3.25
    description: |-
      (only when `doctype` is set to `amendment`)
      The number of the amendment
  addendum-number:
    category: Document information
    subsection: Title
    type: string
    added_in:
      component: metanorma-iso
      version: v2.8.8
    description: |-
      (only when `doctype` is set to `addendum`)
      The number of the addendum
  supplement-number:
    category: Document information
    subsection: Title
    type: string
    added_in:
      component: metanorma-iso
      version: v3.4.6
    description: |-
      (only when `doctype` is set to `supplement`)
      The number of the supplement
  extract-number:
    category: Document information
    subsection: Title
    type: string
    added_in:
      component: metanorma-iso
      version: v3.4.6
    description: |-
      (only when `doctype` is set to `extract`)
      The number of the extract
  corrigendum-number:
    category: Document information
    subsection: Title
    type: string
    added_in:
      component: isodoc
      version: v1.3.25
    description: |-
      (only when `doctype` is set to `technical-corrigendum`)
      The number of the technical corrigendum
  secretariat:
    category: Authorship and editorial information
    subsection: Drafting group
    type: string
    description: |-
      The national body acting as the secretariat for the document
      in the drafting stage.
  technical-committee-number:
    category: Authorship and editorial information
    subsection: Drafting group
    type: string
    description: |-
      The number of the relevant ISO
      technical committee (or equivalent body).
  technical-committee-type:
    category: Authorship and editorial information
    subsection: Drafting group
    type: enum
    values:
    - name: TC
      description: "(default) technical committee"
    - name: JTC
      description: joint technical committee
    - name: PC
      description: project committee
    - name: JPC
      description: joint project committee
    - name: SEG
      description: standards evaluation group (IEC)
    - name: JSEG
      description: joint standards evaluation group (IEC/ISO)
    - name: other
      added_in:
        component: metanorma-iso
        version: v2.3.4
      description: group not otherwise described (type acronym omitted from rendering)
    default: TC
    description: |-
      The type of the relevant technical committee or
      equivalent body.
      Typical values are:
  technical-committee:
    category: Authorship and editorial information
    subsection: Drafting group
    type: string
    required: true
    description: |-
      The name of the relevant ISO technical committee or equivalent
      (mandatory)
  technical-committee-agency:
    category: Authorship and editorial information
    subsection: Drafting group
    type: string
    added_in:
      component: metanorma-iso
      version: v3.1.2
    description: |-
      The agency that the technical committee lies under,
      if it is other than the home agency
      (ISO for metanorma-iso, IEC for metanorma-iec)
      Can be given as an abbreviation if it is IEC or ISO.
  technical-committee-agency-abbr:
    category: Authorship and editorial information
    subsection: Drafting group
    type: string
    added_in:
      component: metanorma-iso
      version: v3.1.2
    description: |-
      The abbreviation of the agency that the technical committee
      lies under.
      Should be given if the agency is other than IEC or ISO.
  subcommittee-number:
    category: Authorship and editorial information
    subsection: Drafting group
    type: string
    description: The number of the relevant ISO subcommittee.
  subcommittee-type:
    category: Authorship and editorial information
    subsection: Drafting group
    type: enum
    values:
    - name: SC
      description: "(default) subcommittee"
    - name: JSC
      description: joint subcommittee
    - name: other
      added_in:
        component: metanorma-iso
        version: v2.3.4
      description: group not otherwise described (type acronym omitted from rendering)
    default: SC
    description: |-
      The type of the relevant ISO subcommittee.
      Typical values are:
  subcommittee:
    category: Authorship and editorial information
    subsection: Drafting group
    type: string
    description: The name of the relevant ISO subcommittee.
  workgroup-number:
    category: Authorship and editorial information
    subsection: Drafting group
    type: string
    description: The number of the relevant ISO working group.
  workgroup-type:
    category: Authorship and editorial information
    subsection: Drafting group
    type: enum
    values:
    - name: WG
      description: "(default) working group (e.g. ISO/TC 154/WG 5)"
    - name: JWG
      description: joint working group (e.g. ISO/TC 154/JWG 1)
    - name: JAG
      description: joint advisory group
    - name: AG
      description: advisory group (e.g. ISO/TC 211/AG 10)
    - name: AHG
      description: ad-hoc group
    - name: SWG
      description: special working group
    - name: SG
      description: strategic/steering group
    - name: MA
      description: maintenance agency (e.g. ISO 3166/MA)
    - name: CORG
      description: co-ordination group
    - name: JCG
      description: joint co-ordination group
    - name: CAG
      description: chair advisory group (e.g. ISO/TC 154/CAG)
    - name: WS
      description: workstream (e.g. IEC/ISO JSEG 15/WS 1)
    - name: other
      added_in:
        component: metanorma-iso
        version: v2.3.4
      description: group not otherwise described (type acronym omitted from rendering)
    default: WG
    description: |-
      The type of the relevant ISO working group.
      Typical values are:
  workgroup:
    category: Authorship and editorial information
    subsection: Drafting group
    type: string
    example: |-
      Setting a responsible technical committee, subcommittee and working group (1)

      For ISO/TC 211/WG 9:

      :technical-committee-number: 211
      :technical-committee: Geographic information/Geomatics
      :workgroup-number: 9
      :workgroup: Information management

      Setting a responsible technical committee, subcommittee and working group (2)

      For ISO/TC 184/SC 4/WG 12:

      :technical-committee-number: 184
      :technical-committee: Automation systems and integration
      :subcommittee-type: SC
      :subcommittee-number: 4
      :subcommittee: Industrial data
      :workgroup-type: WG
      :workgroup-number: 12
      :workgroup: STEP product modelling and resources

      Setting multiple responsible technical committees

      :technical-committee: Widgets etc.
      :technical-committee_agency: Institute of Electrical and Electronic Engineers
      :technical-committee_agency_abbr: IEEE
      :technical-committee-number_2: 184
      :technical-committee_2: Automation systems and integration
      :subcommittee-type_2: SC
      :subcommittee-number_2: 4
      :subcommittee_2: Industrial data
      :technical-committee-number_3: 184
      :technical-committee_3: Automation systems and integration
      :technical-committee_agency_3: IEC
      :subcommittee-type_3: SC
      :subcommittee-number_3: 5
      :subcommittee_3: Interoperability, integration, and architectures for enterprise systems and automation applications
    description: |-
      The name of the relevant ISO working group.
      In the case of multiple responsible groups (technical committees, subcommittees,
      working groups), the `:technical-committee:`, `:subcommittee:` and `:workgroup:`
      attributes can be used to encode multiple groups by suffixing `_n` to the
      attribute where `n` is a sequential number after 1. Each suffix corresponds to
      one nesting grouping of technical committee, subcommittee, and working group.
  approval-agency:
    category: Authorship and editorial information
    subsection: Approval group
    type: string
    default: ISO
    description: |-
      The agency or agencies of the *approval group*. Defaults to `ISO` if
      not supplied; the only alternate value is `ISO/IEC`, for JTCs. (For the drafting group,
      the agencies are taken from the `publisher` attribute.)
  approval-technical-committee-number:
    category: Authorship and editorial information
    subsection: Approval group
    type: string
    description: |-
      The number of the relevant ISO
      technical committee.
  approval-technical-committee-type:
    category: Authorship and editorial information
    subsection: Approval group
    type: string
    default: TC
    description: |-
      The type of the relevant technical committee.
      Defaults to `TC` if not supplied.
  approval-technical-committee:
    category: Authorship and editorial information
    subsection: Approval group
    type: string
    description: The name of the relevant ISO technical committee.
  approval-subcommittee-number:
    category: Authorship and editorial information
    subsection: Approval group
    type: string
    description: The number of the relevant ISO subcommittee.
  approval-subcommittee-type:
    category: Authorship and editorial information
    subsection: Approval group
    type: string
    default: SC
    description: |-
      The type of the relevant ISO subcommittee.
      Defaults to `SC` if not supplied.
  approval-subcommittee:
    category: Authorship and editorial information
    subsection: Approval group
    type: string
    description: The name of the relevant ISO subcommittee.
  approval-workgroup-number:
    category: Authorship and editorial information
    subsection: Approval group
    type: string
    description: The number of the relevant ISO working group.
  approval-workgroup-type:
    category: Authorship and editorial information
    subsection: Approval group
    type: string
    default: WG
    description: |-
      The type of the relevant ISO working group.
      Defaults to `WG` if not supplied.
  approval-workgroup:
    category: Authorship and editorial information
    subsection: Approval group
    type: string
    source_term: ":approval-workgroup::"
    description: The name of the relevant ISO working group.
  tc-docnumber:
    category: Authorship and editorial information
    subsection: Distribution group
    type: string
    example: |-
      Setting the N-document number for a distribution group

      For a document circulated in ISO/TC 154 as "N 1218" (instead of "N 1218"):

      :tc-docnumber: ISO/TC 154 N 1218
    description: |-
      The document number assigned by a *distribution group*
      (also called the "`N-document number`" or the "`N-number`"), typically a
      Technical Committee, a Subcommittee or a Working Group.
      Must include the short reference of the distribution group, since documents may
      circulate widely;
