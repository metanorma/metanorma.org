  iso-word-template:
    category: Visual appearance
    type: enum
    values:
    - name: simple
      description: |-
        Commonly called the "Simple Template".
        Using the styles of the https://www.iso.org/iso-templates.html[ISO Simple Template] (default for stages before 40).
    - name: dis
      description: |-
        Commonly called the "DIS Template".
        Using the styles of the "`ISO Edited DIS template`", introduced by the ISO
        editors at the DIS stage of editing, through to publication. (default for stages
        40 through 95)
    added_in:
      component: metanorma-iso
      version: v2.1.2
    description: |-
      For Word output, pick the styles template
      to use.
      Options are:
  iso-word-bg-strip-color:
    category: Visual appearance
    type: enum
    values:
    - name: 'true'
      added_in:
        component: metanorma-iso
        version: v2.2.3
      description: |-
        (default) Remove background colors of semantically-annotated
        spans (equivalent to "Pattern: Clear"). This option is _necessary_ for draft
        submission of the stage 40 onwards (DIS/FDIS) documents to ISO
        editors..
    - name: 'false'
      description: Retain background colors of semantically-annotated spans.
    default: 'true'
    description: |-
      (only for the `dis` template)
      The "`ISO Edited DIS template`" introduces background colouring of spans in
      order to ensure correct semantic markup, as validated by ISO editors.
  presentation-metadata-linenumbers:
    category: Visual appearance
    type: enum
    values:
    - name: 'true'
      description: Display the line numbers for the document text.
    - name: 'false'
      description: "(default) Don't display the document line numbers."
    default: 'false'
    description: |-
      Allows to render the line numbers for the document text.
      NOTE: Currently used only for the PDF layout.
  validate-years:
    category: Validation
    type: boolean
    added_in:
      component: metanorma-iso
      version: v2.4.4
    description: |-
      If not set, four-digit numbers that could plausibly be years (between 1900 and 2050)
      are not warned about. If set,
      they are included in validation.
